/* ══════════════════════════════════════════════
   포트폴리오 종합 분석 엔진
══════════════════════════════════════════════ */
function calcPortfolioIntelligence() {
  const port = S.portfolio;
  if (!port.length) return null;

  const items = port.map(p => {
    const pr  = PRICE_BASE[p.code];
    const st  = gs(p.code);
    const hasP = pr && pr.price !== null && pr.price !== undefined;
    const cur = hasP ? pr.price : p.buyPrice;
    const val = cur * p.qty;
    const cost = p.buyPrice * p.qty;
    const pnlPct = hasP ? (pr.price - p.buyPrice) / p.buyPrice * 100 : 0;
    const sup = SUPPLY_BASE[p.code];
    const news = NEWS.filter(n => n.code === p.code).slice(0, 5);
    const sentiment = news.reduce((s, n) => s + (n.sent==='긍정'?1:n.sent==='부정'?-1:0), 0);
    return { code:p.code, name:st?.name, sector:st?.sector, val, cost, pnlPct, sup, sentiment, hasP };
  }).filter(it => it.val > 0);

  if (!items.length) return null;

  const totalVal  = items.reduce((s, i) => s + i.val, 0);
  const totalCost = items.reduce((s, i) => s + i.cost, 0);

  // 섹터 집중도
  const sectorMap = {};
  items.forEach(it => { sectorMap[it.sector] = (sectorMap[it.sector]||0) + it.val; });
  const sectorList = Object.entries(sectorMap)
    .map(([s,v]) => ({ sector:s, pct:Math.round(v/totalVal*100) }))
    .sort((a,b) => b.pct - a.pct);
  const topSector = sectorList[0];
  const isConcentrated = topSector && topSector.pct >= 50;

  // 트렌드 점수
  const avgPnl   = items.reduce((s,i) => s+i.pnlPct, 0) / items.length;
  const avgSenti = items.reduce((s,i) => s+i.sentiment, 0) / items.length;
  const avgFlow  = items.filter(i=>i.sup).reduce((s,i)=>s+(i.sup.foreign+i.sup.inst),0) / (items.filter(i=>i.sup).length||1);
  let trendScore = 0;
  trendScore += avgPnl > 5 ? 3 : avgPnl > 0 ? 1 : avgPnl > -5 ? -1 : -3;
  trendScore += avgSenti > 1 ? 2 : avgSenti > 0 ? 1 : avgSenti < -1 ? -2 : -1;
  trendScore += avgFlow > 0 ? 2 : avgFlow < 0 ? -2 : 0;
  const trend      = trendScore >= 3 ? '상승 우세' : trendScore >= 1 ? '중립 우세' : trendScore >= -1 ? '혼조세' : '하락 우세';
  const trendColor = trendScore >= 3 ? '#E53935' : trendScore >= 1 ? '#2E7D32' : trendScore >= -1 ? '#E65100' : '#1565C0';
  const trendIcon  = trendScore >= 3 ? '📈' : trendScore >= 1 ? '↗️' : trendScore >= -1 ? '↔️' : '📉';

  // 리스크
  const maxDrawdown = Math.min(...items.map(i => i.pnlPct));
  const volatility  = items.reduce((s,i) => s+Math.abs(i.pnlPct), 0) / items.length;
  const riskScore   = (isConcentrated?30:0) + (volatility>15?30:volatility>7?15:0) + (maxDrawdown<-15?30:maxDrawdown<-7?15:0);
  const risk        = riskScore >= 50 ? '높음' : riskScore >= 25 ? '보통' : '낮음';
  const riskColor   = riskScore >= 50 ? '#E53935' : riskScore >= 25 ? '#E65100' : '#2E7D32';

  // 추천 액션
  const actions = [];
  if (isConcentrated) actions.push(`${topSector.sector} 섹터 집중도 ${topSector.pct}% — 분산 투자 권장`);
  if (maxDrawdown < -10) actions.push(`최대 손실 ${maxDrawdown.toFixed(1)}% — 손절 기준 재검토`);
  if (avgFlow < -50) actions.push('외국인·기관 전반 매도세 — 비중 축소 고려');
  if (avgFlow > 50 && trendScore >= 2) actions.push('수급 양호 & 상승세 — 현 포지션 유지');
  if (items.length < 3) actions.push('종목 수 부족 — 3~7종목 분산 보유 권장');
  if (!actions.length) actions.push('현재 포트폴리오 균형 양호 — 현 포지션 유지');

  const summary = `보유 ${items.length}종목 포트폴리오는 ${trend} 흐름${isConcentrated?`, ${topSector.sector} 집중(${topSector.pct}%)`:''}${risk==='높음'?'이며 리스크가 높습니다.':risk==='보통'?'이며 리스크는 보통 수준입니다.':'이며 안정적입니다.'}`;

  return { items, totalVal, sectorList, topSector, isConcentrated, trend, trendColor, trendIcon, trendScore, risk, riskColor, actions, summary, avgFlow };
}

/* ── 리밸런싱 조언 ── */
function rRebalanceAdvice(myETF) {
  if (myETF.length < 2) return '';
  const total = myETF.reduce((s,p) => s + (PRICE_BASE[p.id]?.price||p.buyPrice)*p.qty, 0);
  const domestic = myETF.filter(p=>ETF_LIST.find(e=>e.code===p.id)?.region==='국내')
    .reduce((s,p)=>s+(PRICE_BASE[p.id]?.price||p.buyPrice)*p.qty,0);
  const domPct = total > 0 ? Math.round(domestic/total*100) : 0;
  const needRebal = domPct > 60 || domPct < 20;
  if (!needRebal) return '';
  return `<div style="margin-top:10px;padding:9px 12px;background:rgba(230,81,0,0.07);border:1px solid rgba(230,81,0,0.25);border-radius:10px;font-size:12px;color:#E65100;font-weight:700">
    🔄 리밸런싱 권장: 국내 비중 ${domPct}% ${domPct>60?'— 해외 ETF 추가 고려':'— 국내 ETF 추가 고려'}
  </div>`;
}

/* ── 자산 추가 함수 ── */

// ── ETF 현재가 수집 (네이버 polling API) ──
async function fetchETFPrices(etfCodes) {
  const results = {};
  for (const code of etfCodes) {
    try {
      const url = `https://polling.finance.naver.com/api/realtime/domestic/stock/${code}`;
      const res = await fetch(url, { cache: 'no-store' });
      const data = await res.json();
      const q = (data.datas || data.data || [null])[0];
      if (!q) continue;
      const n = (...keys) => { for(const k of keys){const v=q[k];if(v!=null)try{return parseInt(String(v).replace(/,/g,''))}catch{}};return 0;};
      const price = n('closePrice','cp','nv','sv');
      const prev  = n('prevClosePrice','pcv','rf','pv');
      if (price) {
        const chg = prev ? Math.round((price-prev)/prev*10000)/100 : 0;
        results[code] = { price, chg, prev };
      }
    } catch(e) {}
    await new Promise(r => setTimeout(r, 150));
  }
  return results;
}

// ── 자산탭 ETF 가격 갱신 ──
async function refreshETFPrices() {
  const port = safeLS('assetPortfolio', []);
  const etfCodes = port.filter(p => p.assetType === 'etf').map(p => p.id);
  if (!etfCodes.length) return;
  const prices = await fetchETFPrices(etfCodes);
  // PRICE_BASE에 병합
  Object.entries(prices).forEach(([code, data]) => {
    if (!PRICE_BASE[code]) PRICE_BASE[code] = { price: null, chg: null, vol: '—', cap: '—', high: '—', low: '—', open: '—', dataSource: 'etf' };
    PRICE_BASE[code].price = data.price;
    PRICE_BASE[code].chg   = data.chg;
    PRICE_BASE[code].dataSource = 'live';
  });
  if (Object.keys(prices).length > 0) {
    render();
    notify(`📊 ETF 현재가 갱신 (${Object.keys(prices).length}종목)`, 'ok');
  }
}

  safeSetLS('assetPortfolio', port);
  notify('✅ 삭제됐어요', 'ok');

}

function addAsset(type) {
  let id, name, buyPrice, qty;
  if (type === 'etf') {
    id = document.getElementById('etf-sel')?.value;
    buyPrice = Number(document.getElementById('etf-price')?.value);
    qty = Number(document.getElementById('etf-qty')?.value);
    const etf = ETF_LIST.find(e=>e.code===id);
    name = etf?.name || id;
  } else if (type === 'overseas') {
    id = document.getElementById('ov-sel')?.value;
    buyPrice = Number(document.getElementById('ov-price')?.value);
    qty = Number(document.getElementById('ov-qty')?.value);
    const ov = OVERSEAS_LIST.find(o=>o.ticker===id);
    name = ov?.name || id;
  }
  if (!id || !buyPrice || !qty) { notify('⚠️ 모든 항목을 입력해주세요','info'); return; }
  const port = safeLS('assetPortfolio', []);
  const existing = port.findIndex(p=>p.id===id&&p.assetType===type);
  if (existing >= 0) port[existing] = {assetType:type, id, name, buyPrice, qty};
  else port.push({assetType:type, id, name, buyPrice, qty, addedAt:Date.now()});
  safeSetLS('assetPortfolio', port);
  notify(`✅ ${name} 추가됨`, 'ok');
  render();
}

  const accName = prompt('계좌 이름을 입력하세요 (예: 연금저축·IRP)');
  if (!accName) return;
  const pension = safeLS('pensionAccounts', []);
  pension.push({

      {name:'국내주식ETF', type:'주식', value:0},
      {name:'해외주식ETF', type:'주식', value:0},

async function showETFAnalysis(code) {

설명: ${etf.desc}
운용보수: ${etf.expense}%

    console.log('[ETF분석] 파싱할 텍스트:', txt.slice(0,200));
    let ana = {};
    try { ana = JSON.parse(txt); } catch(pe) {
      // JSON 파싱 실패 시 텍스트에서 직접 추출
      ana = {
        verdict: '추천',
        summary: txt.slice(0, 150) || `${etf.name} 분석 완료`,
        moat: '분산투자로 개별 종목 리스크 최소화',

        action: '장기 보유 권장'
      };
    }
    showETFModal(etf, ana);
  } catch(e) {
    console.error('[ETF분석] 오류:', e);
    showETFModal(etf, {
      verdict:'추천',
      summary:`${etf.name}은 ${etf.region} ${etf.category} ETF입니다. 운용보수 ${etf.expense}%로 ${etf.desc}.`,
      moat:'분산투자로 개별 종목 리스크 최소화',
      quote: getBuffettQuote('hold') + ' — 버핏',
      action:'장기 적립식 보유 권장'
    });
  }
}

async function runPensionAnalysis(accId) {

  const total = acc.items.reduce((s,i)=>s+i.value,0);

function reCards() {
  const el = document.getElementById('cc');
  if(!el) { render(); return; }

  // 스크롤 위치 + 펼쳐진 카드 위치 저장
  const _sy = window.scrollY || 0;
  let _expCardTop = 0;
  if (S.exp) {
    const openCard = el.querySelector('.card.open');
    if (openCard) _expCardTop = openCard.getBoundingClientRect().top + window.scrollY;
  }

  const items = filtered();
  el.innerHTML = items.length===0
    ? `<div class="empty"><div class="empty-i">🔭</div><div class="empty-t">해당 조건의 이슈가 없습니다</div></div>`
    : items.map(cardHTML).join('');

  // 스크롤 위치 복원
  requestAnimationFrame(() => {
    if (S.exp && _expCardTop > 0) {
      const newOpenCard = el.querySelector('.card.open');
      if (newOpenCard) {
        const newTop = newOpenCard.getBoundingClientRect().top + window.scrollY;
        window.scrollTo(0, _sy + (newTop - _expCardTop));
        return;
      }
    }
    if (_sy > 0) window.scrollTo(0, _sy);
  });
}

function saveCfWorkerUrl() {
  const inp = document.getElementById('cf-worker-inp');
  const url = (inp?.value || '').trim();
  try {
    if (url) {
      localStorage.setItem('cf_worker_url', url);
      notify('✅ CF Worker URL 저장 완료', 'ok');
    } else {
      localStorage.removeItem('cf_worker_url');
      notify('🗑 CF Worker URL 삭제됨 — AI 기능 비활성화', 'info');
    }
    const el = document.getElementById('cf-status');
    if (el) el.textContent = url ? '✅ URL 설정됨: ' + url.slice(0, 40) + '...' : '⚠️ 미설정';
  } catch(e) { notify('❌ 저장 실패', 'warn'); }
}

async function testCfWorker() {
  const url = (() => { try { return localStorage.getItem('cf_worker_url') || ''; } catch(e) { return ''; } })();
  if (!url) { notify('⚠️ CF Worker URL을 먼저 입력해주세요', 'warn'); return; }
  notify('🧪 연결 테스트 중...', 'info');
  try {
    const res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'claude-haiku-4-5-20251001', max_tokens: 10, messages: [{ role: 'user', content: 'ping' }] }),
    });
    if (res.ok) {
      notify('✅ CF Worker 연결 성공! AI 기능 활성화됨', 'ok');
    } else {
      const err = await res.text();
      notify(`❌ 연결 실패 (${res.status}): ${err.slice(0, 40)}`, 'warn');
    }
  } catch(e) {
    notify(`❌ 연결 오류: ${e.message.slice(0, 50)}`, 'warn');
  }
}

  const _mem = getMemoryContext(code);

수급(외국인·기관·개인): ${supCtx||'정보없음'}
최근 이슈: ${newsCtx||'없음'}
${_mem.historyCount > 0 ? _mem.summary : ''}

/* 일괄 분석 */
async function runAll(){
  const u=NEWS.filter(n=>!n.verdict).sort((a,b)=>a.urgency-b.urgency);
  notify(`🤖 ${u.length}건 순차 분석 시작...`,"info");
  for(const item of u){
    if(!item.dartResult) await runDart(item.id);
    await rfc(item.id);
    await runJudge(item.id);
    await new Promise(r=>setTimeout(r,500));
  }
  notify(`✅ 전체 분석 완료!`, 'ok');
}

/* ══ 시작 ══ */
function _init() {
  // 구버전 캐시 자동 삭제 (undefined 방지)
  try {
    const pa = JSON.parse(localStorage.getItem('portAnalysis') || '{}');
    const needsClear = Object.values(pa).some(a => !a.verdict || a.verdict === 'undefined');
    if (needsClear) {
      localStorage.removeItem('portAnalysis');
      console.log('[Cache] 구버전 분석 캐시 삭제');
    }
  } catch(e) { localStorage.removeItem('portAnalysis'); }
  // 기존 감성 히스토리 캐시 sent 값 교정 (구버전 호환)
  try {
    const allKeys = Object.keys(localStorage).filter(k => k.startsWith('mem_sent_'));
    allKeys.forEach(key => {
      try {
        const arr = JSON.parse(localStorage.getItem(key) || '[]');
        const fixed = arr.map(h => ({
          ...h,
          // sent 값 정규화
          sent: h.sent === 'pos' || h.sent === 'positive' ? '긍정' :
                h.sent === 'neg' || h.sent === 'negative' ? '부정' :
                h.sent === 'neutral' || !h.sent ? '중립' : h.sent,
          // impactScore 통일
          impactScore: h.impactScore || h.impact || 50,
          impact: h.impactScore || h.impact || 50,
        }));
        localStorage.setItem(key, JSON.stringify(fixed));
      } catch(e) {}
    });

  }
  try { startAutoRefresh(); } catch(e) { console.error('[KOSPI] autoRefresh 오류:', e); }

// 모달 열린 후 번역 (비동기 - 모달 먼저 열고 나서 번역)
function translateModalIfNeeded(item) {
  const needTitleTrans = isEnglishTitle(item.title) && !item._translated;
  const needBodyTrans  = item.body && isEnglishTitle(item.body) && !item._bodyTranslated;
  if (!needTitleTrans && !needBodyTrans) return;

  Promise.all([
    needTitleTrans ? googleTranslate(item.title) : Promise.resolve(null),
    needBodyTrans  ? googleTranslate(item.body)  : Promise.resolve(null),
  ]).then(([title, body]) => {
    const idx = NEWS.findIndex(n => n.id === item.id);
    if (title) { item.title = title; item._translated = true; if(idx>=0){NEWS[idx].title=title;NEWS[idx]._translated=true;} }
    if (body)  { item.body  = body;  item._bodyTranslated = true; if(idx>=0){NEWS[idx].body=body;NEWS[idx]._bodyTranslated=true;} }
    // 모달이 열려있으면 갱신
    if (document.getElementById('card-modal-root')) showCardModal(item);
  }).catch(()=>{});
}

function closeCardModal() {
  document.getElementById('card-modal-root')?.remove();
  document.body.style.overflow = '';
}

// AI 분석 후 모달 자동 갱신
function refreshCardModal(id) {
  const item = NEWS.find(n => n.id === id);
  if (item && document.getElementById('card-modal-root')) {
    showCardModal(item);
  }
}

// 🏥 자가진단 & 자동복구 시스템
// ══════════════════════════════════════════
const HEALTH = {
  errors: [],       // 오류 로그
  recovered: 0,     // 복구 횟수
  lastCheck: null,

  // 오류 기록
  log(type, msg, detail) {
    const entry = {
      type,           // 'render' | 'data' | 'storage' | 'network' | 'crash'
      msg,
      detail: String(detail || '').slice(0, 200),
      time: new Date().toLocaleTimeString('ko-KR'),
      ts: Date.now()
    };
    this.errors.unshift(entry);
    if (this.errors.length > 30) this.errors.pop();
    console.warn(`[Health:${type}]`, msg, detail || '');
    // 심각한 오류면 즉시 복구 시도
    if (type === 'crash' || type === 'render') {
      this.autoRecover(type);
    }
  },

  // 자동복구
  autoRecover(type) {
    this.recovered++;
    console.log(`[Health] 복구 시도 #${this.recovered} (${type})`);

    try {
      if (type === 'render') {
        // render 오류 → S 초기화 후 재시도
        S.exp = null;
        S.q = '';
        S.tab = 'feed';
        try { render(); notify('🔧 화면 복구됐어요', 'ok'); return; } catch(e2) {}
      }

      if (type === 'storage') {
        // localStorage 오류 → 손상된 키 정리
        const dangerous = ['portAnalysis','newsCache','supplyCache'];
        dangerous.forEach(k => { try { JSON.parse(localStorage.getItem(k)||'{}'); } catch(e) { localStorage.removeItem(k); } });
        try { render(); notify('🔧 저장소 복구됐어요', 'ok'); return; } catch(e2) {}
      }

      if (type === 'crash') {
        // 전체 크래시 → 최소 상태로 복구
        const app = document.getElementById('app');
        if (app) {
          app.innerHTML = `
          <div style="padding:40px 20px;text-align:center">
            <div style="font-size:48px;margin-bottom:16px">⚠️</div>
            <div style="font-size:16px;font-weight:800;color:#0F1D3A;margin-bottom:8px">오류가 발생했어요</div>
            <div style="font-size:13px;color:#64748B;margin-bottom:20px">자동복구를 시도합니다...</div>
            <button onclick="HEALTH.fullReset()"
              style="background:#1565C0;color:#fff;border:none;border-radius:12px;
              padding:12px 24px;font-size:14px;font-weight:700;cursor:pointer">
              🔄 완전 초기화
            </button>
            <button onclick="location.reload()"
              style="background:#F4F6FA;color:#4A5A7A;border:none;border-radius:12px;
              padding:12px 24px;font-size:14px;font-weight:700;cursor:pointer;margin-left:8px">
              새로고침
            </button>
          </div>`;
        }
      }
    } catch(recoveryErr) {
      console.error('[Health] 복구 실패:', recoveryErr);
    }
  },

  // 진단 실행
  diagnose() {
    const report = [];
    let score = 100;

    // 1. render 함수 동작 테스트
    try {
      if (typeof render !== 'function') { report.push({lvl:'🔴', msg:'render 함수 없음'}); score -= 40; }
      else report.push({lvl:'🟢', msg:'render 함수 정상'});
    } catch(e) { report.push({lvl:'🔴', msg:'render 오류: '+e.message}); score -= 40; }

    // 2. #app 엘리먼트 확인
    const app = document.getElementById('app');
    if (!app) { report.push({lvl:'🔴', msg:'#app 엘리먼트 없음'}); score -= 30; }
    else if (!app.innerHTML || app.innerHTML.length < 100) { report.push({lvl:'🟡', msg:'화면 내용이 비어있음'}); score -= 20; }
    else report.push({lvl:'🟢', msg:`화면 정상 (${(app.innerHTML.length/1000).toFixed(1)}KB)`});

    // 3. NEWS 데이터 확인
    if (!Array.isArray(NEWS) || NEWS.length === 0) { report.push({lvl:'🟡', msg:'뉴스 데이터 없음 (로딩 전일 수 있음)'}); score -= 10; }
    else report.push({lvl:'🟢', msg:`뉴스 ${NEWS.length}건 로드됨`});

    // 4. PRICE_BASE 확인
    const priceCount = Object.values(PRICE_BASE).filter(p=>p.price).length;
    if (priceCount === 0) { report.push({lvl:'🟡', msg:'주가 데이터 없음 (장외시간 또는 로딩 전)'}); score -= 5; }
    else report.push({lvl:'🟢', msg:`주가 ${priceCount}종목 로드됨`});

    // 5. localStorage 용량 확인
    try {
      let lsSize = 0;
      for(let k in localStorage) { if(localStorage.hasOwnProperty(k)) lsSize += (localStorage[k]||'').length; }
      const lsKB = (lsSize / 1024).toFixed(1);
      if (lsSize > 4 * 1024 * 1024) { report.push({lvl:'🔴', msg:`저장소 과부하 (${lsKB}KB) - 정리 필요`}); score -= 15; }
      else if (lsSize > 2 * 1024 * 1024) { report.push({lvl:'🟡', msg:`저장소 용량 주의 (${lsKB}KB)`}); score -= 5; }
      else report.push({lvl:'🟢', msg:`저장소 정상 (${lsKB}KB)`});
    } catch(e) { report.push({lvl:'🟡', msg:'저장소 접근 불가'}); }

    // 6. JSON 손상 키 확인
    const checkKeys = ['portAnalysis','newsCache','watchlist','assetPortfolio'];
    let badKeys = [];
    checkKeys.forEach(k => {
      try { JSON.parse(localStorage.getItem(k) || 'null'); }
      catch(e) { badKeys.push(k); }
    });
    if (badKeys.length > 0) { report.push({lvl:'🔴', msg:`손상된 데이터: ${badKeys.join(', ')}`}); score -= 20; }
    else report.push({lvl:'🟢', msg:'저장 데이터 무결성 정상'});

    // 7. 최근 오류 확인
    const recentErrors = this.errors.filter(e => Date.now() - e.ts < 5 * 60 * 1000);
    if (recentErrors.length > 3) { report.push({lvl:'🟡', msg:`최근 5분 오류 ${recentErrors.length}건`}); score -= 10; }
    else if (recentErrors.length > 0) { report.push({lvl:'🟡', msg:`최근 오류 ${recentErrors.length}건`}); score -= 5; }
    else report.push({lvl:'🟢', msg:'최근 오류 없음'});

    return { score: Math.max(0, score), report };
  },

  // 손상 데이터 정리
  cleanStorage() {
    const keys = ['portAnalysis','newsCache','supplyCache','dartCache'];
    let cleaned = 0;
    keys.forEach(k => {
      try { JSON.parse(localStorage.getItem(k) || 'null'); }
      catch(e) { localStorage.removeItem(k); cleaned++; }
    });
    // 구버전 캐시 정리
    try {
      const pa = JSON.parse(localStorage.getItem('portAnalysis') || '{}');
      const bad = Object.values(pa).some(a => !a.verdict || a.verdict === 'undefined');
      if (bad) { localStorage.removeItem('portAnalysis'); cleaned++; }
    } catch(e) { localStorage.removeItem('portAnalysis'); cleaned++; }
    return cleaned;
  },

  // 완전 초기화 (최후 수단)
  fullReset() {
    if (!confirm('⚠️ SW캐시만 초기화됩니다.\n매매기록·포트폴리오는 보존돼요. 계속할까요?')) return;
    // 포트폴리오·관심종목 등 중요 데이터는 백업
    const keep = {};
    ['assetPortfolio','watchlist','pensionAccounts','dartKey','tradeHistory','portfolio','portAnalysis','alertKeywords','alertSettings','cf_worker_url'].forEach(k => {
      const v = localStorage.getItem(k);
      if (v) keep[k] = v;
    });
    localStorage.clear();
    // 중요 데이터 복원
    Object.entries(keep).forEach(([k,v]) => localStorage.setItem(k, v));
    notify('🔄 초기화 완료! 재시작합니다...', 'ok');
    setTimeout(() => location.reload(), 1200);
  }
};

function getMyStockList() {
  // 포트폴리오 + 관심종목 + ETF 전부 합치기
  const portStocks = (safeLS('portfolio', []) || []).map(p => p.code).filter(Boolean);
  const watchlist  = S.watchlist || [];
  const etfCodes   = (safeLS('assetPortfolio', []) || []).filter(p=>p.assetType==='etf').map(p=>p.id);
  const all = [...new Set([...portStocks, ...watchlist, ...etfCodes])];
  return all;
}

  portItems.forEach(p => {

    const avg = p.avgPrice || p.buyPrice || 0;
    if (cur && avg) { totalInvest += avg * (p.qty||1); totalCur += cur * (p.qty||1); }

  const totalPnl    = totalCur - totalInvest;

  const isTotalPlus = totalPnl >= 0;

    const sig    = calcSignal(code);
    const portP  = portItems.find(p=>p.code===code);
    const assetP = assetPort.find(p=>p.id===code);

function calcSignal(code) {
  // ── quant.json 실제 데이터 우선, 없으면 폴백 ──
  const qd  = QUANT_DATA[code];   // 서버사이드 퀀트 데이터
  const pr  = PRICE_BASE[code];
  const sup = (window.SUPPLY_DATA || {})[code];

  // ── quant.json 있으면 그대로 사용 ──
  if (qd && qd.total != null) {
    const { total, grade, scores, details, autoBuy, conds } = qd;
    const gradeColor = {A:'#C62828',B:'#E65100',C:'#1565C0',D:'#4A5A7A'}[grade];
    const gradeBg    = {A:'#FFEBEE',B:'#FFF3E0',C:'#E3F2FD',D:'#F4F6FA'}[grade];
    const gradeLabel = {A:'강한보유',B:'보유',C:'관찰',D:'비중축소'}[grade];

    // 실제 데이터 여부 표시
    const real = (k) => details[k]?.real ? '' : ' ⚠️';

    const signals = [
      { label:'모멘텀', val: details.momentum?.val || '—',
        good: scores.momentum>=18, bad: scores.momentum<8,
        icon: scores.momentum>=18 ? '📈▲' : '📈▼',
        score: scores.momentum, max: 25, real: details.momentum?.real },
      { label:'52주', val: details.high52?.label || '—',
        good: scores.high52>=14, bad: scores.high52<=5,
        icon: scores.high52>=14 ? '🏔▲' : '🏔▼',
        score: scores.high52, max: 20, real: details.high52?.real },
      { label:'수급', val: details.supply?.label || '—',
        good: scores.supply>=15, bad: scores.supply<=5,
        icon: scores.supply>=15 ? '💰▲' : '💰▼',
        score: scores.supply, max: 20, real: details.supply?.real },
      { label:'기술', val: details.technical?.label || '—',
        good: scores.technical>=12, bad: scores.technical<=5,
        icon: scores.technical>=12 ? '📊▲' : '📊▼',
        score: scores.technical, max: 15, real: details.technical?.real },
    ];

    const action = {
      label: autoBuy ? '매수신호' : gradeLabel,
      color: autoBuy ? '#C62828' : gradeColor,
      bg:    autoBuy ? '#FFEBEE' : gradeBg,
      emoji: autoBuy ? '🚀' : {A:'💎',B:'✅',C:'👀',D:'⚠️'}[grade],
    };
    return { score:total, grade, gradeLabel, gradeColor, gradeBg, scores, details,
             signals, action, autoBuy, conds, dataSource:'quant.json' };
  }

  // ── 폴백: 가진 데이터로만 정직하게 계산 ──
  const chg = pr?.chg || 0;
  let scores = {}, details = {};

  // 모멘텀: 당일 등락률만 (12개월 데이터 없음)
  const ms = chg>3?18:chg>1?14:chg>0?11:chg>-1?8:chg>-3?5:2;
  scores.momentum = ms;
  details.momentum = {val:`${chg>=0?'+':''}${chg.toFixed(1)}%`, label:'당일기준⚠️', real:false};

  // 52주: 당일 고저가 위치만 (52주 데이터 없음)
  let pos = 50;
  if (pr?.high && pr?.low && pr?.price) {
    const hi = parseFloat(String(pr.high).replace(/,/g,''));
    const lo = parseFloat(String(pr.low).replace(/,/g,''));
    if (hi > lo) pos = Math.round((pr.price - lo) / (hi - lo) * 100);
  }
  scores.high52 = pos>=70?12:pos>=50?9:pos>=30?6:3;
  details.high52 = {val:`당일${pos}%`, label:'52주데이터없음⚠️', real:false};

  // 수급: 당일 + 5일 연속 데이터
  const f = sup?.foreign || 0, inst = sup?.inst || 0;
  const s5 = SUPPLY5_DATA[code];
  const consec = s5?.consecutive_buy;
  const buyDays = s5?.buy_days || 0;
  let ss, slbl;
  if      (consec)          { ss=20; slbl='5일연속매수'; }
  else if (f>0&&inst>0)     { ss=20; slbl='쌍끌이매수'; }
  else if (buyDays>=3)      { ss=17; slbl=`${buyDays}일매수`; }
  else if (f>0)             { ss=15; slbl='외인매수'; }
  else if (inst>0)          { ss=12; slbl='기관매수'; }
  else if (f<0&&inst<0)     { ss=0;  slbl='쌍매도'; }
  else if (f<0)             { ss=5;  slbl='외인매도'; }
  else                      { ss=10; slbl='중립'; }
  scores.supply = ss;
  details.supply = {val:slbl, label:slbl, real:!!sup, buyDays, consecutive:consec};

  // 가치: FUND_DATA 실제 PBR 우선, 없으면 폴백
  const fdFb = FUND_DATA[code];
  if (fdFb && fdFb.pbr != null) {
    const pbr = fdFb.pbr, per = fdFb.per;
    const pbrS = pbr<=0.7?20 : pbr<=1?17 : pbr<=1.5?14 : pbr<=2?11 : pbr<=3?7 : 4;
    const perA = !per?0 : per<=10?2 : per<=20?1 : per<=30?0 : -2;
    scores.value = Math.min(20, Math.max(0, pbrS + perA));
    details.value = {val:`PBR${pbr} PER${per||'?'}`,
      label: pbr<=1?'저평가':pbr<=2?'적정':'고평가', pbr, per, real:true};
  } else {
    scores.value = 10;
    details.value = {val:'PBR없음⚠️', label:'미수집', real:false};
  }

  // 기술: 당일 시가대비만 (MACD/RSI 없음)
  let ts=8, tl='중립';
  if (pr?.price && pr?.open) {
    const op = parseFloat(String(pr.open).replace(/,/g,''));
    const ic = op>0 ? (pr.price-op)/op*100 : 0;
    if (ic>2&&pos>60){ts=13;tl='상승추세';}
    else if (ic>0)   {ts=10;tl='소폭상승';}
    else if (ic<-2)  {ts=4; tl='하락';}
  }
  scores.technical = ts;
  details.technical = {val:'MACD/RSI없음⚠️', label:tl+'(당일만)', real:false};

  const total = scores.momentum + scores.high52 + scores.supply + scores.value + scores.technical;
  const grade = total>=80?'A':total>=60?'B':total>=40?'C':'D';
  const gradeColor = {A:'#C62828',B:'#E65100',C:'#1565C0',D:'#4A5A7A'}[grade];
  const gradeBg    = {A:'#FFEBEE',B:'#FFF3E0',C:'#E3F2FD',D:'#F4F6FA'}[grade];
  const gradeLabel = {A:'강한보유',B:'보유',C:'관찰',D:'비중축소'}[grade];

  // 폴백에서는 3조건 모두 실제 확인 불가 → autoBuy 없음
  const autoBuy = false;
  const conds = {high52near:false, foreignBuy:f>0, macdRsi:false, momentum:chg>0};

  const signals = [
    {label:'모멘텀', val:details.momentum.val, good:ms>=14, bad:ms<8, icon:ms>=14?'📈▲':'📈▼', score:ms, max:25, real:false},
    {label:'52주',   val:details.high52.val,   good:false,  bad:false, icon:'🏔?', score:scores.high52, max:20, real:false},
    {label:'수급',   val:details.supply.val,   good:ss>=15, bad:ss<=5, icon:ss>=15?'💰▲':'💰▼', score:ss, max:20, real:!!sup},
    {label:'기술',   val:details.technical.label, good:ts>=12, bad:ts<=5, icon:ts>=12?'📊▲':'📊▼', score:ts, max:15, real:false},
  ];

  const action = {label:gradeLabel, color:gradeColor, bg:gradeBg,
    emoji:{A:'💎',B:'✅',C:'👀',D:'⚠️'}[grade]};

  return { score:total, grade, gradeLabel, gradeColor, gradeBg, scores, details,
           signals, action, autoBuy, conds, dataSource:'fallback' };
}

// ── 1. 포트폴리오 종합 분석 ──
async function runPortfolioAI() {
  const port = S.portfolio || [];
  if (port.length === 0) { notify('⚠️ 포트폴리오에 종목을 먼저 추가하세요', 'warn'); return; }

  S._portAILoading = true; render();
  notify('📊 포트폴리오 AI 분석 중...', 'info');

  const totalInvest = port.reduce((s,p) => s + (p.buyPrice||0)*(p.qty||1), 0);
  const totalCur    = port.reduce((s,p) => {
    const cur = PRICE_BASE[p.code]?.price || p.buyPrice;
    return s + cur*(p.qty||1);
  }, 0);

  const items = port.map(p => {
    const pr  = PRICE_BASE[p.code];
    const cur = pr?.price || p.buyPrice;
    const pnl = ((cur - p.buyPrice)/p.buyPrice*100).toFixed(1);
    const sig = calcSignal(p.code);
    return { name:p.name, code:p.code, qty:p.qty, buyPrice:p.buyPrice, curPrice:cur, pnlPct:pnl, score:sig?.total||0, sector:p.sector||'기타' };
  });

  const prompt = `당신은 KOSPI 투자 전문가입니다. 아래 포트폴리오를 분석해서 JSON으로만 응답하세요.

포트폴리오: 총투자 ${(totalInvest/10000).toFixed(0)}만원, 평가 ${(totalCur/10000).toFixed(0)}만원
종목: ${items.map(i=>i.name+'('+i.pnlPct+'%, 퀀트'+i.score+'점)').join(', ')}

반드시 아래 JSON 형식만 출력 (백틱/설명 금지):
{"verdict":"보유유지|리밸런싱|차익실현|추가매수","summary":"2문장 요약","stocks":[{"code":"종목코드","action":"매수|보유|매도|관망","reason":"이유"}],"quote":"버핏 명언"}`;

  try {
    const res  = await aiApiFetch({model:"claude-sonnet-4-20250514",max_tokens:800,system:"JSON만 응답",messages:[{role:"user",content:prompt}]});
    const data = await res.json();
    const raw  = data.content?.map(c=>c.text||'').join('') || '';
    let r;
    try {
      const cleaned = raw.replace(/```json/g,'').replace(/```/g,'').trim();
      const m = cleaned.match(/\{[\s\S]*\}/);
      r = JSON.parse(m ? m[0] : cleaned);
    } catch(e) { throw new Error('AI 응답 파싱 실패'); }

    S._portAILoading = false;
    showPortfolioAIResult(r, items, ((totalCur-totalInvest)/totalInvest*100).toFixed(1));
    render();
  } catch(e) {
    S._portAILoading = false; render();
    notify('❌ AI 분석 실패: ' + e.message, 'error');
  }
}

async function runBuyTiming(code) {
  const stock = gs(code) || ETF_LIST?.find(e=>e.code===code);
  const name  = stock?.name || code;
  const pr    = PRICE_BASE[code];
  const sup   = (window.SUPPLY_DATA || {})[code];
  const news  = NEWS.filter(n=>n.code===code).slice(0,5);

  if (!pr?.price) { notify('⚠️ 주가 데이터 없음 — 잠시 후 다시 시도하세요', 'warn'); return; }

  S._timingLoading = S._timingLoading || {};
  S._timingLoading[code] = true;
  notify(`⏱ ${name} 매수 타이밍 분석 중...`, 'info');

  const supCtx = sup ? `외국인 ${sup.foreign>=0?'+':''}${sup.foreign}주, 기관 ${sup.inst>=0?'+':''}${sup.inst}주` : '수급 데이터 없음';
  const newsCtx = news.map(n=>`${n.title} (${n.sent})`).join(' | ') || '없음';
  const chg = pr.chg || 0;
  const highLowPos = pr.high && pr.low ?
    ((pr.price - parseFloat(String(pr.low).replace(/,/g,''))) /
     (parseFloat(String(pr.high).replace(/,/g,'')) - parseFloat(String(pr.low).replace(/,/g,''))) * 100).toFixed(0) : '?';

  // 퀀트 점수 먼저 계산
  const quantSig = calcSignal(code);
  const supCtxStr = sup ? `외국인 ${sup.foreign>=0?'+':''}${sup.foreign}주, 기관 ${sup.inst>=0?'+':''}${sup.inst}주` : '수급 데이터 없음';
  const newsCtxStr = news.map(n=>`${n.title} (${n.sent})`).join(' | ') || '없음';

  const prompt = `너는 단기 트레이딩 AI다. 아래 3가지 조건이 동시에 충족될 때만 매수 신호를 생성하라.

[종목] ${name}(${code})
현재가: ${pr.price.toLocaleString()}원 / 전일대비: ${chg>=0?'+':''}${chg}%
고저위치: ${highLowPos}% (100%=52주고가)
수급: ${supCtxStr}
최근뉴스: ${newsCtxStr}

[퀀트 사전 점수]
모멘텀(25): ${quantSig.scores.momentum}점 — ${quantSig.details.momentum?.label||'?'}
52주신고가(20): ${quantSig.scores.high52}점 — ${quantSig.details.high52?.label||'?'}
외국인수급(20): ${quantSig.scores.supply}점 — ${quantSig.details.supply?.label||'?'}
가치(20): ${quantSig.scores.value}점 — ${quantSig.details.value?.label||'?'}
기술지표(15): ${quantSig.scores.technical}점 — ${quantSig.details.technical?.val||'?'}

[자동매수 3조건 체크]
조건1 - 52주 신고가 돌파/근접(80%이상): ${quantSig.conds.cond1_high52 ? '✅충족' : '❌미충족'}

      supply: {score:Math.round(supScore), label:supScore>15?'강한매수':supScore>5?'중립':'관망', detail:supCtx},

      risk: {score:5, label:'중간', detail:'변동성 보통'},
      market: '중립',
      verdict: score>=70?'강한매수':score>=55?'분할매수':score>=40?'관망':'매수금지',
      targetReturn: '+15%', stopLoss: '-7%',
      strategy: `${name} 현재 점수 ${score}점. ${score>=55?'단계적 진입 고려':'시장 확인 후 진입'}.`
    };
  }

  S._timingLoading[code] = false;
  showTimingResult(name, code, result);
}

async function runTop5AI() {
  S._top5Loading = true; render();
  notify('🔍 전체 종목 분석 중... (30초 소요)', 'info');

  // PRICE_BASE에서 데이터 있는 종목만
  const candidates = Object.entries(PRICE_BASE)
    .filter(([code, pr]) => pr.price && pr.chg != null)
    .map(([code, pr]) => {
      const stock = gs(code);
      const sup   = (window.SUPPLY_DATA || {})[code];
      const news  = NEWS.filter(n=>n.code===code);
      const posNews = news.filter(n=>n.sent==='긍정').length;
      const negNews = news.filter(n=>n.sent==='부정').length;
      const supScore= sup ? (sup.foreign>0?1:0)+(sup.inst>0?1:0) : 0;
      return {
        code, name: stock?.name||code, sector: stock?.sector||'?',
        price: pr.price, chg: pr.chg,
        supScore, newsScore: posNews-negNews,
        highLowPos: pr.high && pr.low ?
          Math.round((pr.price - parseFloat(String(pr.low).replace(/,/g,''))) /
          (parseFloat(String(pr.high).replace(/,/g,'')) - parseFloat(String(pr.low).replace(/,/g,''))) * 100) : 50
      };
    });

  // 퀀트 점수로 사전 필터링
  const quantScored = candidates.map(c => ({
    ...c,
    quant: calcSignal(c.code),
  })).filter(c => c.quant.score >= 40) // C등급 이상만
    .sort((a,b) => b.quant.score - a.quant.score);

  const top15 = quantScored.slice(0, 15).map(c =>
    `${c.name}(${c.code}): 퀀트${c.quant.score}점(${c.quant.grade}) / 수급${c.quant.details.supply?.label||'?'} / 52주${c.quant.details.high52?.label||'?'} / 모멘텀${c.quant.details.momentum?.label||'?'} / 매수신호${c.quant.autoBuy?'✅':'❌'}`
  ).join('\n');

  const prompt = `너는 단기 트레이딩 AI다. 아래 퀀트 점수 상위 종목 중 3조건(52주신고가+외국인순매수+MACD/RSI) 충족 종목을 우선으로 TOP5를 선정하라.

[퀀트 상위 15종목]
${top15}

선정 우선순위:
1순위: 3조건(autoBuy✅) 충족 종목
2순위: 퀀트점수 70점 이상
3순위: 수급강세 + 52주고가권

JSON만 응답 (마크다운 없이):
{
  "top5": [
    {"rank":1,"code":"005930","name":"삼성전자","score":82,"reason":"선정 이유 — 퀀트 기반 1문장","verdict":"강한매수|분할매수","target":"+12%","stopLoss":"-7%"},
    ...
  ],
  "marketComment": "오늘 퀀트 전략 기준 시장 코멘트 1문장",
  "updatedAt": "오늘"
}`;

  let result;
  try {
    const res  = await aiApiFetch({model:"claude-sonnet-4-20250514",max_tokens:800,system:"JSON만 응답",messages:[{role:"user",content:prompt}]});
    const data = await res.json();
    const txt  = data.content?.map(c=>c.text||'').join('').replace(/```json|```/g,'').trim();
    result = JSON.parse(txt);
  } catch(e) {
    // 폴백 - 점수 기반 자동 선정
    const scored = candidates.map(c => ({
      ...c,
      total: c.supScore*25 + c.newsScore*15 + (c.highLowPos<35?20:c.highLowPos>75?-10:5) + (c.chg>0?15:c.chg>-1?5:-5)
    })).sort((a,b)=>b.total-a.total).slice(0,5);

    result = {
      top5: scored.map((c,i)=>({
        rank: i+1, code: c.code, name: c.name,
        score: Math.min(Math.max(50+c.total, 45), 95),
        reason: `수급${c.supScore>0?'강세':'약세'}, 뉴스${c.newsScore>0?'긍정':'중립'}, 고저위치 ${c.highLowPos}%`,

      updatedAt: new Date().toLocaleTimeString('ko-KR', {hour:'2-digit',minute:'2-digit'})
    };
  }
  S.top5AI = result;

  render();

function getTrades() { return safeLS('tradeHistory', []); }
function saveTrades(trades) {

// 매매기록 추가
function addTrade(e) {
  e?.preventDefault?.();
  const v = id => document.getElementById(id)?.value;
  const code     = (v('tr-code')||'').trim().toUpperCase();
  const name     = (v('tr-name')||code).trim();
  const buyPrice = parseFloat(v('tr-buy')||0);
  const sellPrice= parseFloat(v('tr-sell')||0);
  const qty      = parseInt(v('tr-qty')||1);
  const strategy = v('tr-strategy')||'단기';
  const reason   = v('tr-reason')||'';
  const buyDate  = v('tr-buydate')||'';
  const sellDate = v('tr-selldate')||'';

  if (!code || !buyPrice || !sellPrice) {
    notify('⚠️ 종목코드, 매수가, 매도가는 필수입니다', 'warn'); return;
  }

  const pnlPct  = ((sellPrice - buyPrice) / buyPrice * 100);
  const pnlAmt  = (sellPrice - buyPrice) * qty;
  const holding = buyDate && sellDate ?
    Math.round((new Date(sellDate) - new Date(buyDate)) / 86400000) : null;

  const trade = {
    id: Date.now(),
    code, name, buyPrice, sellPrice, qty,
    strategy, reason, buyDate, sellDate,
    pnlPct: Math.round(pnlPct*100)/100,
    pnlAmt: Math.round(pnlAmt),
    holdingDays: holding,
    createdAt: new Date().toISOString()
  };

  const trades = getTrades();
  trades.unshift(trade);
  saveTrades(trades);
  notify(`✅ ${name} 매매기록 추가됨 (${pnlPct>=0?'+':''}${pnlPct.toFixed(2)}%)`, 'ok');
  render();
}

// 핵심 성과 지표 계산
function calcTradeMetrics(trades) {
  if (!trades.length) return null;
  const wins   = trades.filter(t => t.pnlPct > 0);
  const losses = trades.filter(t => t.pnlPct <= 0);
  const winRate= Math.round(wins.length / trades.length * 100);
  const avgWin = wins.length ? wins.reduce((s,t)=>s+t.pnlPct,0)/wins.length : 0;
  const avgLoss= losses.length ? Math.abs(losses.reduce((s,t)=>s+t.pnlPct,0)/losses.length) : 0;
  const rrRatio= avgLoss > 0 ? Math.round(avgWin/avgLoss*100)/100 : 0;
  const totalPnl = trades.reduce((s,t)=>s+t.pnlAmt,0);
  const grossProfit = wins.reduce((s,t)=>s+t.pnlAmt,0);
  const grossLoss   = Math.abs(losses.reduce((s,t)=>s+t.pnlAmt,0));
  const profitFactor= grossLoss > 0 ? Math.round(grossProfit/grossLoss*100)/100 : 0;

  // 최대 낙폭 (누적)
  let peak=0, cum=0, maxDD=0;
  trades.slice().reverse().forEach(t => {
    cum += t.pnlAmt;
    if (cum > peak) peak = cum;
    const dd = peak - cum;
    if (dd > maxDD) maxDD = dd;
  });

  // 전략별
  const strategies = {};
  trades.forEach(t => {
    if (!strategies[t.strategy]) strategies[t.strategy] = {trades:[],wins:0};
    strategies[t.strategy].trades.push(t);
    if (t.pnlPct > 0) strategies[t.strategy].wins++;
  });

  return { winRate, avgWin:Math.round(avgWin*100)/100, avgLoss:Math.round(avgLoss*100)/100,
           rrRatio, totalPnl, profitFactor, maxDD:Math.round(maxDD),
           total:trades.length, winCount:wins.length, lossCount:losses.length,
           strategies };
}

// ── AI 분석 1: 매매 성과 분석 ──
async function runTradeAnalysis() {
  const trades = getTrades();
  if (trades.length < 2) { notify('⚠️ 거래 2건 이상 필요합니다', 'warn'); return; }
  const metrics = calcTradeMetrics(trades);
  notify('📊 매매 성과 AI 분석 중...', 'info');

  const tradesCtx = trades.slice(0,30).map(t =>
    `${t.name}(${t.code}): ${t.strategy}전략 / 진입이유:${t.reason||'미기재'} / `+
    `매수${t.buyPrice}→매도${t.sellPrice} / 수익률${t.pnlPct>0?'+':''}${t.pnlPct}% / `+
    `${t.holdingDays!=null?t.holdingDays+'일':'기간미기재'}`
  ).join('\n');

  const prompt = `You are an AI trading analyst. Analyze this trade history and respond in Korean.

[Trade History - ${trades.length} trades]
${tradesCtx}

[Calculated Metrics]
Win Rate: ${metrics.winRate}%
Avg Win: +${metrics.avgWin}% | Avg Loss: -${metrics.avgLoss}%
Risk-Reward Ratio: ${metrics.rrRatio}x
Profit Factor: ${metrics.profitFactor}x
Max Drawdown: ${metrics.maxDD.toLocaleString()}원
Total P&L: ${metrics.totalPnl.toLocaleString()}원

Analyze and respond in JSON only (no markdown):
{
  "summary": "전체 성과 요약 2문장",
  "winRate": {"score": ${metrics.winRate}, "eval": "평가 1문장", "benchmark": "평균 대비"},
  "riskReward": {"score": ${metrics.rrRatio}, "eval": "평가 1문장"},
  "profitFactor": {"score": ${metrics.profitFactor}, "eval": "평가 1문장"},
  "bestStrategy": "가장 잘한 전략/패턴",
  "worstStrategy": "가장 나쁜 전략/패턴",
  "bestSymbol": "수익 기여 최고 종목",
  "bestReason": "가장 수익성 높은 진입이유",
  "weaknesses": ["약점1", "약점2", "약점3"],
  "riskWarnings": ["경고1", "경고2"],
  "adjustments": ["개선1", "개선2", "개선3"],
  "overallGrade": "A|B|C|D"
}`;

  try {
    const res  = await aiApiFetch({model:"claude-sonnet-4-20250514",max_tokens:1000,
      system:"JSON만 응답. 한국어로.",messages:[{role:"user",content:prompt}]});
    const data = await res.json();
    const raw6 = data.content?.map(c=>c.text||'').join('') || '';
    const jm6  = raw6.match(/{[\s\S]*}/);
    const txt  = jm6 ? jm6[0] : raw6.replace(/```json|```/g,'').trim();
    showTradeAnalysisResult(JSON.parse(txt), metrics);
  } catch(e) {
    // 폴백
    showTradeAnalysisResult({
      summary: `총 ${trades.length}건 거래, 승률 ${metrics.winRate}%, 손익비 ${metrics.rrRatio}x`,
      winRate: {score:metrics.winRate, eval: metrics.winRate>=60?'양호':'개선 필요', benchmark:'평균 55% 대비'},
      riskReward: {score:metrics.rrRatio, eval: metrics.rrRatio>=2?'우수':metrics.rrRatio>=1?'보통':'개선 필요'},
      profitFactor: {score:metrics.profitFactor, eval: metrics.profitFactor>=1.5?'우수':'개선 필요'},
      bestStrategy: Object.entries(metrics.strategies).sort((a,b)=>b[1].wins/b[1].trades.length-a[1].wins/a[1].trades.length)[0]?.[0]||'없음',
      worstStrategy: Object.entries(metrics.strategies).sort((a,b)=>a[1].wins/a[1].trades.length-b[1].wins/b[1].trades.length)[0]?.[0]||'없음',
      bestSymbol: trades.filter(t=>t.pnlPct>0).sort((a,b)=>b.pnlPct-a.pnlPct)[0]?.name||'없음',
      bestReason: '데이터 분석 필요',
      weaknesses: ['AI 연결 시 상세 분석 가능', '손실 패턴 확인 필요', '전략 일관성 점검 필요'],
      riskWarnings: metrics.maxDD>0?[`최대 낙폭 ${metrics.maxDD.toLocaleString()}원 주의`]:['현재 주요 경고 없음'],
      adjustments: ['승률 향상을 위한 진입 기준 강화', '손절 기준 명확화', '수익 전략 비중 확대'],
      overallGrade: metrics.winRate>=60&&metrics.rrRatio>=2?'A':metrics.winRate>=50?'B':'C'
    }, metrics);
  }
}

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px">
    ${[
      ['승률', r.winRate, '#E53935'],
      ['손익비', r.riskReward, '#1565C0'],
      ['수익팩터', r.profitFactor, '#2E7D32'],
    ].filter(Boolean).map(([label, d, color]) => d ? `
    <div style="background:#fff;border:1.5px solid #E2E8F4;border-radius:12px;padding:12px">
      <div style="font-size:10px;color:#94A3B8;margin-bottom:4px">${label}</div>

    </div>` : '').join('')}
    <div style="background:#fff;border:1.5px solid #E2E8F4;border-radius:12px;padding:12px">
      <div style="font-size:10px;color:#94A3B8;margin-bottom:4px">최강 종목</div>
      <div style="font-size:13px;font-weight:900;color:#0F1D3A">${r.bestSymbol}</div>
      <div style="font-size:11px;color:#4A5A7A;margin-top:3px">최고 수익 기여</div>
    </div>
  </div>

  <!-- 패턴 분석 -->
  <div style="background:#EEF4FF;border-radius:12px;padding:13px;margin-bottom:10px">

    <div style="font-size:12px;color:#0F1D3A;margin-bottom:4px">❌ 최약 전략: <b>${r.worstStrategy}</b></div>
    <div style="font-size:12px;color:#0F1D3A">💡 최고 진입이유: <b>${r.bestReason}</b></div>
  </div>

  <!-- 약점 -->
  <div style="background:#FFF3E0;border-radius:12px;padding:13px;margin-bottom:10px">
    <div style="font-size:11px;font-weight:800;color:#E65100;margin-bottom:6px">⚠️ 약점 & 경고</div>
    ${[...(r.weaknesses||[]), ...(r.riskWarnings||[])].map(w=>
      `<div style="font-size:12px;color:#4A5A7A;margin-bottom:3px">• ${w}</div>`).join('')}

    const avg = Math.round(d.trades.reduce((a,t)=>a+t.pnlPct,0)/d.trades.length*100)/100;
    return `${s}전략: ${d.trades.length}건 / 승률${wr}% / 평균${avg>0?'+':''}${avg}%`;

  const prompt = `You are a quantitative trading strategy evaluator. Respond in Korean.

[Strategy Performance]
${stratCtx}

[Overall Stats]
Win Rate: ${metrics.winRate}% | Profit Factor: ${metrics.profitFactor}x | R:R: ${metrics.rrRatio}x
Total Trades: ${metrics.total} | Max DD: ${metrics.maxDD.toLocaleString()}원

Evaluate and respond in JSON only:
{
  "healthScore": 72,
  "classification": "strong|moderate|unstable|losing",
  "isStatisticallyProfitable": true,
  "isSustainable": true,
  "winRateAdequate": true,
  "drawdownAcceptable": true,
  "strategyEvals": [
    {"name":"전략명","health":"strong|moderate|unstable|losing","issue":"문제점","fix":"개선방안"}
  ],

// ── AI 분석 4: 리스크 감시 ──
async function runRiskMonitor() {
  const trades = getTrades();
  const port   = S.portfolio || [];
  notify('🚨 리스크 감시 AI 분석 중...', 'info');
  const metrics = calcTradeMetrics(trades);

  // 오늘 거래
  const today = new Date().toISOString().slice(0,10);
  const todayTrades = trades.filter(t => t.sellDate === today || t.buyDate === today);
  const todayLoss   = todayTrades.filter(t=>t.pnlAmt<0).reduce((s,t)=>s+t.pnlAmt,0);
  const recentLosses = trades.slice(0,5).filter(t=>t.pnlPct<0).length;

  const prompt = `You are an AI risk manager. Respond in Korean.

[Account Status]
Total Trades: ${trades.length} | Win Rate: ${metrics?.winRate||0}%
Today's Trades: ${todayTrades.length} | Today's Loss: ${Math.abs(todayLoss).toLocaleString()}원
Recent 5 trades losing: ${recentLosses}/5
Max Drawdown: ${metrics?.maxDD?.toLocaleString()||0}원
Profit Factor: ${metrics?.profitFactor||0}x

Respond in JSON only:
{
  "riskStatus": "safe|caution|danger|critical",
  "riskScore": 35,
  "dailyLossRisk": "일일 손실 평가",
  "drawdownRisk": "낙폭 위험 평가",
  "overtradingRisk": "과매매 위험 평가",
  "strategyRisk": "전략 이상 탐지",
  "detectedProblems": ["문제1","문제2"],
  "protectiveActions": ["보호조치1","조치2","조치3"],
  "shouldPauseTrading": false,
  "shouldReduceSize": false,
  "shouldDisableStrategy": ""
}`;

  try {
    const res  = await aiApiFetch({model:"claude-sonnet-4-20250514",max_tokens:600,
      system:"JSON만 응답. 한국어로.",messages:[{role:"user",content:prompt}]});
    const data = await res.json();
    const raw5 = data.content?.map(c=>c.text||'').join('') || '';
    const jm5  = raw5.match(/{[\s\S]*}/);
    const txt  = jm5 ? jm5[0] : raw5.replace(/```json|```/g,'').trim();
    showRiskMonitorResult(JSON.parse(txt));
  } catch(e) {
    const status = recentLosses>=4?'danger':recentLosses>=3?'caution':'safe';
    showRiskMonitorResult({
      riskStatus: status,
      riskScore: recentLosses*20,
      dailyLossRisk: todayLoss < 0 ? `오늘 ${Math.abs(todayLoss).toLocaleString()}원 손실` : '오늘 손실 없음',
      drawdownRisk: metrics?.maxDD ? `최대낙폭 ${metrics.maxDD.toLocaleString()}원` : '낙폭 없음',
      overtradingRisk: todayTrades.length > 5 ? '과매매 주의' : '거래 빈도 정상',
      strategyRisk: recentLosses >= 3 ? '연속 손실 감지' : '전략 정상',
      detectedProblems: recentLosses>=3?['연속 손실 발생 — 전략 점검 필요']:['현재 주요 위험 없음'],
      protectiveActions: ['포지션 크기 줄이기','손절 기준 강화','잠시 관망 후 재진입'],
      shouldPauseTrading: recentLosses >= 4,
      shouldReduceSize: recentLosses >= 3,
      shouldDisableStrategy: ''
    });
  }
}

    <div style="padding:16px 18px">${bodyHtml}</div>

  document.getElementById(id)?.remove();
  document.body.appendChild(el);

function getBuffettQuote(situation) {
  // situation: 'hold' | 'buy' | 'sell' | 'caution' | null(랜덤)
  const pool = situation && BUFFETT_QUOTES[situation]
    ? BUFFETT_QUOTES[situation]
    : Object.values(BUFFETT_QUOTES).flat();
  return pool[Math.floor(Math.random() * pool.length)];
}

// 💬 게시판 — GitHub Issues API
// ══════════════════════════════════════════════
// 저장: GitHub Issues (label로 카테고리 구분)
// 읽기: 토큰 불필요 (공개 레포) / 쓰기: PAT 필요
// 설정: localStorage board_gh_owner / board_gh_repo / board_gh_token
// ══════════════════════════════════════════════

let _boardCache   = null;
let _boardFilter  = 'all';
let _boardPage    = 1;
let _boardHasNext = false;
const BOARD_PER_PAGE = 20;

/* ── GitHub 설정 로드 ── */
function getBoardGH() {
  try {
    return {
      owner: localStorage.getItem('board_gh_owner') || '',
      repo:  localStorage.getItem('board_gh_repo')  || '',
      token: localStorage.getItem('board_gh_token') || '',
    };
  } catch(e) { return {owner:'',repo:'',token:''}; }
}
function saveBoardGH(owner, repo, token) {
  try {
    localStorage.setItem('board_gh_owner', owner);
    localStorage.setItem('board_gh_repo',  repo);
    if (token) localStorage.setItem('board_gh_token', token);
    else localStorage.removeItem('board_gh_token');
  } catch(e) {}
}

/* ── 닉네임 (localStorage) ── */
function getBoardNick() {
  try { return localStorage.getItem('board_nick') || ''; } catch(e) { return ''; }
}
function saveBoardNick(n) {
  try { localStorage.setItem('board_nick', n); } catch(e) {}
}

/* ── 좋아요 (localStorage) ── */
function getLikedPosts() {
  try { return JSON.parse(localStorage.getItem('board_liked') || '[]'); } catch(e) { return []; }
}

/* ── type → GitHub label 매핑 ── */
const TYPE_LABEL = { free:'자유토론', stock:'종목토론' };
const LABEL_TYPE = { '자유토론':'free', '종목토론':'stock' };

/* ── Issues 목록 fetch ── */
async function fetchBoardPosts() {
  const gh = getBoardGH();
  if (!gh.owner || !gh.repo) return [];

  try {
    const h = { Accept:'application/vnd.github.v3+json' };
    if (gh.token) h.Authorization = `token ${gh.token}`;

    // 라벨 필터
    let labelParam = '';
    if (_boardFilter === 'free')  labelParam = '&labels=' + encodeURIComponent('자유토론');
    if (_boardFilter === 'stock') labelParam = '&labels=' + encodeURIComponent('종목토론');

    const url = `https://api.github.com/repos/${gh.owner}/${gh.repo}/issues`
      + `?state=open&per_page=${BOARD_PER_PAGE}&page=${_boardPage}&sort=created&direction=desc`
      + labelParam;

    const r = await fetch(url, {headers: h});
    if (!r.ok) throw new Error(`GitHub API ${r.status}`);

    const issues = await r.json();
    const link   = r.headers.get('Link') || '';
    _boardHasNext = link.includes('rel="next"');

    // Issue → 게시글 객체로 변환
    _boardCache = issues.map(issue => {
      // body 파싱: "닉네임: xxx / 종목: xxx / 내용: xxx" 형식
      const lines  = (issue.body || '').split('\n');
      const nick   = (lines.find(l => l.startsWith('닉네임:')) || '').replace('닉네임:','').trim() || issue.user?.login || '익명';
      const stock  = (lines.find(l => l.startsWith('종목:'))   || '').replace('종목:','').trim();
      const text   = lines.filter(l => !l.startsWith('닉네임:') && !l.startsWith('종목:')).join('\n').trim();
      const lbl    = (issue.labels||[]).find(l => LABEL_TYPE[l.name]);
      const type   = lbl ? LABEL_TYPE[lbl.name] : 'free';

      return {
        id:       String(issue.number),
        ghNumber: issue.number,
        nick, text, stock, type,
        likes:    issue.reactions?.['+1'] || 0,
        ts:       new Date(issue.created_at).getTime(),
        time:     new Date(issue.created_at).toLocaleString('ko-KR',
                    {month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}),
        commentCount: issue.comments || 0,
      };
    });
    return _boardCache;
  } catch(e) {
    console.warn('[Board]', e);
    notify('게시글 로드 실패: ' + e.message, 'warn');
    return _boardCache || [];
  }
}

/* ── 게시글 작성 → GitHub Issue 생성 ── */
async function submitBoardPost() {
  const nickEl  = document.getElementById('board-nick');
  const textEl  = document.getElementById('board-text');
  const typeEl  = document.getElementById('board-type');
  const stockEl = document.getElementById('board-stock');
  const btn     = document.getElementById('board-submit-btn');
  if (!nickEl || !textEl) return;

  const nick  = nickEl.value.trim();
  const text  = textEl.value.trim();
  const type  = typeEl?.value || 'free';
  const stock = stockEl?.value.trim() || '';
  const gh    = getBoardGH();

  if (!nick)          { notify('닉네임을 입력해주세요', 'warn'); nickEl.focus(); return; }
  if (!text)          { notify('내용을 입력해주세요', 'warn');   textEl.focus(); return; }
  if (text.length > 300) { notify('300자 이내로 작성해주세요', 'warn'); return; }
  if (!gh.owner || !gh.repo) { notify('⚙️ 게시판 설정이 필요합니다 (설정 탭)', 'warn'); return; }
  if (!gh.token)      { notify('🔑 글쓰기는 토큰 설정이 필요합니다 (설정 탭)', 'warn'); return; }

  saveBoardNick(nick);
  if (btn) { btn.disabled = true; btn.textContent = '게시 중...'; }

  try {
    // Issue body: 구조화된 텍스트로 저장
    const bodyLines = [`닉네임: ${nick}`];
    if (stock) bodyLines.push(`종목: ${stock}`);
    bodyLines.push(text);

    const label = TYPE_LABEL[type] || '자유토론';
    const payload = {
      title: nick + (stock ? ` [${stock}]` : '') + ' · ' + text.slice(0, 40) + (text.length > 40 ? '…' : ''),
      body:  bodyLines.join('\n'),
      labels:[label],
    };

    const r = await fetch(
      `https://api.github.com/repos/${gh.owner}/${gh.repo}/issues`,
      { method:'POST', headers:{ Authorization:`token ${gh.token}`, Accept:'application/vnd.github.v3+json', 'Content-Type':'application/json' },
        body: JSON.stringify(payload) }
    );
    if (!r.ok) {
      const err = await r.json();
      throw new Error(err.message || `HTTP ${r.status}`);
    }

    textEl.value = '';
    if (stockEl) stockEl.value = '';
    _boardCache = null;
    _boardPage  = 1;
    notify('✅ 게시글 등록!', 'ok');
    renderBoardTab();
  } catch(e) {
    notify('❌ 게시 실패: ' + e.message, 'warn');
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = '게시하기 ✈️'; }
  }
}

/* ── 좋아요 (로컬만 — GitHub reaction API는 토큰 필요) ── */
function boardLike(postId) {
  const liked = getLikedPosts();
  const isLiked = liked.includes(postId);
  if (isLiked) liked.splice(liked.indexOf(postId), 1);
  else liked.push(postId);
  try { localStorage.setItem('board_liked', JSON.stringify(liked)); } catch(e) {}
  // DOM만 즉시 업데이트 (re-fetch 없이)
  const btn = document.querySelector(`[data-like-id="${postId}"]`);
  if (btn) {
    const cnt = parseInt(btn.dataset.likes || '0') + (isLiked ? -1 : 1);
    btn.dataset.likes = cnt;
    btn.className = `board-like-btn${!isLiked ? ' liked' : ''}`;
    btn.innerHTML = `👍 ${cnt}`;
  }
}

/* ── 필터/페이지 변경 ── */
function setBoardFilter(f) {
  _boardFilter = f;
  _boardPage   = 1;
  _boardCache  = null;
  renderBoardTab();
}
function boardChangePage(d) {
  _boardPage = Math.max(1, _boardPage + d);
  _boardCache = null;
  renderBoardTab();
}

/* ── 설정 저장 ── */
function saveBoardSettings() {
  const o = document.getElementById('bgh-owner')?.value.trim() || '';
  const r = document.getElementById('bgh-repo')?.value.trim()  || '';
  const t = document.getElementById('bgh-token')?.value.trim() || '';
  if (!o || !r) { notify('Owner와 Repo를 입력해주세요', 'warn'); return; }
  saveBoardGH(o, r, t);
  notify('✅ 게시판 설정 저장!', 'ok');
  _boardCache = null;
  _boardPage  = 1;
  renderBoardTab();
}

/* ── 렌더: 게시글 목록 ── */
async function renderBoardTab() {
  const wrap = document.getElementById('board-content');
  if (!wrap) return;
  wrap.innerHTML = '<div style="text-align:center;padding:30px;color:#94A3B8;font-size:13px">불러오는 중... ⏳</div>';

  const gh = getBoardGH();
  if (!gh.owner || !gh.repo) {
    wrap.innerHTML = `
      <div style="text-align:center;padding:32px 20px;color:#94A3B8;font-size:13px;line-height:2">
        ⚙️ 게시판 설정이 필요합니다<br>
        <span style="color:#1565C0;font-weight:700">아래 설정 영역에서 GitHub 정보를 입력해주세요</span>
      </div>`;
    return;
  }

  const posts  = await fetchBoardPosts();
  const liked  = getLikedPosts();

  const typeStyle = {
    free:  { bg:'#EFF6FF', color:'#1565C0', label:'💬 자유' },
    stock: { bg:'#F0FFF4', color:'#2E7D32', label:'📈 종목' },
  };

  const pagination = `
    <div style="display:flex;justify-content:center;align-items:center;gap:10px;padding:12px 0">
      <button onclick="boardChangePage(-1)" ${_boardPage<=1?'disabled':''}
        style="padding:6px 14px;border-radius:8px;border:1.5px solid #E2E8F4;background:#fff;font-size:12px;font-weight:700;color:#4A5A7A;${_boardPage<=1?'opacity:.4':''}">
        ← 이전
      </button>
      <span style="font-size:12px;color:#94A3B8;font-family:monospace">${_boardPage}페이지</span>
      <button onclick="boardChangePage(1)" ${!_boardHasNext?'disabled':''}
        style="padding:6px 14px;border-radius:8px;border:1.5px solid #E2E8F4;background:#fff;font-size:12px;font-weight:700;color:#4A5A7A;${!_boardHasNext?'opacity:.4':''}">
        다음 →
      </button>
    </div>`;

  wrap.innerHTML = posts.length === 0
    ? '<div style="text-align:center;padding:40px;color:#94A3B8;font-size:13px">아직 게시글이 없어요<br>첫 글을 남겨보세요! 😊</div>'
    : posts.map(p => {
        const ts      = typeStyle[p.type] || typeStyle.free;
        const isLiked = liked.includes(p.id);
        const safeText = p.text.replace(/</g,'&lt;').replace(/\n/g,'<br>');

        return `<div class="board-post">
          <div class="board-post-hdr">
            <span class="board-post-nick">${p.nick}</span>
            <span class="board-post-type" style="background:${ts.bg};color:${ts.color}">${ts.label}</span>
            ${p.stock ? `<span class="board-stock-tag">${p.stock}</span>` : ''}
            <span class="board-post-time">${p.time}</span>
          </div>
          <div class="board-post-body">${safeText}</div>
          <div class="board-post-footer">
            <button class="board-like-btn${isLiked?' liked':''}"
              data-like-id="${p.id}" data-likes="${p.likes}"
              onclick="boardLike('${p.id}')">
              👍 ${p.likes}
            </button>
            ${p.commentCount > 0 ? `<span style="font-size:12px;color:#94A3B8">💬 ${p.commentCount}</span>` : ''}
            <a href="https://github.com/${gh.owner}/${gh.repo}/issues/${p.ghNumber}"
               target="_blank" style="font-size:11px;color:#94A3B8;margin-left:auto;text-decoration:none">
               #${p.ghNumber} ↗
            </a>
          </div>
        </div>`;
      }).join('') + pagination;
}

  return `<div class="board-wrap">

          ? `<span style="color:#2E7D32;font-size:11px">✅ ${gh.owner}/${gh.repo}</span>`

      </summary>
      <div style="background:#F4F6FA;border-radius:12px;padding:13px;margin-top:8px;display:flex;flex-direction:column;gap:8px">
        <div style="font-size:11px;color:#94A3B8;line-height:1.7;margin-bottom:2px">
          GitHub 레포 Issues를 게시판으로 사용합니다.<br>
          레포에 <b>자유토론</b> / <b>종목토론</b> 라벨을 미리 만들어주세요.
        </div>
        <input id="bgh-owner" placeholder="GitHub Owner (예: namicoco80-dotcom)"
          style="padding:9px 12px;border:1.5px solid #E2E8F4;border-radius:9px;font-size:13px;outline:none;background:#fff"
          value="${gh.owner}">
        <input id="bgh-repo" placeholder="Repository 이름 (예: kospi-board)"

          value="${gh.repo}">
        <input id="bgh-token" type="password" placeholder="PAT 토큰 (글쓰기 전용, 읽기는 불필요)"
          style="padding:9px 12px;border:1.5px solid #E2E8F4;border-radius:9px;font-size:13px;outline:none;background:#fff;letter-spacing:2px"
          value="${gh.token}">
        <div style="font-size:10px;color:#94A3B8;line-height:1.6">

        </div>
        <button onclick="saveBoardSettings()"
          style="padding:10px;background:#1565C0;color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:700">
          💾 설정 저장
        </button>
      </div>
    </details>

  </div>`;
}

// PWA Service Worker + 자동 업데이트 감지
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js?v=12')
    .then(reg => {
      console.log('[PWA] SW 등록 완료');
      // 새 SW 발견 시
      reg.addEventListener('updatefound', () => {
        const newSW = reg.installing;
        newSW.addEventListener('statechange', () => {
          if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
            showUpdateToast();
          }
        });
      });
      // 앱 포커스 시 업데이트 체크 (1시간에 1번만)
      let _lastSWCheck = 0;
      document.addEventListener('visibilitychange', () => {
        if (!document.hidden && Date.now() - _lastSWCheck > 3600000) {
          _lastSWCheck = Date.now();
          reg.update();
        }
      });
    })
    .catch(e => console.warn('[PWA] SW 실패:', e));

  // 새 버전 활성화 메시지 수신
  navigator.serviceWorker.addEventListener('message', e => {
    if (e.data?.type === 'NEW_VERSION') showUpdateToast();
  });
}

function showUpdateToast() {
  // 이미 떠있으면 스킵
  if (document.getElementById('update-toast')) return;
  const toast = document.createElement('div');
  toast.id = 'update-toast';
  toast.innerHTML = `
    <div style="
      position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
      background:#1565C0;color:#fff;border-radius:16px;
      padding:13px 18px;display:flex;align-items:center;gap:12px;
      box-shadow:0 4px 20px rgba(21,101,192,0.4);
      z-index:9999;font-size:13px;font-weight:700;
      animation:slideUp 0.3s ease;white-space:nowrap
    ">
      <span>🆕 새 버전이 있어요!</span>
      <button onclick="location.reload(true)" style="
        background:#fff;color:#1565C0;border:none;border-radius:10px;
        padding:6px 12px;font-size:12px;font-weight:800;cursor:pointer
      ">업데이트</button>
      <button onclick="document.getElementById('update-toast').remove()" style="
        background:rgba(255,255,255,0.2);color:#fff;border:none;border-radius:8px;
        padding:6px 8px;font-size:12px;cursor:pointer
      ">✕</button>
    </div>`;
  document.body.appendChild(toast);
  // 10초 후 자동 사라짐
  setTimeout(() => toast?.remove(), 10000);
}</script>

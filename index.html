<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>KOSPI INTEL</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');
:root{--bg:#F4F6FA;--bg2:#EBEEF5;--surface:#fff;--surface2:#F8F9FC;--border:#E2E6EF;--border2:#CDD3E0;--text-primary:#1A1D23;--text-secondary:#5A6279;--text-muted:#9BA3B8;--accent:#2563EB;--accent-light:#DBEAFE;--accent-hover:#1D4ED8;--rise:#E53E3E;--rise-bg:#FFF5F5;--rise-light:#FED7D7;--fall:#3182CE;--fall-bg:#EBF8FF;--fall-light:#BEE3F8;--neutral:#718096;--gold:#D4A017;--gold-light:#FEF9C3;--shadow-sm:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);--shadow-md:0 4px 12px rgba(0,0,0,.08),0 2px 4px rgba(0,0,0,.05);--shadow-lg:0 12px 32px rgba(0,0,0,.12),0 4px 8px rgba(0,0,0,.06);--r-sm:8px;--r-md:12px;--r-lg:16px;--r-xl:20px;--r-full:9999px;--font-sans:'Noto Sans KR',-apple-system,sans-serif;--font-mono:'JetBrains Mono',monospace;--header-h:56px;--tabbar-h:64px;--t-fast:.15s ease;--t-med:.25s ease}
[data-theme="dark"]{--bg:#0F1117;--bg2:#161B27;--surface:#1C2130;--surface2:#222840;--border:#2A3350;--border2:#364060;--text-primary:#E8ECF4;--text-secondary:#8E99B8;--text-muted:#4E5B7A;--accent-light:#1E2D56;--rise-bg:#2D1515;--rise-light:#5C2020;--fall-bg:#0D1E30;--fall-light:#1A3A5C;--gold-light:#2A2010;--shadow-sm:0 1px 3px rgba(0,0,0,.3);--shadow-md:0 4px 12px rgba(0,0,0,.4);--shadow-lg:0 12px 32px rgba(0,0,0,.5)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px;-webkit-text-size-adjust:100%}
body{font-family:var(--font-sans);background:var(--bg);color:var(--text-primary);min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input{font-family:inherit}
a{text-decoration:none;color:inherit}
ul,ol{list-style:none}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
/* LAYOUT */
#app-header{position:fixed;top:0;left:0;right:0;z-index:100;height:var(--header-h);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 16px;box-shadow:var(--shadow-sm)}
.header-logo{font-size:1.14rem;font-weight:700;letter-spacing:-.5px;color:var(--text-primary)}
.header-logo span{color:var(--accent)}
.header-right{display:flex;align-items:center;gap:8px}
.header-btn{width:36px;height:36px;border-radius:var(--r-full);display:flex;align-items:center;justify-content:center;color:var(--text-secondary);transition:background var(--t-fast)}
.header-btn:hover,.header-btn:active{background:var(--bg2)}
.header-btn svg{width:20px;height:20px}
#main-content{padding-top:var(--header-h);padding-bottom:calc(var(--tabbar-h) + 8px);min-height:100dvh}
#tab-bar{position:fixed;bottom:0;left:0;right:0;z-index:100;height:var(--tabbar-h);background:var(--surface);border-top:1px solid var(--border);display:flex;align-items:center;padding-bottom:env(safe-area-inset-bottom,0px)}
.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;height:100%;padding:6px 4px;color:var(--text-muted);transition:color var(--t-fast);position:relative}
.tab-item.active{color:var(--accent)}
.tab-item svg{width:22px;height:22px}
.tab-item span{font-size:.71rem;font-weight:500}
/* 공통 */
.section-header{display:flex;align-items:center;justify-content:space-between;padding:16px 16px 8px}
.section-title{font-size:1rem;font-weight:700;color:var(--text-primary)}
.section-link{font-size:.79rem;color:var(--accent);font-weight:500}
.card{background:var(--surface);border-radius:var(--r-lg);border:1px solid var(--border);box-shadow:var(--shadow-sm);overflow:hidden}
.chip{display:inline-flex;align-items:center;padding:5px 12px;border-radius:var(--r-full);font-size:.79rem;font-weight:500;border:1px solid var(--border);background:var(--surface);color:var(--text-secondary);white-space:nowrap;transition:all var(--t-fast);cursor:pointer}
.chip.active{background:var(--accent);border-color:var(--accent);color:#fff}
.chip-scroll{display:flex;gap:6px;overflow-x:auto;padding:0 16px 12px;scrollbar-width:none}
.chip-scroll::-webkit-scrollbar{display:none}
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:.71rem;font-weight:600}
.tag-rise{background:var(--rise-bg);color:var(--rise)}
.tag-fall{background:var(--fall-bg);color:var(--fall)}
.tag-neutral{background:var(--bg2);color:var(--neutral)}
.tag-gold{background:var(--gold-light);color:var(--gold)}
.tag-blue{background:var(--accent-light);color:var(--accent)}
.num-rise{color:var(--rise);font-weight:600}
.num-fall{color:var(--fall);font-weight:600}
.num-neutral{color:var(--neutral)}
.search-bar{display:flex;align-items:center;gap:8px;margin:12px 16px;padding:10px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-full)}
.search-bar svg{width:16px;height:16px;color:var(--text-muted);flex-shrink:0}
.search-bar input{flex:1;background:none;border:none;outline:none;font-size:.86rem;color:var(--text-primary)}
.search-bar input::placeholder{color:var(--text-muted)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 18px;border-radius:var(--r-md);font-size:.86rem;font-weight:600;transition:all var(--t-fast)}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-hover)}
.btn-outline{border:1.5px solid var(--border2);color:var(--text-secondary);background:var(--surface)}
.btn-outline:hover{border-color:var(--accent);color:var(--accent)}
.btn-sm{padding:6px 12px;font-size:.79rem;border-radius:var(--r-sm)}
#toast-container{position:fixed;bottom:calc(var(--tabbar-h) + 16px);left:50%;transform:translateX(-50%);z-index:1000;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:var(--text-primary);color:#fff;padding:10px 18px;border-radius:var(--r-full);font-size:.86rem;font-weight:500;white-space:nowrap;animation:toastIn .25s ease,toastOut .25s ease 2.5s forwards;box-shadow:var(--shadow-md)}
@keyframes toastIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastOut{from{opacity:1}to{opacity:0}}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 24px;gap:12px;color:var(--text-muted);text-align:center}
.empty-state svg{width:48px;height:48px;opacity:.4}
.empty-state p{font-size:.86rem;line-height:1.5}
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
/* 내종목 */
.asset-summary-card{margin:12px 16px;padding:20px;background:var(--surface);border-radius:var(--r-xl);border:1px solid var(--border);box-shadow:var(--shadow-md)}
.asset-label{font-size:.79rem;color:var(--text-muted);display:flex;align-items:center;gap:6px;margin-bottom:4px}
.asset-total{font-size:1.86rem;font-weight:700;letter-spacing:-1px;font-family:var(--font-mono);color:var(--text-primary)}
.asset-pnl{font-size:.93rem;font-weight:600;margin-top:4px}
.asset-actions{display:flex;gap:0;border-top:1px solid var(--border);margin-top:16px}
.asset-action-btn{flex:1;padding:12px;text-align:center;font-size:.86rem;font-weight:600;color:var(--text-secondary);transition:background var(--t-fast)}
.asset-action-btn:first-child{border-right:1px solid var(--border)}
.asset-action-btn:hover{background:var(--bg2)}
.quick-menu{display:flex;gap:0;overflow-x:auto;padding:4px 16px 12px;scrollbar-width:none}
.quick-menu::-webkit-scrollbar{display:none}
.quick-item{display:flex;flex-direction:column;align-items:center;gap:8px;min-width:72px;padding:12px 8px}
.quick-icon{width:52px;height:52px;border-radius:var(--r-lg);background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:1.4rem;transition:transform var(--t-fast)}
.quick-item:active .quick-icon{transform:scale(.92)}
.quick-label{font-size:.71rem;color:var(--text-secondary);text-align:center;line-height:1.3}
.stock-list{display:flex;flex-direction:column;gap:1px}
.stock-item{display:flex;align-items:center;padding:14px 16px;background:var(--surface);border-bottom:1px solid var(--border);gap:12px;transition:background var(--t-fast);cursor:pointer}
.stock-item:active{background:var(--bg2)}
.stock-item:last-child{border-bottom:none}
.stock-logo{width:40px;height:40px;border-radius:var(--r-md);background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:.93rem;font-weight:700;color:var(--text-secondary);flex-shrink:0;border:1px solid var(--border)}
.stock-info{flex:1;min-width:0}
.stock-name{font-size:.93rem;font-weight:600;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stock-code{font-size:.71rem;color:var(--text-muted);font-family:var(--font-mono);margin-top:1px}
.stock-supply{display:flex;gap:4px;margin-top:3px}
.supply-dot{font-size:.64rem;padding:1px 5px;border-radius:3px;font-weight:600}
.stock-price-wrap{text-align:right;flex-shrink:0}
.stock-price{font-family:var(--font-mono);font-size:.93rem;font-weight:600;color:var(--text-primary)}
.stock-chg{font-family:var(--font-mono);font-size:.79rem;font-weight:600;margin-top:2px}
/* 뉴스 */
.news-filter-row{display:flex;gap:6px;overflow-x:auto;padding:8px 16px;scrollbar-width:none}
.news-filter-row::-webkit-scrollbar{display:none}
.news-card{background:var(--surface);border-radius:var(--r-lg);border:1px solid var(--border);box-shadow:var(--shadow-sm);margin:0 16px 10px;overflow:hidden;cursor:pointer;transition:box-shadow var(--t-fast),transform var(--t-fast)}
.news-card:active{transform:scale(.98)}
.news-card.urgent{border-left:3px solid var(--rise)}
.news-card-header{display:flex;align-items:center;gap:8px;padding:12px 14px 0}
.news-type-badge{font-size:.64rem;font-weight:700;padding:2px 7px;border-radius:4px;letter-spacing:.3px}
.type-official{background:#EEF2FF;color:#4338CA}
.type-news{background:#F0FDF4;color:#166534}
.type-analyst{background:#FFF7ED;color:#9A3412}
.type-rumor{background:#FDF4FF;color:#7E22CE}
.grade-badge{font-size:.71rem;font-weight:700;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.grade-a{background:#DCFCE7;color:#15803D}
.grade-b{background:#FEF9C3;color:#A16207}
.grade-c{background:#FEE2E2;color:#DC2626}
.news-time{font-size:.71rem;color:var(--text-muted);margin-left:auto}
.news-card-body{padding:8px 14px 12px}
.news-title{font-size:.9rem;font-weight:600;color:var(--text-primary);line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.news-body-preview{font-size:.79rem;color:var(--text-secondary);margin-top:5px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.news-themes{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.news-theme-tag{font-size:.64rem;padding:2px 7px;background:var(--accent-light);color:var(--accent);border-radius:4px;font-weight:500}
.impact-bar-wrap{padding:0 14px 10px;display:flex;align-items:center;gap:8px}
.impact-bar-bg{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.impact-bar-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--fall) 0%,var(--gold) 50%,var(--rise) 100%);transition:width .5s ease}
.impact-score{font-size:.71rem;font-weight:700;color:var(--text-muted);font-family:var(--font-mono);min-width:28px;text-align:right}
.news-card-footer{display:flex;align-items:center;justify-content:space-between;padding:8px 14px 12px;border-top:1px solid var(--border)}
.news-stock-badge{font-size:.71rem;font-weight:600;padding:3px 9px;border-radius:var(--r-sm);background:var(--bg2);color:var(--text-secondary);font-family:var(--font-mono)}
.news-detail-btn{font-size:.79rem;color:var(--accent);font-weight:600;padding:4px 0}
.ai-preview{padding:8px 14px;background:linear-gradient(135deg,var(--accent-light),var(--bg2));display:flex;gap:8px;align-items:flex-start}
.ai-icon{font-size:1rem;flex-shrink:0;margin-top:1px}
.ai-text{font-size:.79rem;color:var(--text-secondary);line-height:1.5}
/* 모달 */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;opacity:0;transition:opacity var(--t-med)}
.modal-backdrop.show{opacity:1}
.bottom-sheet{position:fixed;bottom:0;left:0;right:0;z-index:201;background:var(--surface);border-radius:var(--r-xl) var(--r-xl) 0 0;max-height:88dvh;overflow-y:auto;transform:translateY(100%);transition:transform .35s cubic-bezier(.34,1.12,.64,1);padding-bottom:env(safe-area-inset-bottom,0px)}
.bottom-sheet.show{transform:translateY(0)}
.sheet-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:10px auto 0}
.sheet-header{padding:12px 20px 16px;border-bottom:1px solid var(--border)}
.sheet-stock-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.sheet-stock-logo{width:36px;height:36px;border-radius:var(--r-sm);background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:.86rem;font-weight:700;color:var(--text-secondary);border:1px solid var(--border)}
.sheet-title{font-size:.97rem;font-weight:700;line-height:1.4;color:var(--text-primary)}
.sheet-meta{display:flex;gap:8px;align-items:center}
.sheet-body{padding:16px 20px}
.sheet-price-row{display:flex;gap:10px;background:var(--surface2);border-radius:var(--r-md);padding:12px;margin-bottom:14px}
.sheet-price-item{flex:1;text-align:center}
.sheet-price-label{font-size:.71rem;color:var(--text-muted);margin-bottom:3px}
.sheet-price-val{font-family:var(--font-mono);font-size:.9rem;font-weight:700;color:var(--text-primary)}
.ai-btn-group{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.ai-action-btn{display:flex;flex-direction:column;align-items:center;gap:5px;padding:12px 8px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-md);font-size:.71rem;font-weight:600;color:var(--text-secondary);transition:all var(--t-fast)}
.ai-action-btn:hover,.ai-action-btn:active{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}
.ai-action-btn .ai-btn-icon{font-size:1.2rem}
.ai-result-block{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-md);padding:14px;margin-bottom:12px}
.ai-result-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.ai-result-title{font-size:.86rem;font-weight:700;color:var(--text-primary)}
.judge-signals{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
.judge-signal{text-align:center;padding:10px 6px;border-radius:var(--r-sm);border:1px solid var(--border)}
.judge-signal-period{font-size:.64rem;color:var(--text-muted);margin-bottom:4px}
.judge-signal-val{font-size:.86rem;font-weight:700}
.signal-buy{background:var(--rise-bg);border-color:var(--rise-light);color:var(--rise)}
.signal-sell{background:var(--fall-bg);border-color:var(--fall-light);color:var(--fall)}
.signal-hold{background:var(--gold-light);border-color:#FDE68A;color:var(--gold)}
.fact-meter{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.fact-score-circle{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:1.07rem;font-weight:700;flex-shrink:0}
.fact-text{font-size:.79rem;color:var(--text-secondary);line-height:1.5}
/* 포트 */
.port-summary{margin:12px 16px;padding:16px;background:var(--surface);border-radius:var(--r-lg);border:1px solid var(--border)}
.port-summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}
.port-stat-label{font-size:.71rem;color:var(--text-muted);margin-bottom:2px}
.port-stat-val{font-family:var(--font-mono);font-size:1rem;font-weight:700}
.port-item{display:flex;align-items:center;padding:14px 16px;background:var(--surface);border-bottom:1px solid var(--border);gap:12px}
.port-item-info{flex:1;min-width:0}
.port-item-name{font-size:.9rem;font-weight:600}
.port-item-detail{font-size:.71rem;color:var(--text-muted);margin-top:2px;font-family:var(--font-mono)}
.port-item-right{text-align:right}
.port-item-val{font-family:var(--font-mono);font-size:.9rem;font-weight:700}
.port-item-pnl{font-family:var(--font-mono);font-size:.79rem;font-weight:600;margin-top:2px}
.port-item-bar-wrap{width:100%;height:3px;background:var(--border);border-radius:2px;margin-top:8px;overflow:hidden}
.port-item-bar{height:100%;border-radius:2px;transition:width .4s ease}
.quant-score{display:flex;align-items:center;gap:8px;padding:8px 0}
.quant-bar-wrap{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.quant-bar{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--fall) 0%,var(--gold) 50%,var(--rise) 100%);transition:width .5s ease}
.quant-val{font-family:var(--font-mono);font-size:.79rem;font-weight:700;min-width:28px;text-align:right}
/* 매매 */
.trade-form-card{margin:12px 16px;padding:16px;background:var(--surface);border-radius:var(--r-lg);border:1px solid var(--border)}
.trade-form-title{font-size:.93rem;font-weight:700;margin-bottom:12px}
.form-row{display:flex;gap:8px;margin-bottom:8px}
.form-field{flex:1}
.form-label{font-size:.71rem;color:var(--text-muted);margin-bottom:4px;display:block}
.form-input{width:100%;padding:9px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);font-size:.86rem;color:var(--text-primary);outline:none;transition:border-color var(--t-fast)}
.form-input:focus{border-color:var(--accent)}
.trade-type-toggle{display:flex;border-radius:var(--r-sm);overflow:hidden;border:1px solid var(--border)}
.trade-type-btn{flex:1;padding:9px;text-align:center;font-size:.86rem;font-weight:600;color:var(--text-muted);transition:all var(--t-fast);cursor:pointer}
.trade-type-btn.active-buy{background:var(--rise-bg);color:var(--rise)}
.trade-type-btn.active-sell{background:var(--fall-bg);color:var(--fall)}
.trade-record{padding:12px 16px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.trade-type-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.trade-info{flex:1}
.trade-name{font-size:.86rem;font-weight:600}
.trade-detail{font-size:.71rem;color:var(--text-muted);font-family:var(--font-mono);margin-top:2px}
.trade-right{text-align:right}
.trade-amount{font-family:var(--font-mono);font-size:.86rem;font-weight:600}
/* 종목 */
.stocks-table{background:var(--surface);border-top:1px solid var(--border)}
.stocks-thead{display:grid;grid-template-columns:1fr auto auto auto;padding:8px 16px;background:var(--surface2);border-bottom:1px solid var(--border)}
.stocks-th{font-size:.71rem;color:var(--text-muted);font-weight:600;text-align:right}
.stocks-th:first-child{text-align:left}
.stocks-row{display:grid;grid-template-columns:1fr auto auto auto;align-items:center;padding:11px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background var(--t-fast);gap:8px}
.stocks-row:active{background:var(--bg2)}
.stocks-row:last-child{border-bottom:none}
.stocks-name{font-size:.86rem;font-weight:600}
.stocks-code{font-size:.64rem;color:var(--text-muted);font-family:var(--font-mono);margin-top:1px}
.stocks-price{font-family:var(--font-mono);font-size:.86rem;font-weight:600;text-align:right}
.stocks-chg{font-family:var(--font-mono);font-size:.79rem;font-weight:600;text-align:right;min-width:52px}
.stocks-quant{font-family:var(--font-mono);font-size:.79rem;font-weight:700;text-align:right;min-width:28px}
/* 히트맵 */
.heatmap-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:0 16px 12px}
.heatmap-cell{border-radius:var(--r-md);padding:12px 10px;text-align:center;cursor:pointer;transition:transform var(--t-fast)}
.heatmap-cell:active{transform:scale(.95)}
.heatmap-sector{font-size:.79rem;font-weight:700;margin-bottom:4px}
.heatmap-count{font-size:.64rem;opacity:.8}
.theme-card{background:var(--surface);border-radius:var(--r-lg);border:1px solid var(--border);padding:14px;margin:0 16px 8px;cursor:pointer;transition:box-shadow var(--t-fast)}
.theme-card:hover{box-shadow:var(--shadow-md)}
.theme-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.theme-name{font-size:.93rem;font-weight:700}
.theme-count{font-size:.71rem;color:var(--text-muted)}
.theme-stocks{display:flex;gap:4px;flex-wrap:wrap}
.theme-stock-tag{font-size:.64rem;padding:2px 7px;background:var(--bg2);border-radius:4px;color:var(--text-secondary);font-family:var(--font-mono)}
/* 설정 */
.alert-section{padding:0 16px;margin-bottom:16px}
.alert-section-title{font-size:.79rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;padding:16px 0 8px;border-bottom:1px solid var(--border);margin-bottom:12px}
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border)}
.setting-label{font-size:.86rem;color:var(--text-primary)}
.setting-desc{font-size:.71rem;color:var(--text-muted);margin-top:2px}
.toggle-switch{position:relative;width:44px;height:24px;cursor:pointer}
.toggle-switch input{display:none}
.toggle-track{width:100%;height:100%;background:var(--border2);border-radius:12px;transition:background var(--t-fast)}
.toggle-switch input:checked+.toggle-track{background:var(--accent)}
.toggle-thumb{position:absolute;top:2px;left:2px;width:20px;height:20px;background:#fff;border-radius:50%;box-shadow:0 1px 3px rgba(0,0,0,.2);transition:left var(--t-fast)}
.toggle-switch input:checked~.toggle-thumb{left:22px}
.keyword-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.keyword-tag{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;background:var(--accent-light);color:var(--accent);border-radius:var(--r-full);font-size:.79rem;font-weight:500}
.keyword-remove{cursor:pointer;opacity:.6;font-size:1rem;line-height:1}
.keyword-remove:hover{opacity:1}
.worker-input-row{display:flex;gap:8px;margin-top:8px}
.worker-input-row input{flex:1}
/* 애니메이션 */
.fade-in{animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
</style>

const SRC = {

  {name:'AI·반도체',codes:['005930','000660'],icon:'🤖',news:0,avgImpact:0},

/* ── 초기화 ── */
function initApp() {
  loadLocalState();
  applyTheme();

}

function loadLocalState() {
  try {
    S.watchlist = JSON.parse(localStorage.getItem('ki_watchlist')||'[]');
    S.portfolio = JSON.parse(localStorage.getItem('ki_portfolio')||'[]');
    S.keywords = JSON.parse(localStorage.getItem('ki_keywords')||'[]');
    S.alertSettings = JSON.parse(localStorage.getItem('ki_alertSettings')||'{"surge":true,"newIssue":true,"keyword":true}');
    S.dartKey = localStorage.getItem('ki_dartKey')||'';
    S._cfWorkerUrl = localStorage.getItem('ki_cfWorkerUrl')||CF_WORKER_URL;
    S._theme = localStorage.getItem('ki_theme')||'light';
    NEWS = JSON.parse(localStorage.getItem('ki_newsCache')||'[]');
    const ac = JSON.parse(localStorage.getItem('ki_analysisCache')||'{}');
    NEWS.forEach(n=>{ const c=ac[String(n.id)]; if(c) Object.assign(n,c); });
  } catch(e){}
}

function saveLocalState() {
  try {
    localStorage.setItem('ki_watchlist',JSON.stringify(S.watchlist));
    localStorage.setItem('ki_portfolio',JSON.stringify(S.portfolio));
    localStorage.setItem('ki_keywords',JSON.stringify(S.keywords));
    localStorage.setItem('ki_alertSettings',JSON.stringify(S.alertSettings));
    localStorage.setItem('ki_dartKey',S.dartKey);
    localStorage.setItem('ki_cfWorkerUrl',S._cfWorkerUrl);
    localStorage.setItem('ki_theme',S._theme);
  } catch(e){}
}

/* ── 인라인 데이터 로드 (fetch 없음) ── */
function loadInlineData() {
  const d = INLINE_DATA;
  PRICES={};
  (d.stocks||[]).forEach(s=>{ PRICES[s.code]=s; });
  SUPPLY={};
  (d.supply||[]).forEach(s=>{ SUPPLY[s.code]=s; });
  STOCKS_LIST = d.stocks||[];

  // 뉴스 병합
  const existIds = new Set(NEWS.map(n=>String(n.id)));
  (d.news||[]).forEach(n=>{
    const norm = normalizeNewsItem(n);
    if(!existIds.has(String(norm.id))){ NEWS.unshift(norm); existIds.add(String(norm.id)); }
  });
  if(NEWS.length>200) NEWS=NEWS.slice(0,200);

  // localStorage 없으면 기본값
  if(!S.portfolio.length) S.portfolio = d.portfolio||[];
  if(!S.watchlist.length) S.watchlist = d.watchlist||[];

  // 퀀트 점수
  STOCKS_LIST.forEach(s=>{
    if(!QUANT[s.code]) QUANT[s.code]={
      total:Math.floor(Math.random()*40+45),
      momentum:Math.floor(Math.random()*100),
      supply:Math.floor(Math.random()*100),
      value:Math.floor(Math.random()*100),
      tech:Math.floor(Math.random()*100)
    };
  });

  S._priceUpdatedAt = new Date();
  updateThemeStats();
  try{ localStorage.setItem('ki_newsCache',JSON.stringify(NEWS.slice(0,50))); }catch(e){}
}

async function fetchAllData() {
  try {
    const workerUrl = getWorkerUrl();
    const res = await fetch(workerUrl+'?action=news',{signal:AbortSignal.timeout(8000)});
    if(!res.ok) throw new Error('worker fail');
    const data = await res.json();
    if(data.news) {
      const existIds = new Set(NEWS.map(n=>String(n.id)));
      data.news.forEach(n=>{
        const norm = normalizeNewsItem(n);
        if(!existIds.has(String(norm.id))){ NEWS.unshift(norm); existIds.add(String(norm.id)); }
      });
      if(NEWS.length>200) NEWS=NEWS.slice(0,200);
      updateThemeStats();
      showToast('뉴스 갱신 완료');
    }
  } catch(e){ /* Worker 없으면 인라인 데이터 사용 */ }
}

function normalizeNewsItem(n,i) {
  return {
    id:n.id??i??Math.random(), title:n.title||'제목 없음', body:n.body||'',
    code:n.code||'000000', type:n.type||'news', sent:n.sent||'중립',
    sources:n.sources??1, speed:n.speed||'보통', urgency:n.urgency??3,
    impactScore:n.impactScore??Math.floor(Math.random()*60+20),
    themes:n.themes||[], relStocks:n.relStocks||[], spreadHistory:n.spreadHistory||[],
    time:n.time||'--:--', collectedAt:n.collectedAt||new Date().toISOString(),
    score:n.score??null, verdict:n.verdict??null, detail:n.detail??null,
    judgment:n.judgment??null, aiSummary:n.aiSummary??null,
    aiKeywords:n.aiKeywords??[], dartResult:n.dartResult??null
  };
}

function updateThemeStats() {
  THEMES_DATA.forEach(theme=>{
    const rel = NEWS.filter(n=>theme.codes.includes(n.code)||theme.codes.some(c=>(n.relStocks||[]).some(r=>r.code===c)));
    theme.news = rel.length;
    theme.avgImpact = rel.length ? Math.round(rel.reduce((a,b)=>a+(b.impactScore||0),0)/rel.length) : 0;
  });
}

function getWorkerUrl(){ return S._cfWorkerUrl||CF_WORKER_URL; }

/* ── 탭 라우팅 ── */
function render() {
  const main = document.getElementById('main-content');
  if(!main) return;
  document.querySelectorAll('.tab-item').forEach(el=>{
    el.classList.toggle('active',el.dataset.tab===S.tab);
  });
  main.innerHTML='';
  switch(S.tab){
    case 'my':    main.innerHTML=rMyStocks(); break;
    case 'feed':  main.innerHTML=rFeed(); break;
    case 'port':  main.innerHTML=rPortfolio(); break;
    case 'trade': main.innerHTML=rTradelog(); break;
    case 'hm':    main.innerHTML=rHeatmap(); break;
    case 'sk':    main.innerHTML=rStocks(); break;
    case 'alert': main.innerHTML=rAlert(); break;
    default:      main.innerHTML=rMyStocks();
  }
}

/* ── 테마/유틸 ── */
function toggleTheme(){ S._theme=S._theme==='light'?'dark':'light'; applyTheme(); saveLocalState(); }
function applyTheme(){ document.documentElement.setAttribute('data-theme',S._theme); }

let _refreshTimer=null;
function startAutoRefresh(){
  if(_refreshTimer) clearInterval(_refreshTimer);
  _refreshTimer=setInterval(()=>{ if(S.autoRefresh) fetchAllData().then(()=>{ if(['my','feed','sk'].includes(S.tab)) render(); }); },5*60*1000);
}

function fmt(n){ if(n==null) return '--'; return Math.abs(n)>=100000000?(n/100000000).toFixed(1)+'억':Math.abs(n)>=10000?(n/10000).toFixed(0)+'만':n.toLocaleString('ko-KR'); }
function fmtPrice(p){ if(p==null) return '--'; return p.toLocaleString('ko-KR')+'원'; }
function fmtChg(c){ if(c==null) return '--'; return (c>=0?'+':'')+c.toFixed(2)+'%'; }
function chgClass(c){ if(c==null) return 'num-neutral'; return c>0?'num-rise':c<0?'num-fall':'num-neutral'; }
function gradeOf(n){ const s=n.sources??1,t=n.type||'news'; if(t==='official'||s>=4) return 'A'; if(s>=2||t==='analyst') return 'B'; return 'C'; }
function stockName(code){ const s=PRICES[code]||STOCKS_LIST.find(s=>s.code===code); return s?s.name:code; }
function stockLogo(code){ const n=stockName(code); return n?n.charAt(0):'?'; }
function fmtUpdated(){ if(!S._priceUpdatedAt) return ''; const d=S._priceUpdatedAt; return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0')+' 기준'; }

function showToast(msg){
  const c=document.getElementById('toast-container'); if(!c) return;
  const t=document.createElement('div'); t.className='toast'; t.textContent=msg;
  c.appendChild(t); setTimeout(()=>t.remove(),2800);
}

function toggleWatchlist(code){
  const i=S.watchlist.indexOf(code);
  if(i>=0){ S.watchlist.splice(i,1); showToast('관심종목에서 제거했습니다.'); }
  else{ S.watchlist.push(code); showToast('관심종목에 추가했습니다.'); }
  saveLocalState(); render();
}

function goFeedByCode(code){ S.tab='feed'; S.q=code; render(); }
function goFeedBySector(s){ S.tab='feed'; S.sector=s; S.q=''; render(); }
function goFeedByTheme(t){ S.tab='feed'; S.themeFilter=t; render(); }

      <div style="font-size:.71rem;color:var(--text-muted);margin-top:4px;">${fmtUpdated()}</div>
      <div class="asset-actions">
        <button class="asset-action-btn" onclick="switchTab('port')">자산 전체보기</button>
        <button class="asset-action-btn" onclick="switchTab('trade')">거래신청현황</button>
      </div>
    </div>
    <div class="quick-menu">${qm.map(m=>`<button class="quick-item" onclick="switchTab('${m.t}')"><div class="quick-icon">${m.i}</div><span class="quick-label">${m.l}</span></button>`).join('')}</div>
    <div class="section-header"><span class="section-title">관심종목</span><button class="section-link" onclick="switchTab('sk')">종목 추가 ›</button></div>
    <div class="card" style="margin:0 16px 12px;border-radius:var(--r-lg);">
      <div class="stock-list">${ws.length===0?'<div class="empty-state" style="padding:32px;"><p>관심종목을 추가하세요</p></div>':ws.map(s=>stockItemHTML(s)).join('')}</div>
    </div>
    <div class="section-header"><span class="section-title">주요 이슈</span><button class="section-link" onclick="switchTab('feed')">전체보기 ›</button></div>

function stockItemHTML(s){
  const sup=s.sup||{};
  const fD=(sup.foreign||0)>0?'▲':'▼', iD=(sup.institution||0)>0?'▲':'▼';
  const fC=(sup.foreign||0)>0?'var(--rise)':'var(--fall)', iC=(sup.institution||0)>0?'var(--rise)':'var(--fall)';

function miniNewsCard(n){
  const src=SRC[n.type]||SRC.news;
  return `<div style="margin:0 16px 6px;padding:12px 14px;background:var(--surface);border-radius:var(--r-md);border:1px solid var(--border);cursor:pointer;" onclick="S.tab='feed';render();setTimeout(()=>showCardModal(NEWS.find(x=>String(x.id)==='${String(n.id)}')),100)">
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:4px;">
      <span style="font-size:.64rem;font-weight:700;padding:2px 7px;border-radius:4px;background:${src.bg};color:${src.color}">${src.label}</span>
      <span style="font-size:.71rem;color:var(--text-muted);margin-left:auto;">${n.time}</span>
    </div>
    <div style="font-size:.86rem;font-weight:600;line-height:1.4;color:var(--text-primary);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">${n.title}</div>
  </div>`;
}

function calcPortTotal(){
  let cost=0,ev=0;
  S.portfolio.forEach(p=>{ const cur=PRICES[p.code]?PRICES[p.code].price:p.buyPrice; cost+=p.buyPrice*p.qty; ev+=cur*p.qty; });
  return {cost,eval:ev||cost};
}
function calcPortPnl(){ const {cost,eval:ev}=calcPortTotal(); return ev-cost; }

function reCards(){ const el=document.getElementById('feed-cards'); if(el) el.innerHTML=feedCardsHTML(); }

function filteredNews(){
  return NEWS.filter(n=>{
    if(S.tf!=='전체'&&n.type!==S.tf) return false;
    if(S.gradeFilter!=='all'&&gradeOf(n)!==S.gradeFilter) return false;
    if(S.themeFilter&&!(n.themes||[]).some(t=>t.includes(S.themeFilter)||S.themeFilter.includes(t))) return false;
    if(S.q){ const q=S.q.toLowerCase(); if(!n.title.toLowerCase().includes(q)&&!n.code.includes(S.q)&&!(n.body||'').toLowerCase().includes(q)) return false; }
    return true;
  });
}

function feedCardsHTML(){
  const list=filteredNews();
  if(!list.length) return `<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 22h16a2 2 0 002-2V4a2 2 0 00-2-2H4a2 2 0 00-2 2v16a2 2 0 002 2z"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="10" x2="16" y2="10"/><line x1="8" y1="14" x2="13" y2="14"/></svg><p>조건에 맞는 뉴스가 없습니다<br>필터를 변경해 보세요</p></div>`;
  return list.map(n=>cardHTML(n)).join('');
}

    <div class="news-card-header">
      <span class="news-type-badge type-${item.type||'news'}">${src.label}</span>
      <span class="grade-badge ${gClass}">${grade}</span>
      ${item.sent?`<span class="tag ${item.sent==='긍정'?'tag-rise':item.sent==='부정'?'tag-fall':'tag-neutral'}" style="font-size:.64rem;">${item.sent}</span>`:''}
      <span class="news-time">${item.time}</span>
    </div>
    <div class="news-card-body">
      <div class="news-title">${item.title}</div>
      ${item.body?`<div class="news-body-preview">${item.body}</div>`:''}
      ${item.themes?.length?`<div class="news-themes">${item.themes.map(t=>`<span class="news-theme-tag">${t}</span>`).join('')}</div>`:''}

    <div class="impact-bar-wrap">
      <span style="font-size:.64rem;color:var(--text-muted);">Impact</span>
      <div class="impact-bar-bg"><div class="impact-bar-fill" style="width:${item.impactScore||0}%;"></div></div>
      <div class="impact-score">${item.impactScore||0}</div>
    </div>
    ${item.aiSummary?`<div class="ai-preview"><div class="ai-icon">🤖</div><div class="ai-text">${item.aiSummary}</div></div>`:''}

      <span class="news-stock-badge">${item.code!=='000000'?item.code:'시장전반'}</span>

    </div>

}

function renderModalResults(item){
  let html=''; const id=String(item.id);
  if(item.aiSummary) html+=`<div class="ai-result-block"><div class="ai-result-header"><span>🤖</span><div class="ai-result-title">AI 뉴스 요약</div></div><div style="font-size:.86rem;color:var(--text-secondary);line-height:1.6;">${item.aiSummary}</div>${item.aiKeywords?.length?`<div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:8px;">${item.aiKeywords.map(k=>`<span class="news-theme-tag">${k}</span>`).join('')}</div>`:''}</div>`;
  if(item.score!=null){
    const sc=item.score>=70?'var(--rise)':item.score>=40?'var(--gold)':'var(--fall)';
    const vl={confirmed:'✅ 사실 확인',partial:'⚠️ 부분 확인',unverified:'❓ 미검증',false:'❌ 허위'}[item.verdict]||item.verdict;
    html+=`<div class="ai-result-block"><div class="ai-result-header"><span>🔍</span><div class="ai-result-title">팩트체크</div><span class="tag tag-blue" style="margin-left:auto;">${vl}</span></div><div class="fact-meter"><div class="fact-score-circle" style="background:${sc}20;color:${sc};border:2px solid ${sc};">${item.score}</div><div class="fact-text">${item.detail?.key_points||'분석 완료'}</div></div>${item.detail?.risk_level?`<div style="font-size:.79rem;color:var(--text-muted);">리스크: ${item.detail.risk_level}</div>`:''}${item.detail?.action_note?`<div style="font-size:.79rem;color:var(--text-secondary);margin-top:4px;">💡 ${item.detail.action_note}</div>`:''}</div>`;
  }
  if(item.judgment){
    const j=item.judgment, sc_=(v)=>v==='매수'?'signal-buy':v==='매도'?'signal-sell':'signal-hold';
    html+=`<div class="ai-result-block"><div class="ai-result-header"><span>⚖️</span><div class="ai-result-title">투자판단</div>${j.verdict?`<span class="tag tag-gold" style="margin-left:auto;">${j.verdict}</span>`:''}</div><div class="judge-signals"><div class="judge-signal ${sc_(j.short||'관망')}"><div class="judge-signal-period">단기</div><div class="judge-signal-val">${j.short||'관망'}</div></div><div class="judge-signal ${sc_(j.mid||'관망')}"><div class="judge-signal-period">중기</div><div class="judge-signal-val">${j.mid||'관망'}</div></div><div class="judge-signal ${sc_(j.long||'관망')}"><div class="judge-signal-period">장기</div><div class="judge-signal-val">${j.long||'관망'}</div></div></div>${j.summary?`<div style="font-size:.79rem;color:var(--text-secondary);line-height:1.5;margin-bottom:8px;">${j.summary}</div>`:''}<div style="display:flex;gap:12px;">${j.stopLoss?`<div><div style="font-size:.64rem;color:var(--text-muted);">손절가</div><div style="font-size:.86rem;font-weight:700;color:var(--fall);">${j.stopLoss}</div></div>`:''}${j.targetReturn?`<div><div style="font-size:.64rem;color:var(--text-muted);">목표수익</div><div style="font-size:.86rem;font-weight:700;color:var(--rise);">${j.targetReturn}</div></div>`:''}</div>${j.factors?.length?`<div style="margin-top:8px;">${j.factors.slice(0,3).map(f=>`<div style="font-size:.79rem;color:var(--text-secondary);margin-bottom:3px;">• ${f}</div>`).join('')}</div>`:''}</div>`;
  }
  return html;
}

function refreshCardModal(id){
  const sid=String(id), item=NEWS.find(n=>String(n.id)===sid); if(!item) return;
  const el=document.getElementById(`modal-results-${sid}`); if(el) el.innerHTML=renderModalResults(item);
}

function closeCardModal(){
  const bd=document.getElementById('card-backdrop'), sh=document.getElementById('card-sheet');
  bd?.classList.remove('show'); sh?.classList.remove('show');
  setTimeout(()=>{ bd?.remove(); sh?.remove(); },350);
}

/* ══════ AI 분석 ══════ */
async function aiApiFetch(body){
  const url=getWorkerUrl(); if(!url) throw new Error('Worker URL 없음');
  const res=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(!res.ok) throw new Error(`API 오류: ${res.status}`);
  return res.json();
}

function saveAnalysisCache(id,data){
  try{ const c=JSON.parse(localStorage.getItem('ki_analysisCache')||'{}'); Object.assign(c[String(id)]={},data); localStorage.setItem('ki_analysisCache',JSON.stringify(c)); }catch(e){}
}

async function rfc(id){
  const sid=String(id), item=NEWS.find(n=>String(n.id)===sid);
  if(!item||S.ana[sid]) return;
  S.ana[sid]=true; updateAIBtn(sid,'fc',true); showToast('팩트체크 분석 중...');
  try{
    const data=await aiApiFetch({model:'claude-sonnet-4-20250514',max_tokens:1000,system:'한국 주식시장 전문 팩트체커. JSON만 응답. 다른 텍스트 없이.',messages:[{role:'user',content:`뉴스 팩트체크:\n제목:${item.title}\n본문:${item.body}\n출처수:${item.sources}\n\nJSON:{"score":0-100,"verdict":"confirmed|partial|unverified|false","detail":{"key_points":"핵심","risk_level":"높음|중간|낮음","official_check":"확인여부","action_note":"주의사항"}}`}]});
    const txt=(data.content||[]).map(c=>c.text||'').join(''), parsed=JSON.parse(txt.replace(/```json|```/g,'').trim());
    item.score=parsed.score; item.verdict=parsed.verdict; item.detail=parsed.detail;
    saveAnalysisCache(sid,{score:item.score,verdict:item.verdict,detail:item.detail});
    showToast('팩트체크 완료');
  }catch(e){ showToast('팩트체크 실패: '+e.message); }
  S.ana[sid]=false; updateAIBtn(sid,'fc',false); refreshCardModal(sid); if(S.tab==='feed') reCards();
}

async function runJudge(id){
  const sid=String(id), item=NEWS.find(n=>String(n.id)===sid);
  if(!item||S.judging[sid]) return;
  S.judging[sid]=true; updateAIBtn(sid,'jd',true); showToast('투자판단 분석 중...');
  const p=PRICES[item.code]||{}, sup=SUPPLY[item.code]||{};
  try{

function updateAIBtn(id,type,loading){
  const map={fc:`btn-fc-${id}`,jd:`btn-jd-${id}`,ai:`btn-ai-${id}`};

async function runAll(){
  const un=NEWS.filter(n=>!n.judgment); showToast(`${un.length}개 뉴스 일괄 분석 시작...`);

}

function saveWorkerUrl(){ const val=document.getElementById('worker-url')?.value.trim(); S._cfWorkerUrl=val||CF_WORKER_URL; saveLocalState(); showToast('Worker URL 저장됨'); }
function exportData(){
  const data={portfolio:S.portfolio,watchlist:S.watchlist,tradeHistory:JSON.parse(localStorage.getItem('ki_tradeHistory')||'[]'),keywords:S.keywords,exportedAt:new Date().toISOString()};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'}), url=URL.createObjectURL(blob), a=document.createElement('a');
  a.href=url; a.download=`kospi-intel-backup-${new Date().toISOString().slice(0,10)}.json`; a.click(); URL.revokeObjectURL(url);
}
function clearCache(){
  if(!confirm('캐시를 초기화하시겠습니까?')) return;
  localStorage.removeItem('ki_newsCache'); localStorage.removeItem('ki_analysisCache');
  NEWS=[]; loadInlineData(); render(); showToast('캐시가 초기화됐습니다.');
}

/* ── 새로고침 버튼 ── */
async function doRefresh(){
  const btn=document.getElementById('refresh-btn');
  if(btn) btn.style.animation='spin .7s linear infinite';
  await fetchAllData(); render();
  if(btn) btn.style.animation='';
  showToast('데이터를 업데이트했습니다.');
}

/* ── 앱 시작 ── */
document.addEventListener('DOMContentLoaded', initApp);
</script>

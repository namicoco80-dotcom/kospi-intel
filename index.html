<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="KOSPI INTEL">
  <meta name="theme-color" content="#1565C0">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>KOSPI INTEL V9 · 03.07 — AI 주식 분석 플랫폼</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800;900&family=Playfair+Display:wght@700;900&family=JetBrains+Mono:wght@500;700&display=optional" rel="stylesheet" media="print" onload="this.media='all'">
<noscript><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800;900&family=Playfair+Display:wght@700;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet"></noscript>
<style>
:root {
  /* ── 모니모 라이트 테마 ── */
  --bg:     #F4F6FA;   /* 연한 회색 배경 */
  --bg2:    #FFFFFF;   /* 카드 흰색 */
  --bg3:    #EEF1F8;   /* 서브 배경 */
  --card:   #FFFFFF;   /* 카드 */
  --card2:  #F0F4FF;   /* 카드 내 서브 */
  --bdr:    #E2E8F4;   /* 기본 테두리 */
  --bdr2:   #C7D4F0;   /* 강조 테두리 */

  /* ── 텍스트 ── */
  --ink:    #0F1D3A;   /* 주요 텍스트 (짙은 네이비) */
  --ink2:   #4A5A7A;   /* 보조 텍스트 */
  --ink3:   #94A3B8;   /* 비활성/힌트 */

  /* ── 브랜드 컬러 (삼성 블루 계열) ── */
  --amber:  #1565C0;   /* 삼성 딥 블루 (기존 amber 대체) */
  --amber2: #1976D2;   /* 블루 밝은 버전 */
  --sage:   #0288D1;   /* 하늘 블루 */
  --gold:   #0D47A1;   /* 네이비 */
  --blue:   #1E88E5;   /* 메인 블루 */
  --purple: #5C6BC0;   /* 인디고 */

  /* ── 수익률 색상 ── */
  --teal:   #E53935;   /* 한국식 상승=빨강 */
  --rose:   #1565C0;   /* 한국식 하락=파랑 */
  --neutral:#78909C;   /* 중립 */

  /* ── 등급 ── */
  --grade-a:#E53935;
  --grade-b:#1E88E5;
  --grade-c:#78909C;

  /* ── 폰트 ── */
  --display:'Noto Sans KR',sans-serif;
  --body:   'Noto Sans KR',sans-serif;
  --mono:   'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--ink);font-family:var(--body);-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{display:none}
button{cursor:pointer;font-family:var(--body)}
input,select{font-family:var(--body)}
#app{max-width:440px;margin:0 auto;min-height:100vh}

/* ═══ HEADER ═══ */
.hdr{
  padding:10px 14px 8px;
  background:#FFFFFF;
  border-bottom:1px solid var(--bdr);
  position:sticky;top:0;z-index:60;
  box-shadow:0 2px 12px rgba(21,101,192,0.08);
}
.hdr-row1{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.brand{flex:1}
.brand-tag{font-family:var(--mono);font-size:10px;font-weight:700;color:var(--blue);letter-spacing:3px;text-transform:uppercase;margin-bottom:3px}
.brand-name{font-family:var(--display);font-size:17px;font-weight:900;color:var(--ink);line-height:1.1;letter-spacing:-0.3px}
.brand-sub{font-family:var(--mono);font-size:10px;color:var(--ink3);margin-top:2px;display:flex;align-items:center;gap:4px}
.hdr-btns{display:flex;gap:5px;align-items:flex-start;flex-wrap:nowrap}
.crawl-btn{
  background:var(--card2);border:1.5px solid var(--bdr2);
  border-radius:10px;padding:5px 9px;font-size:11px;font-weight:800;color:var(--teal);
  display:flex;align-items:center;gap:4px;box-shadow:0 4px 14px rgba(21,101,192,0.1);
  transition:all 0.2s;white-space:nowrap;
}
.crawl-btn:hover{background:var(--bg3);border-color:var(--teal)}
.auto-badge{
  font-family:var(--mono);font-size:10px;padding:4px 8px;border-radius:8px;font-weight:700;
  display:flex;align-items:center;gap:4px;
}
.auto-badge.on{background:rgba(34,197,94,0.15);border:1px solid rgba(34,197,94,0.4);color:var(--teal)}
.auto-badge.off{background:#EEF1F8;border:1px solid var(--bdr);color:var(--ink3)}
.mkt-status{
  display:flex;align-items:center;gap:6px;margin-bottom:5px;
  font-family:var(--mono);font-size:10px;
}
.mkt-dot{width:7px;height:7px;border-radius:50%}
.mkt-dot.open{background:var(--sage);box-shadow:0 0 6px var(--sage);animation:blink 1.5s ease-in-out infinite}
.mkt-dot.pre{background:var(--amber);box-shadow:0 0 6px var(--amber)}
.mkt-dot.closed{background:var(--ink3)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
.urg{
  display:flex;align-items:center;gap:10px;
  margin-bottom:8px;padding:10px 12px;
  border-radius:14px;cursor:pointer;
  animation:pulse 2.5s ease-in-out infinite;
}
.urg.lv1{background:rgba(239,68,68,0.1);border:1.5px solid rgba(239,68,68,0.35)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.75}}
.urg-icon{font-size:18px;flex-shrink:0}
.urg-body{flex:1}
.urg-title{font-size:13px;font-weight:800;color:var(--ink);line-height:1.3}
.urg-sub{font-size:12px;color:var(--ink2);margin-top:2px}
.urg-pill{font-size:11px;font-weight:800;padding:4px 10px;border-radius:20px;flex-shrink:0;background:rgba(239,68,68,0.18);color:var(--rose);border:1.5px solid rgba(239,68,68,0.4)}
.stats{display:flex;gap:6px;margin-top:4px}
.stat{flex:1;background:var(--card);border:1.5px solid var(--bdr);border-radius:10px;padding:6px 4px;text-align:center}
.stat-n{font-family:var(--mono);font-size:15px;font-weight:700;line-height:1}
.stat-l{font-size:10px;color:var(--ink3);margin-top:2px}

/* ═══ TABS ═══ */
.tabs{
  display:flex;overflow-x:auto;
  background:#FFFFFF;border-bottom:2px solid var(--bdr);
  position:sticky;top:0;z-index:50;
}
.tab{
  flex-shrink:0;padding:13px 16px;
  background:none;border:none;border-bottom:2.5px solid transparent;
  color:var(--ink3);font-size:12px;font-weight:700;
  white-space:nowrap;transition:all 0.18s;
}
.tab.on{color:var(--blue);border-bottom-color:var(--blue)}

/* ═══ FILTERS ═══ */
.filters{padding:14px 18px;display:flex;flex-direction:column;gap:10px}
.search{
  display:flex;align-items:center;gap:10px;
  background:var(--card);border:1.5px solid var(--bdr);
  border-radius:14px;padding:0 16px;
  transition:border-color 0.2s;
}
.search:focus-within{border-color:var(--blue)}
.search input{background:none;border:none;outline:none;color:var(--ink);font-size:15px;flex:1;padding:13px 0}
.search input::placeholder{color:var(--ink3)}
.chips{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px}
.chip{
  white-space:nowrap;padding:7px 14px;border-radius:24px;
  border:1.5px solid var(--bdr);background:var(--card);
  color:var(--ink2);font-size:12px;font-weight:700;transition:all 0.15s;
}
.chip.ca{border-color:var(--blue);background:rgba(30,136,229,0.1);color:var(--blue)}
.chip.cs{border-color:var(--sage);background:rgba(109,184,122,0.12);color:var(--sage)}
.chip.ct{border-color:var(--teal);background:rgba(34,197,94,0.12);color:var(--teal)}
.bulk{
  width:100%;padding:12px;border-radius:14px;
  background:linear-gradient(135deg,rgba(21,101,192,0.1),rgba(30,136,229,0.08));
  border:1.5px solid rgba(21,101,192,0.3);color:var(--amber);
  font-size:14px;font-weight:800;transition:all 0.18s;
}
.bulk:hover{background:linear-gradient(135deg,rgba(21,101,192,0.16),rgba(30,136,229,0.12))}

/* ═══ DART SETUP ═══ */
.dart-setup{
  margin:0 18px 4px;padding:16px;
  background:linear-gradient(135deg,rgba(21,101,192,0.06),rgba(30,136,229,0.03));
  border:1.5px solid rgba(21,101,192,0.2);border-radius:16px;
}
.dart-setup h4{font-size:14px;font-weight:800;color:var(--blue);margin-bottom:5px}
.dart-setup p{font-size:12px;color:var(--ink2);line-height:1.6;margin-bottom:10px}
.dart-row{display:flex;gap:8px}
.dart-inp{flex:1;background:var(--card);border:1.5px solid var(--bdr2);border-radius:12px;padding:11px 14px;font-size:13px;color:var(--ink);outline:none}
.dart-inp:focus{border-color:var(--blue)}
.dart-save{background:var(--blue);border:none;border-radius:12px;padding:11px 16px;color:#fff;font-size:13px;font-weight:800;white-space:nowrap}
.dart-ok{
  margin:0 18px 4px;padding:10px 14px;
  background:rgba(34,197,94,0.1);border:1.5px solid rgba(34,197,94,0.25);
  border-radius:12px;font-size:12px;color:var(--teal);font-weight:700;
  display:flex;align-items:center;gap:8px;
}

/* ═══ CARDS ═══ */
.cards{padding:6px 18px 120px}
.card{
  background:#FFFFFF;border:1px solid var(--bdr);
  border-radius:20px;margin-bottom:12px;overflow:hidden;
  box-shadow:0 2px 12px rgba(21,101,192,0.07);
  transition:box-shadow 0.2s,border-color 0.2s;
;cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.card:hover{box-shadow:0 4px 20px rgba(21,101,192,0.13)}
.card.lv1{border-left:4px solid var(--rose)}
.card.lv2{border-left:4px solid var(--amber)}
.card.open{border-color:var(--amber);box-shadow:0 6px 30px rgba(232,146,30,0.15)}
.card.new-item{animation:newCard 0.5s ease}
@keyframes newCard{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}

/* 카드 헤더 */
.ch{padding:16px 18px;cursor:pointer}
.cmeta{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:10px}
.bdg{font-size:11px;font-weight:800;padding:4px 10px;border-radius:8px;border:1.5px solid}
.upill{font-size:11px;font-weight:800;padding:4px 10px;border-radius:24px;border:1.5px solid}
.upill.lv1{background:rgba(239,68,68,0.14);color:var(--rose);border-color:rgba(239,68,68,0.38)}
.upill.lv2{background:rgba(232,146,30,0.14);color:var(--amber);border-color:rgba(232,146,30,0.38)}
.upill.lv3{background:rgba(109,184,122,0.14);color:var(--sage);border-color:rgba(109,184,122,0.38)}
.ctme{font-family:var(--mono);font-size:11px;color:var(--ink3)}
.ctitle{font-size:16px;font-weight:800;line-height:1.5;color:var(--ink)}
.cverdict{display:inline-flex;align-items:center;gap:5px;margin-top:8px;font-size:12px;font-weight:800;padding:4px 12px;border-radius:9px;border:1.5px solid}
.cfooter{display:flex;gap:12px;margin-top:9px}
.cfooter span{font-size:12px;color:var(--ink3)}

/* AI 요약 미리보기 */
.ai-summary-preview{
  margin-top:8px;padding:9px 12px;
  background:rgba(34,197,94,0.06);border:1px solid rgba(34,197,94,0.2);
  border-radius:10px;
}
.ai-summary-preview .ai-lbl{font-family:var(--mono);font-size:10px;color:var(--teal);font-weight:700;letter-spacing:1px;margin-bottom:4px}
.ai-summary-preview .ai-txt{font-size:12px;color:var(--ink2);line-height:1.6}
.ai-keywords{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
.ai-kw{font-size:11px;padding:2px 8px;border-radius:6px;background:rgba(232,146,30,0.12);color:var(--amber);border:1px solid rgba(232,146,30,0.3);font-weight:700}

/* ── 도움말 버튼 & 바텀시트 ── */
.help-btn{position:fixed;bottom:80px;right:16px;width:44px;height:44px;border-radius:50%;
  background:linear-gradient(135deg,#1565C0,#0D47A1);border:none;color:#fff;font-size:20px;
  box-shadow:0 4px 16px rgba(21,101,192,0.4);cursor:pointer;z-index:900;
  display:flex;align-items:center;justify-content:center;transition:transform .15s}
.help-btn:active{transform:scale(.92)}
.help-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;
  opacity:0;transition:opacity .25s;pointer-events:none}
.help-overlay.on{opacity:1;pointer-events:all}
.help-sheet{position:fixed;bottom:0;left:0;right:0;background:#fff;border-radius:22px 22px 0 0;
  z-index:1001;max-height:88vh;overflow:hidden;display:flex;flex-direction:column;
  transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1)}
.help-sheet.on{transform:translateY(0)}
.help-sheet-hdr{padding:16px 18px 10px;border-bottom:1px solid #EEF2FA;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.help-sheet-title{font-size:16px;font-weight:900;color:#0F1D3A}
.help-close{width:32px;height:32px;border-radius:50%;background:#F4F6FA;border:none;
  font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.help-tabs{display:flex;gap:0;border-bottom:1px solid #EEF2FA;overflow-x:auto;flex-shrink:0}
.help-tabs::-webkit-scrollbar{display:none}
.help-tab{padding:10px 14px;font-size:12px;font-weight:700;color:#94A3B8;border:none;
  background:none;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;flex-shrink:0}
.help-tab.on{color:#1565C0;border-bottom-color:#1565C0}
.help-body{overflow-y:auto;flex:1;padding:16px 18px 40px}
.help-section{margin-bottom:20px}
.help-section-title{font-size:13px;font-weight:900;color:#0F1D3A;margin-bottom:10px;
  display:flex;align-items:center;gap:6px}
.help-item{margin-bottom:12px;padding:12px;background:#F8FAFF;border-radius:12px;border-left:3px solid #1565C0}
.help-term{font-size:13px;font-weight:800;color:#0F1D3A;margin-bottom:4px}
.help-desc{font-size:12px;color:#4A5A7A;line-height:1.65}
.help-badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:800;margin-right:4px}
.help-ex{font-size:11px;color:#94A3B8;margin-top:4px;font-style:italic}

/* ── 게시판 ── */
.board-wrap{padding:14px 16px}
.board-write{background:#fff;border:1.5px solid #E2E8F4;border-radius:16px;padding:14px;margin-bottom:16px}
.board-write-top{display:flex;gap:8px;margin-bottom:10px}
.board-nick-inp{flex:1;padding:9px 12px;border:1.5px solid #E2E8F4;border-radius:10px;font-size:13px;outline:none}
.board-type-sel{padding:9px 10px;border:1.5px solid #E2E8F4;border-radius:10px;font-size:12px;background:#fff;outline:none;color:#4A5A7A}
.board-text-inp{width:100%;box-sizing:border-box;padding:10px 12px;border:1.5px solid #E2E8F4;
  border-radius:10px;font-size:13px;resize:none;outline:none;min-height:72px;font-family:inherit}
.board-submit{width:100%;margin-top:10px;background:#1565C0;color:#fff;border:none;
  border-radius:12px;padding:12px;font-size:13px;font-weight:800;cursor:pointer}
.board-filter{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto}
.board-filter::-webkit-scrollbar{display:none}
.board-ftab{padding:6px 14px;border-radius:20px;border:1.5px solid #E2E8F4;background:#fff;
  font-size:12px;font-weight:700;color:#64748B;cursor:pointer;white-space:nowrap;flex-shrink:0}
.board-ftab.on{background:#1565C0;color:#fff;border-color:#1565C0}
.board-post{background:#fff;border:1px solid #E2E8F4;border-radius:14px;padding:14px;margin-bottom:10px}
.board-post-hdr{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.board-post-nick{font-size:13px;font-weight:800;color:#0F1D3A}
.board-post-type{padding:2px 8px;border-radius:6px;font-size:11px;font-weight:700}
.board-post-time{font-size:11px;color:#94A3B8;margin-left:auto}
.board-post-body{font-size:13px;color:#334155;line-height:1.7;margin-bottom:10px}
.board-post-footer{display:flex;align-items:center;gap:10px}
.board-like-btn{display:flex;align-items:center;gap:4px;background:#F4F6FA;border:none;
  border-radius:8px;padding:5px 10px;font-size:12px;font-weight:700;cursor:pointer;color:#64748B}
.board-like-btn.liked{background:#EFF6FF;color:#1565C0}
.board-stock-tag{padding:2px 8px;background:#F0F4FF;color:#1565C0;border-radius:6px;
  font-size:11px;font-weight:700}

/* Impact Score 바 */
.impact-row{display:flex;align-items:center;gap:8px;margin-top:8px}
.impact-lbl{font-family:var(--mono);font-size:10px;color:var(--ink3);width:48px;flex-shrink:0}
.impact-bar-w{flex:1;height:5px;background:var(--bg3);border-radius:3px;overflow:hidden}
.impact-bar{height:100%;border-radius:3px;transition:width 0.6s}
.impact-score{font-family:var(--mono);font-size:12px;font-weight:700;width:32px;text-align:right;flex-shrink:0}

/* 스파크라인 */
.spark{display:flex;align-items:center;gap:9px;margin-top:9px;padding:8px 12px;background:var(--bg3);border-radius:10px}
.spark-lbl{font-family:var(--mono);font-size:11px;color:var(--ink3);flex-shrink:0}
.spark-bars{display:flex;align-items:flex-end;gap:3px;height:24px;flex:1}
.spark-bar{flex:1;border-radius:3px 3px 0 0;min-height:3px}
.spark-pk{font-family:var(--mono);font-size:11px;font-weight:700;flex-shrink:0}

/* 관련 종목 태그 */
.rel-stocks{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}
.rel-stock{
  font-size:11px;font-weight:800;padding:4px 10px;border-radius:8px;
  display:flex;align-items:center;gap:4px;cursor:pointer;
}
.rel-stock.pos{background:rgba(34,197,94,0.12);color:var(--teal);border:1px solid rgba(34,197,94,0.3)}
.rel-stock.neg{background:rgba(239,68,68,0.12);color:var(--rose);border:1px solid rgba(239,68,68,0.3)}
.rel-stock.neu{background:var(--bg3);color:var(--ink2);border:1px solid var(--bdr)}

/* 카드 바디 */
.cb{border-top:1px solid var(--bdr);padding:16px 18px;background:var(--bg2)}
.cbody-text{font-size:14px;color:var(--ink2);line-height:1.8;margin-bottom:14px}

/* AI 상세 요약 박스 */
.ai-detail-box{
  background:var(--card);border-radius:14px;padding:14px;
  border:1.5px solid rgba(34,197,94,0.25);margin-bottom:12px;
}
.ai-detail-tit{font-family:var(--mono);font-size:11px;color:var(--teal);font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px}
.ai-detail-summary{font-size:14px;color:var(--ink);line-height:1.75;margin-bottom:10px}
.ai-invest-points{display:flex;flex-direction:column;gap:7px}
.ai-invest-pt{
  display:flex;align-items:flex-start;gap:8px;
  font-size:13px;color:var(--ink2);line-height:1.55;
  padding:8px 10px;background:rgba(232,146,30,0.06);border-radius:9px;border-left:3px solid var(--amber);
}

/* 액션 버튼 */
.arow{display:flex;gap:10px;margin-bottom:10px}
.abtn{
  flex:1;padding:12px 10px;border-radius:12px;font-size:13px;font-weight:800;
  border:1.5px solid;display:flex;align-items:center;justify-content:center;gap:7px;
  transition:all 0.18s;
}
.abtn.adart{background:var(--card);border-color:rgba(34,197,94,0.3);color:var(--teal)}
.abtn.adart:hover{background:rgba(34,197,94,0.08)}
.abtn.afact{background:var(--card);border-color:var(--bdr2);color:var(--amber)}
.abtn.afact:hover{background:rgba(232,146,30,0.08)}
.abtn.off{opacity:0.4;cursor:default}

/* CTA: 투자판단 */
.judge-cta{
  width:100%;padding:16px;border-radius:16px;border:none;
  font-size:15px;font-weight:900;letter-spacing:0.2px;
  background:linear-gradient(135deg,#2C1F0E,#4A3218);
  color:var(--amber2);margin-bottom:10px;
  display:flex;align-items:center;justify-content:center;gap:10px;
  box-shadow:0 6px 24px rgba(232,146,30,0.22);
  transition:all 0.22s;
}
.judge-cta:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(232,146,30,0.3)}
.judge-cta.off{background:var(--bg3);color:var(--ink3);cursor:default;transform:none;box-shadow:none}

/* DART 결과 */
.dart-res{background:var(--card);border-radius:14px;padding:14px;border:1.5px solid rgba(34,197,94,0.25);margin-bottom:10px}
.dart-restit{font-family:var(--mono);font-size:11px;color:var(--teal);font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.ditem{padding:9px 0;border-bottom:1px solid var(--bdr);display:flex;flex-direction:column;gap:4px}
.ditem:last-child{border-bottom:none;padding-bottom:0}
.ditmain{font-size:13px;font-weight:700;color:var(--ink);line-height:1.4}
.ditmeta{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.ditdate{font-family:var(--mono);font-size:11px;color:var(--ink3)}
.drel{font-size:11px;font-weight:800;padding:3px 8px;border-radius:6px}
.drel.high{background:rgba(34,197,94,0.15);color:var(--teal);border:1px solid rgba(34,197,94,0.3)}
.drel.mid{background:rgba(232,146,30,0.15);color:var(--amber);border:1px solid rgba(232,146,30,0.3)}
.drel.low{background:var(--bg3);color:var(--ink3);border:1px solid var(--bdr)}
.dlink{font-size:12px;color:var(--teal);font-weight:700;text-decoration:none}

/* 팩트체크 */
.fc{background:var(--card);border-radius:14px;padding:14px;border:1.5px solid var(--bdr2);margin-bottom:10px}
.fctit{font-family:var(--mono);font-size:10px;color:var(--amber);font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:12px}
.fcrow{display:flex;gap:12px;margin-bottom:10px;align-items:flex-start}
.fcinfo{flex:1}
.fcrisk{font-size:13px;color:var(--ink2);margin-bottom:5px}
.fcoff{font-size:13px;color:var(--ink3);line-height:1.6}
.fcpts{margin-bottom:10px}
.fcpt{font-size:13px;color:var(--ink2);padding:8px 0;border-bottom:1px solid var(--bdr);display:flex;gap:10px;line-height:1.55}
.fcpt:last-child{border-bottom:none}
.fcwarn{background:rgba(239,68,68,0.1);border:1.5px solid rgba(239,68,68,0.28);border-radius:10px;padding:10px 14px;font-size:13px;color:var(--rose);line-height:1.55}

/* 투자판단 박스 */
.jbox{border-radius:20px;overflow:hidden;margin-bottom:12px;box-shadow:0 10px 40px rgba(21,101,192,0.07)}
.jtop{padding:20px 20px 18px}
.jrow1{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.jverdict{font-family:var(--display);font-size:30px;font-weight:900;color:#F5EDD8;line-height:1.05}
.jsub{font-family:var(--mono);font-size:11px;color:rgba(245,237,216,0.55);margin-top:4px}
.jconf-n{font-family:var(--mono);font-size:26px;font-weight:700;color:#F5EDD8;text-align:right}
.jconf-l{font-size:11px;color:rgba(245,237,216,0.45);text-align:right;margin-top:2px}
.jsum{font-size:14px;line-height:1.85;color:rgba(245,237,216,0.85);margin-bottom:18px}
.jhs{display:flex;gap:8px}
.jh{flex:1;border-radius:14px;padding:12px 9px;text-align:center;background:rgba(21,101,192,0.05);border:1px solid rgba(21,101,192,0.12)}
.jhlbl{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:rgba(245,237,216,0.45);margin-bottom:7px}
.jhval{font-size:15px;font-weight:900;line-height:1;margin-bottom:5px}
.jhdesc{font-size:11px;color:rgba(245,237,216,0.65);line-height:1.5}
.jbot{padding:18px 20px}
.jflbl{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--ink3);margin-bottom:12px}
.jf{display:flex;gap:10px;margin-bottom:10px;font-size:13px;line-height:1.65;color:var(--ink)}
.jf:last-of-type{margin-bottom:0}
.jfi{flex-shrink:0;font-size:16px}
.jpos{display:flex;gap:8px;margin-top:16px;padding-top:16px;border-top:1px solid var(--bdr)}
.jpositem{flex:1;border-radius:12px;padding:12px 8px;text-align:center;border:1.5px solid}
.jposlbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--ink3);margin-bottom:5px}
.jposval{font-size:14px;font-weight:900;line-height:1.25}
.jdis{padding:12px 20px;font-size:11px;line-height:1.7;border-top:1px solid var(--bdr);color:var(--ink3);font-style:italic}

/* ═══ RING ═══ */
.ring{position:relative;flex-shrink:0}
.ring-v{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:var(--mono);font-weight:700;text-align:center}

/* ═══ HEATMAP ═══ */
.hm{padding:16px 18px 120px}
.hmtit{font-family:var(--mono);font-size:11px;color:var(--ink3);letter-spacing:3px;text-align:center;margin-bottom:18px;text-transform:uppercase}
.hmgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.hmcell{border-radius:18px;padding:18px 15px;border:1.5px solid;cursor:pointer;transition:transform 0.18s,box-shadow 0.18s}
.hmcell:hover{transform:translateY(-4px);box-shadow:0 12px 32px rgba(0,0,0,0.3)}
.hmsec{font-size:13px;font-weight:700;margin-bottom:5px;opacity:.85}
.hmcnt{font-family:var(--display);font-size:38px;font-weight:700;line-height:1}
.hmsub{font-size:12px;margin-top:6px;opacity:.72;line-height:1.5}
.hmbar-w{margin-top:10px;height:5px;background:rgba(255,255,255,0.15);border-radius:3px;overflow:hidden}
.hmbar{height:100%;border-radius:3px;background:rgba(255,255,255,0.6)}

/* 테마 섹션 */
.theme-section{margin:0 0 16px}
.theme-tit{font-family:var(--mono);font-size:11px;color:var(--ink3);letter-spacing:3px;text-transform:uppercase;margin-bottom:12px;text-align:center}
.theme-grid{display:flex;flex-direction:column;gap:8px}
.theme-card{
  background:var(--card);border:1.5px solid var(--bdr);
  border-radius:16px;padding:14px 16px;cursor:pointer;
  transition:all 0.18s;
}
.theme-card:hover{border-color:var(--bdr2)}
.theme-card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.theme-name{font-size:15px;font-weight:800;color:var(--ink)}
.theme-count{font-family:var(--mono);font-size:12px;color:var(--ink3)}
.theme-stocks{display:flex;gap:5px;flex-wrap:wrap}
.theme-stock-tag{font-size:11px;padding:3px 9px;border-radius:7px;font-weight:700;background:var(--bg3);color:var(--ink2);border:1px solid var(--bdr)}

/* ═══ 차트 영역 ═══ */
.chart-section{margin-bottom:16px}
.chart-card{background:var(--card);border:1.5px solid var(--bdr);border-radius:16px;padding:16px;margin-bottom:10px}
.chart-title{font-size:13px;font-weight:800;color:var(--ink2);margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.chart-canvas-wrap{position:relative;width:100%;height:140px}
.bar-chart{display:flex;align-items:flex-end;gap:6px;height:120px;padding-bottom:20px;position:relative}
.bar-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%}
.bar-fill{width:100%;border-radius:4px 4px 0 0;transition:height 0.6s;position:relative}
.bar-fill:hover::after{content:attr(data-val);position:absolute;top:-20px;left:50%;transform:translateX(-50%);font-family:var(--mono);font-size:10px;color:var(--ink);white-space:nowrap}
.bar-label{font-size:10px;color:var(--ink3);text-align:center;position:absolute;bottom:0}
.freq-chart{display:flex;flex-direction:column;gap:6px}
.freq-row{display:flex;align-items:center;gap:8px}
.freq-name{font-size:12px;color:var(--ink2);width:70px;flex-shrink:0}
.freq-bar-w{flex:1;height:18px;background:var(--bg3);border-radius:4px;overflow:hidden}
.freq-bar{height:100%;border-radius:4px;display:flex;align-items:center;padding-left:6px;font-size:10px;font-weight:700;color:#fff;transition:width 0.6s}
.freq-val{font-family:var(--mono);font-size:11px;color:var(--ink3);width:24px;text-align:right}

/* ═══ SOURCES ═══ */
.srctab{padding:16px 18px 120px}
.srccard{background:var(--card);border-radius:18px;padding:18px;border:1.5px solid var(--bdr);margin-bottom:12px;box-shadow:0 4px 16px rgba(0,0,0,0.2)}
.srccard-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
.srcname{font-size:17px;font-weight:800;color:var(--ink)}
.srctype{font-size:12px;color:var(--ink3);margin-top:3px}
.srcpct{font-family:var(--display);font-size:36px;font-weight:700;text-align:right;line-height:1}
.srcpctl{font-size:11px;color:var(--ink3);text-align:right;margin-top:3px}
.srcstats{display:flex;gap:10px;margin-bottom:14px}
.srcstat{flex:1;background:var(--bg3);border-radius:12px;padding:11px;text-align:center}
.srcsv{font-family:var(--mono);font-size:19px;font-weight:700}
.srcsl{font-size:11px;color:var(--ink3);margin-top:3px}
.srcdotl{font-size:12px;font-weight:700;color:var(--ink2);margin-bottom:7px}
.srcdots{display:flex;gap:5px}
.srcdot{width:16px;height:16px;border-radius:5px}
.srcbar-w{margin-top:10px;height:5px;background:var(--bg3);border-radius:3px;overflow:hidden}
.srcbar{height:100%;border-radius:3px;transition:width 0.6s}

/* ═══ TIMELINE ═══ */
.tl{padding:16px 20px 120px}
.tldate{font-family:var(--mono);font-size:11px;color:var(--ink3);text-align:center;margin-bottom:18px;letter-spacing:1px}
.tlgrp{display:flex;gap:14px;margin-bottom:6px}
.tlhour{width:42px;text-align:right;padding-top:14px;flex-shrink:0}
.tlhour span{font-family:var(--mono);font-size:12px;color:var(--amber);font-weight:700}
.tlline{position:relative;padding-left:16px;flex:1}
.tlvert{position:absolute;left:0;top:0;bottom:0;width:2px;background:linear-gradient(180deg,var(--amber),rgba(232,146,30,0.05));border-radius:2px}
.tldot{position:absolute;left:-5px;top:17px;width:12px;height:12px;border-radius:50%;border:2.5px solid var(--bg)}
.tlcard{background:var(--card);border-radius:14px;padding:12px 14px;border:1.5px solid var(--bdr);margin-bottom:9px;cursor:pointer;transition:all 0.15s}
.tlcard:hover{border-color:var(--bdr2);box-shadow:0 4px 16px rgba(0,0,0,0.2)}
.tltop{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.tltit{font-size:14px;font-weight:800;color:var(--ink);margin-bottom:4px;line-height:1.4}
.tlbot{display:flex;justify-content:space-between;align-items:center}

/* ═══ STOCK MAP ═══ */
.smap{padding:16px 18px 120px}
.skcard{background:var(--card);border-radius:18px;padding:18px;border:1.5px solid var(--bdr);margin-bottom:10px;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,0.18);transition:all 0.18s}
.skcard:hover{box-shadow:0 6px 24px rgba(0,0,0,0.28)}
.skcard.sel{border-color:var(--amber);box-shadow:0 6px 24px rgba(232,146,30,0.18)}
.skhdr{display:flex;justify-content:space-between;align-items:flex-start}
.skname{font-size:19px;font-weight:900;color:var(--ink);margin-bottom:8px}
.skbdgs{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px}
.sknums{display:flex;gap:16px;margin-bottom:10px}
.sknv{font-family:var(--mono);font-size:21px;font-weight:700}
.sknl{font-size:11px;color:var(--ink3);margin-top:2px}
.typebar{display:flex;gap:3px;height:5px;border-radius:3px;overflow:hidden}

/* 주가 정보 */
.price-row{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;background:var(--bg3);border-radius:10px;margin-top:8px;
}
.price-val{font-family:var(--mono);font-size:18px;font-weight:700;color:var(--ink)}
.price-chg{font-family:var(--mono);font-size:13px;font-weight:700}
.price-chg.up{color:var(--teal)}
.price-chg.dn{color:var(--rose)}
.price-meta{display:flex;gap:10px;margin-left:auto}
.price-meta span{font-size:11px;color:var(--ink3)}

/* ═══ 포트폴리오 탭 ═══ */
.port-tab{padding:16px 18px 120px}
.port-add-card{background:var(--card);border:1.5px solid var(--bdr);border-radius:18px;padding:16px;margin-bottom:14px}
.port-add-title{font-size:14px;font-weight:800;color:var(--amber);margin-bottom:12px;display:flex;align-items:center;gap:7px}
.port-inp-row{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.port-inp{
  flex:1;min-width:0;background:var(--bg3);border:1.5px solid var(--bdr2);
  border-radius:10px;padding:10px 12px;font-size:13px;color:var(--ink);outline:none;
}
.port-inp:focus{border-color:var(--amber)}
.port-btn{
  background:var(--amber);border:none;border-radius:10px;
  padding:10px 16px;color:#fff;font-size:13px;font-weight:800;white-space:nowrap;
}
.port-card{background:var(--card);border:1.5px solid var(--bdr);border-radius:16px;padding:16px;margin-bottom:10px;box-shadow:0 4px 20px rgba(21,101,192,0.07)}
.port-card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.port-name{font-size:17px;font-weight:900;color:var(--ink)}
.port-sector{font-size:12px;color:var(--ink3);margin-top:2px}
.port-pnl{font-family:var(--mono);font-size:20px;font-weight:700;text-align:right}
.port-pnl.pos{color:var(--teal)}
.port-pnl.neg{color:var(--rose)}
.port-pnl.flat{color:var(--ink3)}
.port-stats{display:flex;gap:10px;margin-bottom:10px}
.port-stat{flex:1;background:var(--bg3);border-radius:10px;padding:10px;text-align:center}
.port-sv{font-family:var(--mono);font-size:15px;font-weight:700}
.port-sl{font-size:11px;color:var(--ink3);margin-top:2px}
.port-risk{
  padding:8px 12px;border-radius:9px;font-size:12px;font-weight:700;
  display:flex;align-items:center;gap:6px;margin-bottom:8px;
}
.port-risk.high{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:var(--rose)}
.port-risk.mid{background:rgba(232,146,30,0.1);border:1px solid rgba(232,146,30,0.3);color:var(--amber)}
.port-risk.low{background:rgba(109,184,122,0.1);border:1px solid rgba(109,184,122,0.3);color:var(--sage)}
.port-news-list{display:flex;flex-direction:column;gap:6px}
.port-news-item{
  padding:8px 10px;background:var(--bg3);border-radius:9px;
  font-size:12px;color:var(--ink2);display:flex;align-items:center;gap:7px;cursor:pointer;
}
.port-news-item:hover{background:var(--card2)}
.port-summary{background:linear-gradient(135deg,rgba(232,146,30,0.1),rgba(34,197,94,0.08));border:1.5px solid rgba(232,146,30,0.3);border-radius:16px;padding:14px;margin-bottom:14px}
.port-sum-title{font-size:13px;font-weight:800;color:var(--amber);margin-bottom:10px}
.port-sum-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.port-sum-label{font-size:12px;color:var(--ink3)}
.port-sum-val{font-family:var(--mono);font-size:14px;font-weight:700;color:var(--ink)}

/* ═══ 알림 설정 탭 ═══ */
.alert-tab{padding:16px 18px 120px}
.alert-card{background:var(--card);border:1.5px solid var(--bdr);border-radius:16px;padding:16px;margin-bottom:12px}
.alert-section-title{font-size:13px;font-weight:800;color:var(--amber);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.alert-item{
  display:flex;justify-content:space-between;align-items:center;
  padding:10px 0;border-bottom:1px solid var(--bdr);
}
.alert-item:last-child{border-bottom:none;padding-bottom:0}
.alert-item-label{font-size:13px;color:var(--ink2)}
.alert-item-sub{font-size:11px;color:var(--ink3);margin-top:2px}
.toggle-wrap{position:relative;width:44px;height:24px;flex-shrink:0}
.toggle-inp{position:absolute;opacity:0;width:0;height:0}
.toggle-slider{
  position:absolute;cursor:pointer;inset:0;
  background:var(--bg3);border-radius:24px;transition:0.3s;border:1.5px solid var(--bdr2);
}
.toggle-slider::before{
  content:"";position:absolute;height:16px;width:16px;left:3px;bottom:2px;
  background:var(--ink3);border-radius:50%;transition:0.3s;
}
.toggle-inp:checked + .toggle-slider{background:rgba(34,197,94,0.2);border-color:var(--teal)}
.toggle-inp:checked + .toggle-slider::before{transform:translateX(20px);background:var(--teal)}
.kw-add-row{display:flex;gap:8px;margin-top:10px}
.kw-add-inp{flex:1;background:var(--bg3);border:1.5px solid var(--bdr2);border-radius:10px;padding:9px 12px;font-size:13px;color:var(--ink);outline:none}
.kw-add-inp:focus{border-color:var(--amber)}
.kw-add-btn{background:var(--amber);border:none;border-radius:10px;padding:9px 14px;color:#fff;font-size:13px;font-weight:800}
.kw-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.kw-tag{
  display:flex;align-items:center;gap:5px;
  padding:5px 11px;border-radius:20px;
  background:rgba(232,146,30,0.12);border:1px solid rgba(232,146,30,0.3);
  color:var(--amber);font-size:12px;font-weight:700;
}
.kw-tag-del{cursor:pointer;opacity:.6;font-size:14px;line-height:1}
.kw-tag-del:hover{opacity:1}
.watchlist{display:flex;flex-direction:column;gap:6px}
.wl-item{
  display:flex;align-items:center;gap:8px;
  padding:10px 12px;background:var(--bg3);border-radius:10px;
}
.wl-name{font-size:13px;font-weight:700;color:var(--ink);flex:1}
.wl-code{font-family:var(--mono);font-size:11px;color:var(--ink3)}
.wl-del{background:none;border:none;color:var(--ink3);font-size:16px;cursor:pointer;padding:0 4px}
.wl-del:hover{color:var(--rose)}
.wl-add-row{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.wl-sel{
  flex:1;background:var(--bg3);border:1.5px solid var(--bdr2);border-radius:10px;
  padding:9px 12px;font-size:13px;color:var(--ink);outline:none;
  appearance:none;-webkit-appearance:none;
}

/* ═══ NOTIFY ═══ */
.notif{
  position:fixed;top:20px;left:50%;transform:translateX(-50%);
  border-radius:26px;padding:12px 22px;z-index:200;
  font-size:13px;font-weight:700;
  box-shadow:0 12px 40px rgba(21,101,192,0.1);white-space:nowrap;
  animation:slideIn 0.3s ease;border:1.5px solid;
  max-width:85vw;text-align:center;
}
.notif.ok{background:rgba(34,197,94,0.15);border-color:rgba(34,197,94,0.4);color:var(--teal)}
.notif.info{background:rgba(232,146,30,0.15);border-color:rgba(232,146,30,0.4);color:var(--amber)}
.notif.warn{background:rgba(239,68,68,0.15);border-color:rgba(239,68,68,0.4);color:var(--rose)}
@keyframes slideIn{from{opacity:0;transform:translateX(-50%) translateY(-14px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.spin{display:inline-block;animation:spin 0.9s linear infinite}
.empty{text-align:center;padding:60px 20px;color:var(--ink3)}
.empty-i{font-size:42px;margin-bottom:14px}
.empty-t{font-size:15px}

/* ═══ 자동 갱신 토스트 ═══ */
.refresh-bar{
  position:fixed;bottom:70px;left:50%;transform:translateX(-50%);

/* ════════════════════════════════════════════════
   🔐 AI API 엔드포인트 설정
   ─────────────────────────────────────────────
   보안을 위해 Anthropic API를 직접 호출하지 않고
   Cloudflare Workers 프록시를 경유합니다.

   [배포 전 설정 방법]
   1. https://workers.cloudflare.com 에서 Worker 생성
   2. 아래 worker.js 코드를 붙여넣기:

      export default {
        async fetch(request, env) {
          const res = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: {
              "x-api-key": env.ANTHROPIC_API_KEY,
              "anthropic-version": "2023-06-01",
              "Content-Type": "application/json"
            },
            body: request.body
          });
          return new Response(res.body, {
            headers: { ...res.headers, "Access-Control-Allow-Origin": "*" }
          });
        }
      };

   3. Worker 설정 → 환경변수 → ANTHROPIC_API_KEY 입력
   4. Worker URL을 아래 AI_API_URL에 붙여넣기
   ════════════════════════════════════════════════ */
const AI_API_URL = (() => {
  // 로컬/개발 환경: 비워두면 AI 기능 비활성화
  // 배포 환경: Cloudflare Workers URL 입력
  // 예시: "https://kospi-ai-proxy.https://misty-glade-ddcf.namicoco80.workers.dev"
  const stored = (() => { try { return localStorage.getItem('cf_worker_url') || ''; } catch(e) { return ''; } })();
  return stored || 'https://misty-glade-ddcf.namicoco80.workers.dev';
})();

function aiApiFetch(body) {
  const url = (() => { try { return localStorage.getItem('cf_worker_url') || AI_API_URL; } catch(e) { return AI_API_URL; } })();
  if (!url) {
    return Promise.reject(new Error('CF_WORKER_NOT_SET'));
  }
  return fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
}

  try { return localStorage.getItem('gemini_api_key') || ''; } catch(e) { return ''; }

  try { localStorage.setItem('gemini_api_key', key.trim()); } catch(e) {}

// 하루 3번 제한
function getPortAIUsage() {
  try {
    const d = JSON.parse(localStorage.getItem('portai_usage') || '{}');
    const today = new Date().toDateString();
    if (d.date !== today) return { date: today, count: 0 };
    return d;
  } catch(e) { return { date: new Date().toDateString(), count: 0 }; }
}
function incPortAIUsage() {
  const d = getPortAIUsage();
  d.count++;
  try { localStorage.setItem('portai_usage', JSON.stringify(d)); } catch(e) {}
}
function getPortAIRemain() {
  return Math.max(0, 3 - getPortAIUsage().count);
}

async function geminiPortfolioFetch(prompt) {
  const key = getGeminiKey();
  if (!key) throw new Error('GEMINI_KEY_NOT_SET');
  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${key}`;
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      contents: [{ parts: [{ text: prompt }] }],
      generationConfig: { temperature: 0.7, maxOutputTokens: 2000 }
    })
  });
  if (!res.ok) {
    const err = await res.json().catch(()=>({}));
    throw new Error(err?.error?.message || 'Gemini API 오류');
  }
  const data = await res.json();
  return data.candidates?.[0]?.content?.parts?.[0]?.text || '';
}

function lsSavePrices() {
  try {
    const data = {};
    Object.keys(PRICE_BASE).forEach(code => {
      const p = PRICE_BASE[code];
      if (p.price !== null && p.price !== undefined) {
        data[code] = {
          price:      p.price,
          chg:        p.chg      ?? 0,
          basePrice:  p.basePrice ?? p.price,
          high:       p.high     ?? '—',
          low:        p.low      ?? '—',
          open:       p.open     ?? '—',
          vol:        p.vol      ?? '—',
          dataSource: p.dataSource ?? 'manual',
          savedAt:    Date.now(),
        };
      }
    });
    localStorage.setItem(PRICE_ENGINE.LS_KEY, JSON.stringify(data));
  } catch(e) {
    console.warn('[PriceEngine] localStorage 저장 실패:', e);
  }
}

  try {
    const raw = localStorage.getItem(PRICE_ENGINE.LS_KEY);
    if (!raw) return {};
    return JSON.parse(raw);
  } catch(e) {
    console.warn('[PriceEngine] localStorage 불러오기 실패:', e);
    return {};
  }
}

/* localStorage → PRICE_BASE 에 적용 (null 인 항목만) */
function applyLsPrices(lsData) {
  let count = 0;
  Object.keys(lsData).forEach(code => {
    if (!PRICE_BASE[code]) return;
    const d = lsData[code];
    if (!d.price) return;

    // 만료 여부 체크
    const age  = Date.now() - (d.savedAt || 0);
    const src  = age > PRICE_ENGINE.EXPIRE_MS ? 'cached_old' : 'cached';

    // PRICE_BASE 가 null(미입력) 이거나 이미 cached 인 경우만 덮어씀
    // live / manual 은 더 신뢰할 수 있으므로 유지
    if (PRICE_BASE[code].price === null || PRICE_BASE[code].price === undefined ||
        PRICE_BASE[code].dataSource === 'cached' || PRICE_BASE[code].dataSource === 'cached_old') {
      Object.assign(PRICE_BASE[code], {
        price:      d.price,
        chg:        d.chg      ?? 0,
        basePrice:  d.basePrice ?? d.price,
        high:       d.high     ?? '—',
        low:        d.low      ?? '—',
        open:       d.open     ?? '—',
        vol:        d.vol      ?? '—',
        dataSource: src,
      });
      count++;
    }
  });
  return count;
}

/* ──────────────────────────────────────────
   📄 1순위: prices.json fetch
   (HTML과 같은 폴더에 prices.json 이 있으면 자동 사용)
────────────────────────────────────────── */
async function fetchJsonPrices() {
  try {
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), 5000);
    // GitHub Pages: /kospi-intel/prices.json 경로 자동 대응
    const urls = [
      PRICE_ENGINE.JSON_URL,
      './prices.json',
      window.location.origin + window.location.pathname.replace(/\/[^\/]*$/, '') + '/prices.json',
    ];
    clearTimeout(timer);
    for (const url of [...new Set(urls)]) {
      try {
        const ctrl2 = new AbortController();
        const t2 = setTimeout(() => ctrl2.abort(), 4000);
        const r = await fetch(url, { signal: ctrl2.signal, cache: 'no-store' });
        clearTimeout(t2);
        if (!r.ok) continue;
        const json = await r.json();
        const n = applyJsonData(json, 'json');
        if (n > 0) {
          console.log(`[PriceEngine] prices.json 로드 성공 (${url}): ${n}종목`);
          return n;
        }
      } catch(e2) { /* 다음 URL 시도 */ }
    }
    return 0;
  } catch(e) {
    return 0;
  }
}

/* JSON 데이터를 PRICE_BASE 에 적용
   지원 형식:
   { "005930": 55800 }                          ← 단순 가격
   { "005930": { price:55800, chg:1.2, ... } }  ← 상세 객체  */
function applyJsonData(json, source) {
  let count = 0;
  let latestUpdatedAt = null;
  Object.keys(json).forEach(code => {
    if (!PRICE_BASE[code]) return;
    const val = json[code];
    let price, chg, high, low, open, vol, basePrice, updatedAt;

    if (typeof val === 'number') {
      price     = Math.round(val);
      chg       = 0;
      basePrice = PRICE_BASE[code].basePrice ?? price;
      high = low = open = '—';
      vol = '—';
      updatedAt = null;
    } else if (typeof val === 'object' && val !== null) {
      price     = Math.round(val.price ?? val.currentPrice ?? val.close ?? 0);
      chg       = val.chg   ?? val.changeRate ?? val.change ?? 0;
      basePrice = val.basePrice ?? val.prevClose ?? val.prev ?? price;
      // prices.json high/low/open은 문자열 숫자 가능 ("56200" 형태)
      const fmtN = v => v ? Number(String(v).replace(/,/g,'')).toLocaleString('ko-KR') : '—';
      high      = fmtN(val.high);
      low       = fmtN(val.low);
      open      = fmtN(val.open);
      vol       = val.vol ?? val.volume ?? '—';
      updatedAt = val.updatedAt ?? null;
      if (updatedAt && (!latestUpdatedAt || updatedAt > latestUpdatedAt)) {
        latestUpdatedAt = updatedAt;
      }
    } else return;

    if (!price || price <= 0) return;

    setPriceBase(code, { price, chg, basePrice, high, low, open, vol, dataSource: source, updatedAt });
    count++;
  });
  // 마지막 업데이트 시간 헤더에 표시
  if (latestUpdatedAt) {
    try {
      const dt = new Date(latestUpdatedAt);
      const kst = new Date(dt.getTime() + 0); // updatedAt은 이미 KST ISO
      const hhmm = kst.toLocaleString('ko-KR', {month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});
      S._priceUpdatedAt = hhmm;
    } catch(e) {}
  }
  return count;
}

/* ──────────────────────────────────────────
   🌐 1순위 보조: CORS 프록시로 외부 API 시도
   (JSON 파일이 없을 때 추가 시도)
────────────────────────────────────────── */
async function fetchViaProxy(code) {
  const KOSDAQ = ['035720','247540','042700','068270'];
  const suffix  = KOSDAQ.includes(code) ? '.KQ' : '.KS';

  for (const proxyBase of PRICE_ENGINE.PROXY_URLS) {
    /* Yahoo Finance */
    try {
      const target = `https://query1.finance.yahoo.com/v8/finance/chart/${code}${suffix}?interval=1d&range=1d`;
      const url    = proxyBase.endsWith('=')
        ? proxyBase + encodeURIComponent(target)
        : proxyBase + target;

      const ctrl  = new AbortController();
      const timer = setTimeout(() => ctrl.abort(), 6000);
      const r     = await fetch(url, { signal: ctrl.signal });
      clearTimeout(timer);
      if (!r.ok) continue;

      let body;
      const text = await r.text();
      /* allorigins 는 { contents: "..." } 래퍼 사용 */
      try {
        const wrap = JSON.parse(text);
        body = wrap.contents ? JSON.parse(wrap.contents) : wrap;
      } catch(e) {
        body = JSON.parse(text);
      }

      const meta = body?.chart?.result?.[0]?.meta;
      if (!meta) continue;
      const price = Math.round(meta.regularMarketPrice ?? 0);
      if (!price) continue;

      const prev    = Math.round(meta.previousClose ?? meta.chartPreviousClose ?? 0);
      const chg     = prev ? Math.round((price - prev) / prev * 10000) / 100 : 0;
      const vol     = meta.regularMarketVolume ?? 0;
      const volStr  = vol > 1e6 ? (vol/1e6).toFixed(1)+'M' : vol > 1e3 ? (vol/1e3).toFixed(0)+'K' : String(vol);
      setPriceBase(code, {
        price, chg,
        basePrice: prev || price,
        high: Math.round(meta.regularMarketDayHigh ?? price).toLocaleString('ko-KR'),
        low:  Math.round(meta.regularMarketDayLow  ?? price).toLocaleString('ko-KR'),
        open: Math.round(meta.regularMarketOpen    ?? price).toLocaleString('ko-KR'),
        vol:  volStr,
        dataSource: 'live',
      });
      return true;
    } catch(e) { /* 다음 프록시 */ }
  }
  return false;
}

/* ──────────────────────────────────────────
   🔑 공통: PRICE_BASE 값 세팅 + 즉시 저장
────────────────────────────────────────── */
function setPriceBase(code, data) {
  if (!PRICE_BASE[code]) return;
  Object.assign(PRICE_BASE[code], data);
  // 매번 저장 대신 디바운스 (100ms 내 중복 저장 방지)
  if (setPriceBase._timer) clearTimeout(setPriceBase._timer);
  setPriceBase._timer = setTimeout(lsSavePrices, 100);
}

/* ──────────────────────────────────────────
   ✍️  3순위: 수동 입력
────────────────────────────────────────── */
function manualPriceInput(code, priceStr) {
  const price = Number(String(priceStr).replace(/[,\s]/g, ''));
  if (!price || price <= 0) {
    notify('⚠️ 올바른 가격을 입력해주세요', 'warn');
    return false;
  }
  const prev = PRICE_BASE[code]?.basePrice ?? price;
  const chg  = prev ? Math.round((price - prev) / prev * 10000) / 100 : 0;
  setPriceBase(code, {
    price, chg,
    basePrice:  prev,
    high: '—', low: '—', open: '—', vol: '—',
    dataSource: 'manual',
  });
  const name = STOCKS.find(s => s.code === code)?.name ?? code;
  notify(`✅ ${name} ${price.toLocaleString()}원 입력됨`, 'ok');
  refreshPriceDom();
  refreshPortfolioDom();
  return true;
}

/* ──────────────────────────────────────────
   🚀 메인 가격 수집 함수 (우선순위 엔진)
────────────────────────────────────────── */
async function fetchAllPrices() {
  /* ── 2순위: localStorage 먼저 적용 (즉각 반영) ── */
  const lsData  = lsLoadPrices();
  const lsCount = applyLsPrices(lsData);
  if (lsCount > 0) {
    refreshPriceDom();
    refreshPortfolioDom();
  }

  /* ── 1순위-A: prices.json fetch ── */
  const jsonCount = await fetchJsonPrices();
  if (jsonCount > 0) {
    refreshPriceDom();
    refreshPortfolioDom();
    lsSavePrices();
    return jsonCount;
  }

  /* ── 1순위-B: CORS 프록시로 종목별 API 시도 ── */
  const codes   = Object.keys(PRICE_BASE);
  let liveCount = 0;
  const CHUNK   = 3;

  for (let i = 0; i < codes.length; i += CHUNK) {
    const batch   = codes.slice(i, i + CHUNK);
    const results = await Promise.all(batch.map(fetchViaProxy));
    liveCount    += results.filter(Boolean).length;
    if (i + CHUNK < codes.length) {
      await new Promise(r => setTimeout(r, 200));
    }
  }

  refreshPriceDom();
  refreshPortfolioDom();
  if (liveCount > 0) lsSavePrices();

  return liveCount + lsCount;
}

/* ──────────────────────────────────────────
   🔄 DOM 갱신 (피드/워치리스트 가격 태그)
────────────────────────────────────────── */
function refreshPriceDom() {
  document.querySelectorAll('[data-price-code]').forEach(el => {
    const code = el.dataset.priceCode;
    const p    = PRICE_BASE[code];
    if (!p) return;
    if (p.price === null || p.price === undefined) return;

    const vEl = el.querySelector('.price-val');
    const cEl = el.querySelector('.price-chg');
    const sEl = el.querySelector('.price-source-tag');

    if (vEl) vEl.textContent = p.price.toLocaleString('ko-KR') + '원';

    if (cEl) {
      const chgVal = p.chg ?? 0;
      cEl.textContent = (chgVal >= 0 ? '+' : '') + chgVal + '%';
      cEl.className   = 'price-chg ' + (chgVal > 0 ? 'up' : chgVal < 0 ? 'dn' : 'flat');
    }

    if (sEl) {
      const labels = {
        live:       'LIVE',
        json:       'JSON',
        cached:     '저장',
        cached_old: '구저장',
        manual:     '수동',
      };
      const cls = ['live','json'].includes(p.dataSource) ? 'live' : 'sim';
      sEl.textContent = labels[p.dataSource] ?? 'SIM';
      sEl.className   = 'price-source-tag ' + cls;
    }
  });
}

/* ──────────────────────────────────────────
   💼 포트폴리오 DOM 갱신
────────────────────────────────────────── */
function refreshPortfolioDom() {
  try {
    if (S.tab !== 'port' || !S.portfolio.length) return;

    /* 전체 요약 재계산 */
    let totalVal = 0, totalCost = 0;
    S.portfolio.forEach(p => {
      const pr = PRICE_BASE[p.code];
      if (!pr || pr.price === null || pr.price === undefined) return;
      totalVal  += pr.price * p.qty;
      totalCost += p.buyPrice * p.qty;
    });
    const totalPnl    = totalVal - totalCost;
    const totalPnlPct = totalCost > 0 ? ((totalPnl / totalCost) * 100).toFixed(2) : '0.00';
    const isGain      = totalPnl >= 0;
    const sign        = isGain ? '+' : '';
    const pnlColor    = isGain ? 'var(--teal)' : 'var(--rose)';

    /* 요약 행 갱신 */
    const rows = document.querySelectorAll('.port-sum-row');
    if (rows.length >= 3) {
      const valEl  = rows[0].querySelector('.port-sum-val');
      const costEl = rows[1].querySelector('.port-sum-val');
      const pnlEl  = rows[2].querySelector('.port-sum-val');
      if (valEl)  valEl.textContent  = totalVal.toLocaleString('ko-KR') + '원';
      if (costEl) costEl.textContent = totalCost.toLocaleString('ko-KR') + '원';
      if (pnlEl) {
        pnlEl.textContent = sign + totalPnlPct + '% (' +
          sign + Math.round(totalPnl).toLocaleString('ko-KR') + '원)';
        pnlEl.style.color = pnlColor;
      }
    }

    /* 종목별 카드 갱신 */
    S.portfolio.forEach(p => {
      const pr   = PRICE_BASE[p.code];
      const card = document.querySelector(`.port-card[data-port-code="${p.code}"]`);
      if (!card) return;

      const svEls = card.querySelectorAll('.port-sv');

      if (!pr || pr.price === null || pr.price === undefined) {
        /* 가격 없음 표시 */
        if (svEls[1]) { svEls[1].textContent = '—'; svEls[1].style.color = 'var(--ink3)'; }
        if (svEls[2]) svEls[2].textContent = '—';
        return;
      }

      const pnl    = (pr.price - p.buyPrice) * p.qty;
      const pnlPct = ((pr.price - p.buyPrice) / p.buyPrice * 100).toFixed(2);
      const isPos  = pnl >= 0;
      const sg     = isPos ? '+' : '';

      /* 현재가 */
      if (svEls[1]) {
        svEls[1].textContent = pr.price.toLocaleString('ko-KR');
        svEls[1].style.color = isPos ? 'var(--teal)' : 'var(--rose)';
      }
      /* 평가액 */
      if (svEls[2]) svEls[2].textContent = (pr.price * p.qty).toLocaleString('ko-KR');

      /* 수익률 */
      const pnlEl = card.querySelector('.port-pnl');
      if (pnlEl) {
        pnlEl.textContent = sg + pnlPct + '%';
        pnlEl.className   = 'port-pnl ' + (isPos ? 'pos' : 'neg');
      }
      /* 손익금액 */
      const pnlAmtEl = pnlEl?.nextElementSibling;
      if (pnlAmtEl) {
        pnlAmtEl.textContent = sg + Math.round(pnl).toLocaleString('ko-KR') + '원';
      }

      /* [data-price-code] 인라인 가격 태그 */
      const priceRow = card.querySelector('[data-price-code]');
      if (priceRow) {
        const vEl = priceRow.querySelector('.price-val');
        const cEl = priceRow.querySelector('.price-chg');
        const sEl = priceRow.querySelector('.price-source-tag');
        if (vEl) vEl.textContent = pr.price.toLocaleString('ko-KR') + '원';
        if (cEl) {
          cEl.textContent = (pr.chg >= 0 ? '+' : '') + (pr.chg ?? 0) + '%';
          cEl.className   = 'price-chg ' + (pr.chg > 0 ? 'up' : pr.chg < 0 ? 'dn' : 'flat');
        }
        if (sEl) {
          const labels = { live:'LIVE', json:'JSON', cached:'저장', cached_old:'구저장', manual:'수동' };
          sEl.textContent = labels[pr.dataSource] ?? 'SIM';
          sEl.className   = 'price-source-tag ' + (pr.dataSource === 'live' || pr.dataSource === 'json' ? 'live' : 'sim');
        }
      }
    });

  } catch(err) {
    console.warn('[PriceEngine] refreshPortfolioDom 오류:', err);
    if (S.tab === 'port') try { render(); } catch(_) {}
  }
}

/* ──────────────────────────────────────────
   ⏱️  시뮬 틱 (가격 없는 종목은 건드리지 않음)
────────────────────────────────────────── */
function updatePrices() {
  Object.keys(PRICE_BASE).forEach(code => {
    const p = PRICE_BASE[code];
    /* null / live / json / manual / cached 는 변경 금지 */
    if (p.price === null || p.price === undefined) return;
    if (['live','json','manual','cached','cached_old'].includes(p.dataSource)) return;
    const base = p.basePrice ?? p.price;
    const d    = (Math.random() - 0.5) * 0.5;
    const np   = Math.round(base * (1 + d / 100) / 10) * 10;
    p.price    = Math.max(Math.round(base * 0.95 / 10) * 10,
                 Math.min(Math.round(base * 1.05 / 10) * 10, np));
    p.chg      = Math.round((p.price - base) / base * 10000) / 100;
  });
}

/* ══ localStorage 안전 접근 헬퍼 ══ */
function safeLS(key, fallback) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
  catch(e) { console.warn('[KOSPI] localStorage 오류:', key, e); return fallback; }
}
function safeLSStr(key, fallback) {
  try { return localStorage.getItem(key) || fallback; }
  catch(e) { return fallback; }
}
function safeSetLS(key, val) {
  try { localStorage.setItem(key, typeof val==='string'?val:JSON.stringify(val)); }
  catch(e) { console.warn('[KOSPI] localStorage write 오류:', key, e); }
}

// 뉴스 분석 결과 캐시 (id → {score, verdict, detail, judgment, aiSummary, aiKeywords, dartResult})
let _analysisCache = safeLS('analysisCache', {});

function saveAnalysisCache() {
  // 최근 200건만 유지 (용량 절약)
  const keys = Object.keys(_analysisCache);
  if (keys.length > 200) {
    const sorted = keys.sort((a,b) => (_analysisCache[b]?.savedAt||0) - (_analysisCache[a]?.savedAt||0));
    sorted.slice(200).forEach(k => delete _analysisCache[k]);
  }
  safeSetLS('analysisCache', _analysisCache);
}

function cacheAnalysis(id, fields) {
  _analysisCache[id] = { ...(_analysisCache[id]||{}), ...fields, savedAt: Date.now() };
  saveAnalysisCache();
}

function restoreAnalysisToNews() {
  // NEWS 로드 후 캐시에서 분석 결과 복원
  let restored = 0;
  NEWS.forEach((n, i) => {
    const c = _analysisCache[n.id];
    if (!c) return;
    if (c.score     !== undefined) NEWS[i].score     = c.score;
    if (c.verdict   !== undefined) NEWS[i].verdict   = c.verdict;
    if (c.detail    !== undefined) NEWS[i].detail    = c.detail;
    if (c.judgment  !== undefined) NEWS[i].judgment  = c.judgment;
    if (c.aiSummary !== undefined) NEWS[i].aiSummary = c.aiSummary;
    if (c.aiKeywords!== undefined) NEWS[i].aiKeywords= c.aiKeywords;
    if (c.dartResult!== undefined) NEWS[i].dartResult= c.dartResult;
    restored++;
  });
  if (restored > 0) {
    console.log('[Cache] 분석 결과 복원:', restored, '건');
    render();
  }
}

function getMarketStatus() {
  const now = new Date();
  const day = now.getDay(); // 0=일, 6=토
  if(day === 0 || day === 6) return 'closed'; // 주말 장외
  const h = now.getHours(), m = now.getMinutes();
  const mins = h * 60 + m;
  if(mins >= 9*60 && mins < 15*60+30) return 'open';
  if(mins >= 8*60 && mins < 9*60) return 'pre';
  if(mins >= 15*60+30 && mins < 16*60) return 'post';
  return 'closed';
}

/* ════════════════════════════════════════════════
   📦 fetchAllData() — news.json / supply.json 로드
   prices.json 과 함께 앱 시작 시 한 번, 이후 5분마다 갱신
   ════════════════════════════════════════════════ */
async function fetchNewsJson() {
  const urls = ['./news.json', window.location.pathname.replace(/\/[^\/]*$/, '') + '/news.json'];
  for (const url of [...new Set(urls)]) {
    try {
      const ctrl = new AbortController();
      const t = setTimeout(() => ctrl.abort(), 5000);
      const r = await fetch(url, { signal: ctrl.signal, cache: 'no-store' });
      clearTimeout(t);
      if (!r.ok) continue;
      const json = await r.json();
      if (!Array.isArray(json) || json.length === 0) continue;
      // 기존 판단/팩트체크 결과 유지 (id 기준 merge)
      const existingMap = {};
      NEWS.forEach(n => { existingMap[n.id] = n; });
      NEWS = json.map(n => {
        const ex = existingMap[n.id];
        if (!ex) return n;
        // 사용자가 이미 분석한 항목 보존
        return {
          ...n,
          score:      ex.score      ?? n.score,
          verdict:    ex.verdict    ?? n.verdict,
          detail:     ex.detail     ?? n.detail,
          dartResult: ex.dartResult ?? n.dartResult,
          judgment:   ex.judgment   ?? n.judgment,
          aiSummary:  ex.aiSummary  ?? n.aiSummary,
          aiKeywords: ex.aiKeywords ?? n.aiKeywords,
        };
      });
      _newsLoaded = true;
      console.log(`[News] news.json 로드 완료: ${NEWS.length}건 (${url})`);
      setTimeout(() => runMarketLearning(), 100);       // 임팩트+감성+테마+주가패턴
      setTimeout(() => restoreAnalysisToNews(), 400);
      setTimeout(() => autoAddNewStocks(), 700);
      setTimeout(() => autoTranslateEnglish(), 1300);
      return NEWS.length;
    } catch(e) { /* 다음 URL 시도 */ }
  }
  return 0;
}

async function fetchSupplyJson() {
  const urls = ['./supply.json', window.location.pathname.replace(/\/[^\/]*$/, '') + '/supply.json'];
  for (const url of [...new Set(urls)]) {
    try {
      const ctrl = new AbortController();
      const t = setTimeout(() => ctrl.abort(), 5000);
      const r = await fetch(url, { signal: ctrl.signal, cache: 'no-store' });
      clearTimeout(t);
      if (!r.ok) continue;
      const json = await r.json();
      if (typeof json !== 'object' || Array.isArray(json)) continue;
      // SUPPLY_BASE 갱신
      Object.assign(SUPPLY_BASE, json);
      _supplyLoaded = true;
      console.log(`[Supply] supply.json 로드 완료: ${Object.keys(json).length}종목 (${url})`);
      return Object.keys(json).length;
    } catch(e) { /* 다음 URL 시도 */ }
  }
  return 0;
}

// ── analysis.json 자동 로드 (Gemini 서버사이드 분석) ──
async function fetchAnalysisJson() {
  try {
    const r = await fetch('./analysis.json?t=' + Date.now());
    if (!r.ok) return 0;
    const data = await r.json();
    if (!data || typeof data !== 'object') return 0;
    // portAnalysis에 자동 병합 (수동 재분석 우선)
    let merged = 0;
    for (const [code, ana] of Object.entries(data)) {
      if (code.startsWith('_')) continue;
      if (!S.portAnalysis) S.portAnalysis = {};
      // 이미 수동 분석된 건 덮어쓰지 않음
      if (!S.portAnalysis[code] || S.portAnalysis[code]._fromServer) {
        S.portAnalysis[code] = {...ana, _fromServer: true};
        merged++;
      }
    }
    if (merged > 0) {
      safeSetLS('portAnalysis', S.portAnalysis);
      console.log(`[AI] analysis.json ${merged}종목 자동 로드`);
    }
    return merged;
  } catch(e) {
    console.log('[AI] analysis.json 없음 (정상)');
    return 0;
  }
}

function startAutoRefresh() {
  if(S.autoTimer) clearInterval(S.autoTimer);
  if(S.priceTimer) clearInterval(S.priceTimer);

  // 1분마다: 장중/장외 관계없이 실시간 조회 시도
  // 장외에도 전날 종가 기준 실시간 데이터가 유효함
  // prices.json 5분마다 fetch (GitHub Actions 업데이트 반영)
  S.priceTimer = setInterval(async() => {
    if(!S.autoRefresh) return;
    const { priceN, supplyN, newsN } = await fetchAllData();
    if(priceN === 0) { updatePrices(); refreshPriceDom(); }
    if(S.tab === 'port') refreshPortfolioDom();
    if(newsN > 0 || supplyN > 0) render();  // 수급/뉴스 갱신 시 화면 재렌더
  }, 5 * 60 * 1000);  // 5분마다

  // 5분마다 뉴스 갱신
  S.autoTimer = setInterval(() => {
    if(!S.autoRefresh) return;
    autoFetchNews();
  }, 5 * 60 * 1000);

  checkMarketEvents();

  // 시계 독립 업데이트 (render() 없이 매초)
  function tickClock() {
    const el = document.getElementById('hdr-clock');
    if(el) el.textContent = new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  }
  tickClock();
  setInterval(tickClock, 1000);

  // 앱 로드 시 즉시 실시간 조회 시도
  /* 가격 엔진 시작:
     1) localStorage 즉시 복원 (화면에 바로 반영)
     2) 백그라운드에서 JSON/API 조회
     3) 실패 시 시뮬 틱으로 폴백                   */
  (async () => {
    notify('📡 데이터 로딩 중... (주가·수급·뉴스)', 'info');
    const { priceN, supplyN, newsN } = await fetchAllData();
    await fetchAnalysisJson();  // AI 분석 자동 로드

    const msgs = [];
    if (priceN > 0) {
      const src_label = Object.values(PRICE_BASE).find(p => p.dataSource === 'json') ? 'JSON' : 'LIVE';
      msgs.push(`주가 ${priceN}종목(${src_label})`);
    }
    if (supplyN > 0) msgs.push(`수급 ${supplyN}종목`);
    if (newsN  > 0) msgs.push(`뉴스 ${newsN}건`);

    if (msgs.length > 0) {
      notify(`✅ 로드 완료: ${msgs.join(' · ')}`, 'ok');
      if (S._priceUpdatedAt) {
        setTimeout(() => notify(`🕐 데이터 기준: ${S._priceUpdatedAt}`, 'info'), 2000);
      }
    } else {
      notify('📊 JSON 파일 미로드 — GitHub Actions 첫 실행 후 자동으로 생성됩니다', 'info');
      updatePrices();
    }

    render();  // 뉴스/수급 로드 후 화면 갱신
  })();
}

let _lastMarketStatus = getMarketStatus();
function checkMarketEvents() {
  setInterval(() => {
    const cur = getMarketStatus();
    if(cur !== _lastMarketStatus) {
      if(cur === 'open') {
        notify('🔔 장 시작! 뉴스·공시 자동 업데이트','info');
        autoFetchNews();
      } else if(cur === 'closed' && _lastMarketStatus === 'open') {
        notify('📊 장 마감. 오늘 이슈 정리됩니다','info');
        autoFetchNews();
      }
      _lastMarketStatus = cur;
      render();
    }
  }, 60000);
}

async function autoFetchNews() {
  /* news.json 을 새로 fetch 하여 갱신 (하드코딩 템플릿 제거) */
  const prevLen = NEWS.length;
  const n = await fetchNewsJson();

  if (n > 0 && NEWS.length > prevLen) {
    const newItems = NEWS.slice(0, NEWS.length - prevLen);
    newItems.forEach(newItem => {
      newItem._new = true;
      if(S.alertSettings.newIssueAlert) {
        notify(`🆕 신규 이슈: ${newItem.title.slice(0,20)}...`, newItem.urgency===1?'warn':'info');
      }
      if(S.alertSettings.keywordAlert) {
        const matched = S.keywords.find(kw => newItem.title.includes(kw) || newItem.body.includes(kw));
        if(matched) notify(`🔔 키워드 알림 [${matched}] 이슈 발생!`, 'warn');
      }
      checkWatchlistAlert(newItem);
    });
    S.refreshToast = true;
    if(S.tab === 'feed') reCards();
    else render();
    setTimeout(() => { S.refreshToast = false; render(); }, 3000);
  }
}

function checkWatchlistAlert(item) {
  if(!S.alertSettings.watchlistAlert) return;
  if(S.watchlist.includes(item.code)) {
    const stock = gs(item.code);
    notify(`⭐ 관심종목 [${stock?.name}] 새 이슈 발생!`, 'warn');
  }
}

}

function notify(msg, type="info") {
  if(S.nt) clearTimeout(S.nt);
  S.notif = {msg, type}; render();
  S.nt = setTimeout(()=>{ S.notif=null; render(); }, 3500);
}

function filtered() {
  return NEWS.filter(n => {
    const s = gs(n.code);
    if(S.sector!=="전체" && s?.sector!==S.sector) return false;
    if(S.tf!=="전체" && n.type!==S.tf) return false;
    if(S.sk && n.code!==S.sk) return false;
    if(S.themeFilter && !(n.themes||[]).includes(S.themeFilter)) return false;
    if(S.gradeFilter!=="all" && getGrade(n)!==S.gradeFilter) return false;
    if(S.q && !n.title.includes(S.q) && !s?.name.includes(S.q) && !(n.aiKeywords||[]).join('').includes(S.q)) return false;
    return true;
  }).sort((a,b) => a.urgency - b.urgency);
}

    <div class="spark-bars">${history.map(v=>`<div class="spark-bar" style="height:${Math.round((v/max)*22)||3}px;background:${color};opacity:${0.3+0.7*(v/max)}"></div>`).join('')}</div>
    <span class="spark-pk" style="color:${color}">+${history[history.length-1]}</span>

}

/* ══ RING ══ */
function ring(score, size=60) {
  const r=size/2-6, circ=2*Math.PI*r, dash=score!=null?(score/100)*circ:0, col=sc(score);
  return `<div class="ring" style="width:${size}px;height:${size}px">
    <svg width="${size}" height="${size}" style="transform:rotate(-90deg)">
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="var(--bg3)" stroke-width="6"/>
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${col}" stroke-width="6" stroke-dasharray="${dash} ${circ}" stroke-linecap="round"/>
    </svg>
    <div class="ring-v" style="color:${col};font-size:${score!=null?13:10}px">${score!=null?score:"?"}</div>
  </div>`;
}

// ── 메모리 스토어 (localStorage 기반) ──
const MEM = {
  // 종목별 뉴스 감성 히스토리 { code: [{date, sent, title, impactScore}] }
  getSentHistory: (code) => safeLS(`mem_sent_${code}`, []),
  setSentHistory: (code, arr) => safeSetLS(`mem_sent_${code}`, arr.slice(-60)), // 최근 60건

  // 테마별 트렌드 점수 { theme: [{date, score, delta}] }
  getThemeTrend: (theme) => safeLS(`mem_theme_${theme}`, []),
  setThemeTrend: (theme, arr) => safeSetLS(`mem_theme_${theme}`, arr.slice(-30)), // 최근 30일

  // 주가 방향성 패턴 { code: {trend: 'up'|'down'|'flat', streak: N, lastDate, history:[]} }
  getPricePattern: (code) => safeLS(`mem_price_${code}`, {trend:'flat', streak:0, bullDays:0, bearDays:0, history:[]}),
  setPricePattern: (code, obj) => safeSetLS(`mem_price_${code}`, obj),

  // 전체 테마 트렌드 요약 캐시
  getThemeSummary: () => safeLS('mem_theme_summary', {}),
  setThemeSummary: (obj) => safeSetLS('mem_theme_summary', obj),
};

// ── 1. 뉴스 로드 시 감성 히스토리 업데이트 ──
function updateSentimentHistory() {
  const today = new Date().toISOString().slice(0,10);
  const processed = safeLS('mem_processed_dates', []);

  NEWS.forEach(n => {
    if (!n.code || !n.sent) return;
    const hist = MEM.getSentHistory(n.code);
    // 오늘 같은 뉴스 중복 방지
    const alreadyHas = hist.some(h => h.id === n.id);
    if (alreadyHas) return;
    hist.push({
      id: n.id,
      date: today,
      sent: n.sent || '중립',      // '긍정'/'부정'/'중립'
      title: (n.title||'').slice(0, 40),
      impact: n.impactScore || n.impact || 50,
      impactScore: n.impactScore || n.impact || 50,
      type: n.type
    });
    MEM.setSentHistory(n.code, hist);
  });
}

// ── 2. 테마별 트렌드 점수 누적 ──
function updateThemeTrends() {
  const today = new Date().toISOString().slice(0,10);
  const summary = {};

  THEMES.forEach(th => {
    const relNews = NEWS.filter(n => (n.themes||[]).includes(th.name));
    if (!relNews.length) return;

    // 오늘 점수 계산
    const posCount = relNews.filter(n => n.sent === '긍정').length;
    const negCount = relNews.filter(n => n.sent === '부정').length;
    const avgImpact = relNews.reduce((s,n) => s+(n.impactScore||50), 0) / relNews.length;
    const todayScore = Math.round(
      (posCount * 2 - negCount * 2 + avgImpact * 0.3 + relNews.length * 0.5)
    );

    const hist = MEM.getThemeTrend(th.name);
    const lastEntry = hist[hist.length-1];

    // 오늘 데이터 없으면 추가
    if (!lastEntry || lastEntry.date !== today) {
      const delta = lastEntry ? todayScore - lastEntry.score : 0;
      hist.push({ date: today, score: todayScore, delta, newsCount: relNews.length });
      MEM.setThemeTrend(th.name, hist);
    }

    // 트렌드 방향 (최근 3일 기준)
    const recent = hist.slice(-3);
    const avgDelta = recent.length > 1
      ? recent.slice(1).reduce((s,h) => s+h.delta, 0) / (recent.length-1)
      : 0;

    summary[th.name] = {
      score: todayScore,
      trend: avgDelta > 2 ? '↑상승' : avgDelta < -2 ? '↓하락' : '→횡보',
      trendColor: avgDelta > 2 ? '#E53935' : avgDelta < -2 ? '#1565C0' : '#78909C',
      history: hist.slice(-7), // 최근 7일
      newsCount: relNews.length
    };
  });

  MEM.setThemeSummary(summary);
  return summary;
}

// ── 3. 주가 방향성 패턴 저장 ──
function updatePricePatterns() {
  const today = new Date().toISOString().slice(0,10);

  Object.keys(PRICE_BASE).forEach(code => {
    const pr = PRICE_BASE[code];
    if (!pr || pr.price === null) return;
    const pat = MEM.getPricePattern(code);

    // 어제 데이터와 비교
    const last = pat.history[pat.history.length-1];
    if (last && last.date === today) return; // 오늘 이미 저장됨

    const direction = !last ? 'flat'
      : pr.price > last.price ? 'up'
      : pr.price < last.price ? 'down' : 'flat';

    // 연속 방향 카운트
    if (direction === 'up') { pat.bullDays = (pat.bullDays||0)+1; pat.bearDays = 0; }
    else if (direction === 'down') { pat.bearDays = (pat.bearDays||0)+1; pat.bullDays = 0; }
    else { pat.bullDays = 0; pat.bearDays = 0; }

    pat.trend = pat.bullDays >= 3 ? 'up' : pat.bearDays >= 3 ? 'down' : 'flat';
    pat.streak = Math.max(pat.bullDays||0, pat.bearDays||0);
    pat.history = [...(pat.history||[]), { date: today, price: pr.price, dir: direction }].slice(-30);

    MEM.setPricePattern(code, pat);
  });
}

// ── 4. 종목 메모리 컨텍스트 생성 (AI 프롬프트용) ──
function getMemoryContext(code) {
  const sentHist = MEM.getSentHistory(code).slice(-10);
  const pricePat = MEM.getPricePattern(code);
  const stock = gs(code);
  const themeSummary = MEM.getThemeSummary();

  // 감성 추세
  const recentSent = sentHist.slice(-5);
  const posRatio = recentSent.length
    ? Math.round(recentSent.filter(h=>h.sent==='긍정').length / recentSent.length * 100)
    : 50;
  const sentTrend = posRatio >= 70 ? '긍정 우세' : posRatio <= 30 ? '부정 우세' : '혼조';

  // 테마 흐름
  const myThemes = (stock?.themes || []);
  const themeCtx = myThemes.map(t => {
    const ts = themeSummary[t];
    return ts ? `${t}섹터 ${ts.trend}(${ts.score}점)` : '';
  }).filter(Boolean).join(', ');

  // 주가 패턴
  const priceCtx = pricePat.streak >= 2
    ? `최근 ${pricePat.streak}일 연속 ${pricePat.trend==='up'?'상승':'하락'}세`
    : '방향성 불분명';

  return {
    sentTrend,
    posRatio,
    priceCtx,
    themeCtx,
    historyCount: sentHist.length,
    summary: `[과거 패턴] 뉴스감성 최근5건: 긍정${posRatio}% (${sentTrend}) | 주가: ${priceCtx}${themeCtx ? ` | 섹터흐름: ${themeCtx}` : ''}`
  };
}

// ── 5. 종목별 감성 추세 미니 차트 HTML ──
function sentimentMiniChart(code) {
  const hist = MEM.getSentHistory(code).slice(-10);
  if (hist.length < 2) return '';

  const bars = hist.map(h => {
    const s = h.sent || '';
    const isPos = s==='긍정' || s==='pos' || s==='positive';
    const isNeg = s==='부정' || s==='neg' || s==='negative';
    const color = isPos ? '#E53935' : isNeg ? '#1565C0' : '#94A3B8';
    const imp   = h.impactScore || h.impact || 50;

    return `<div style="width:9px;height:${height}px;background:${color};border-radius:3px 3px 0 0;flex-shrink:0" title="${h.date||''} ${s}"></div>`;
  }).join('');

  // 디버그: 히스토리 첫 항목 sent 값 확인
  if (hist.length > 0 && window._debug) console.log('[Sent] 히스토리 샘플:', hist[0]);

  const posCount = hist.filter(h=>h.sent==='긍정'||h.sent==='pos'||h.sent==='positive').length;
  const negCount = hist.filter(h=>h.sent==='부정'||h.sent==='neg'||h.sent==='negative').length;
  const trend = posCount > hist.length*0.6 ? '📈 긍정우세' : negCount > hist.length*0.6 ? '📉 부정우세' : '↔ 혼조';

  return `<div style="margin-bottom:8px;padding:8px 10px;background:#F4F6FA;border-radius:10px;border:1px solid #E2E8F4">

    <div style="font-size:9px;color:#94A3B8;margin-top:3px">최근 ${hist.length}건 · 빨강=긍정 파랑=부정</div>
  </div>`;
}

function dirIcon(dir) {
  return dir === 'pos' ? '▲' : dir === 'neg' ? '▼' : '●';

function dirC(dir) {
  return dir === 'pos' ? 'var(--rose)' : dir === 'neg' ? 'var(--blue)' : 'var(--ink3)';

function calcImpactScores() {
  NEWS.forEach(n => {
    if (n.impactScore) return;
    const base = {official:80, news:65, analyst:60, rumor:50}[n.type] || 55;
    const sentBonus = n.sent==='긍정' ? 8 : n.sent==='부정' ? 5 : 0;
    n.impactScore = Math.min(base + sentBonus, 99);
  });
}

function isEnglishTitle(title) {

  const eng = (title.match(/[a-zA-Z]/g) || []).length;
  return eng >= 6 && eng / title.length > 0.55;
}
async function googleTranslate(text) {
  try {
    const url = 'https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=ko&dt=t&q=' + encodeURIComponent(text);
    const res = await fetch(url);
    const data = await res.json();
    return data[0]?.map(d => d[0]).join('') || text;
  } catch(e) { return text; }
}
async function autoTranslateEnglish() {

function guessSector(name) {
  if (!name) return '기타';
  if (/삼성전자|SK하이닉스|반도체|한미반도체/.test(name)) return '반도체';
  if (/바이오|제약|헬스|의료|셀트|녹십자|유한|한미약/.test(name)) return '바이오';
  if (/현대차|기아|모비스|타이어|자동차/.test(name)) return '자동차';
  if (/에코프로|LG에너지|삼성SDI|배터리|전지/.test(name)) return '2차전지';
  if (/KB|신한|하나|우리|메리츠|금융|은행|보험/.test(name)) return '금융';
  if (/한화|로템|항공우주|방산|조선|중공업/.test(name)) return '방산';
  if (/NAVER|카카오|네이버|게임|엔씨|넷마블/.test(name)) return 'IT';
  if (/POSCO|철강|현대제철/.test(name)) return '소재';
  if (/텔레콤|KT|유플|통신/.test(name)) return '통신';
  if (/두산|한국전력|에너지|오일|정유/.test(name)) return '에너지';
  return '기타';
}

      S.aiSumF[id] = false; refreshCardModal(id); reCards(); return;
    }
    const i = NEWS.findIndex(n=>n.id===id);
    if(i>=0){ NEWS[i].aiSummary = `${stock?.name} 관련 ${SRC[item.type]?.label}. 투자자 주목 필요.`; NEWS[i].aiKeywords = [stock?.sector, item.type==="rumor"?"찌라시":"공식"]; }
    notify(`📝 AI 요약 완료`,"info");
  }
  S.aiSumF[id] = false; refreshCardModal(id); reCards();
}

/* ── 히트맵 탭 (테마 자동 분류 포함) ── */
function rHeatmap() {
  const secData = SECTORS.slice(1).map(sec=>{
    const it = NEWS.filter(n=>gs(n.code)?.sector===sec);
    const rumor=it.filter(n=>n.type==="rumor").length, urgent=it.filter(n=>n.urgency===1).length;
    const avgImpact = it.length ? Math.round(it.reduce((a,n)=>a+(n.impactScore||50),0)/it.length) : 0;
    return {sec, total:it.length, rumor, urgent, heat:rumor+urgent*1.5, avgImpact};
  }).filter(s=>s.total>0).sort((a,b)=>b.heat-a.heat);
  const maxH = Math.max(...secData.map(d=>d.heat),1);
  const col = h => {const r=h/maxH; return r>.65?{bg:"rgba(229,57,53,0.07)",bd:"rgba(229,57,53,0.25)",tx:"#C62828"}:r>.35?{bg:"rgba(230,81,0,0.07)",bd:"rgba(230,81,0,0.25)",tx:"#E65100"}:{bg:"rgba(21,101,192,0.07)",bd:"rgba(21,101,192,0.2)",tx:"#1565C0"};};

  // 테마별 종목 집계
  const themeData = THEMES.map(th=>{
    const relNews = NEWS.filter(n=>(n.themes||[]).includes(th.name));
    const relStocks = [...new Set(relNews.map(n=>n.code))].map(c=>gs(c)).filter(Boolean);
    const avgImpact = relNews.length ? Math.round(relNews.reduce((a,n)=>a+(n.impactScore||50),0)/relNews.length) : 0;
    return {...th, newsCount:relNews.length, stocks:relStocks, avgImpact};
  }).filter(t=>t.newsCount>0).sort((a,b)=>b.avgImpact-a.avgImpact);

  // 뉴스 빈도 차트 데이터
  const freqData = Object.entries(SRC).map(([type,src])=>({
    name:src.label, count:NEWS.filter(n=>n.type===type).length, color:src.color
  })).sort((a,b)=>b.count-a.count);
  const maxFreq = Math.max(...freqData.map(f=>f.count),1);

  // 테마 상승률 시뮬 데이터 (Impact 기반)
  const themeChartData = themeData.slice(0,6).map(t=>({
    name: t.name, val: t.avgImpact, color: t.color
  }));
  const maxTVal = Math.max(...themeChartData.map(t=>t.val),1);

  return `<div class="hm">
    <div class="hmtit">── 섹터 이슈 온도계 ──</div>
    <div class="hmgrid" style="margin-bottom:20px">
      ${secData.map(s=>{const c=col(s.heat); return `<div class="hmcell" style="background:${c.bg};border-color:${c.bd}" onclick="setSec('${s.sec}');setTab('feed')">
        <div class="hmsec" style="color:${c.tx}">${s.sec}</div>
        <div class="hmcnt" style="color:${c.tx}">${s.total}</div>
        <div class="hmsub" style="color:${c.tx}">🔥 찌라시 ${s.rumor}건<br>🚨 긴급 ${s.urgent}건</div>
        <div style="font-family:var(--mono);font-size:11px;color:${c.tx};margin-top:6px;opacity:0.8">IMPACT ${s.avgImpact}</div>
        <div class="hmbar-w"><div class="hmbar" style="width:${Math.round(s.heat/maxH*100)}%;background:${c.tx}"></div></div>
      </div>`;}).join('')}
    </div>

    <!-- 테마 자동 분류 -->
    <div class="theme-section">
      <div class="theme-tit">── 테마 자동 분류 ──</div>
      <div class="theme-grid">
        ${themeData.map(t=>`<div class="theme-card" onclick="setTheme('${t.name}');setTab('feed')" style="border-color:${t.color}30">
          <div class="theme-card-top">
            <div style="display:flex;align-items:center;gap:7px">
              <span style="font-size:18px">${t.icon}</span>
              <span class="theme-name">${t.name}</span>
            </div>
            <div style="text-align:right">
              <div style="font-family:var(--mono);font-size:13px;font-weight:700;color:${t.color}">${t.avgImpact}pt</div>
              <div style="font-size:10px;font-weight:700;color:${(MEM.getThemeSummary()[t.name]||{}).trendColor||'#94A3B8'}">${(MEM.getThemeSummary()[t.name]||{}).trend||'→횡보'}</div>
              <div class="theme-count">${t.newsCount}건</div>
            </div>
          </div>
          <div class="theme-stocks">
            ${t.stocks.slice(0,5).map(s=>`<span class="theme-stock-tag">${s.name}</span>`).join('')}
            ${t.stocks.length>5?`<span style="font-size:11px;color:var(--ink3)">+${t.stocks.length-5}</span>`:''}
          </div>
        </div>`).join('')}
      </div>
    </div>

    <!-- 테마 Impact 차트 -->
    <div class="chart-section">
      <div class="chart-card">
        <div class="chart-title"><span>🎯 테마별 Impact Score</span><span style="font-size:11px;color:var(--ink3)">평균 점수</span></div>
        <div class="bar-chart">
          ${themeChartData.map(t=>`<div class="bar-item" style="position:relative">
            <div style="position:absolute;top:-18px;left:0;right:0;text-align:center;font-family:var(--mono);font-size:11px;font-weight:700;color:#0F1D3A">${t.val}</div>
            <div style="flex:1;display:flex;align-items:flex-end;width:100%">

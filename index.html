/* ══════════════════════════════════════════════
   포트폴리오 종합 분석 엔진
══════════════════════════════════════════════ */
function calcPortfolioIntelligence() {
  const port = S.portfolio;
  if (!port.length) return null;

  const items = port.map(p => {
    const pr  = PRICE_BASE[p.code];
    const st  = gs(p.code);
    const hasP = pr && pr.price !== null && pr.price !== undefined;
    const cur = hasP ? pr.price : p.buyPrice;
    const val = cur * p.qty;
    const cost = p.buyPrice * p.qty;
    const pnlPct = hasP ? (pr.price - p.buyPrice) / p.buyPrice * 100 : 0;
    const sup = SUPPLY_BASE[p.code];
    const news = NEWS.filter(n => n.code === p.code).slice(0, 5);
    const sentiment = news.reduce((s, n) => s + (n.sent==='긍정'?1:n.sent==='부정'?-1:0), 0);
    return { code:p.code, name:st?.name, sector:st?.sector, val, cost, pnlPct, sup, sentiment, hasP };
  }).filter(it => it.val > 0);

  if (!items.length) return null;

  const totalVal  = items.reduce((s, i) => s + i.val, 0);
  const totalCost = items.reduce((s, i) => s + i.cost, 0);

  // 섹터 집중도
  const sectorMap = {};
  items.forEach(it => { sectorMap[it.sector] = (sectorMap[it.sector]||0) + it.val; });
  const sectorList = Object.entries(sectorMap)
    .map(([s,v]) => ({ sector:s, pct:Math.round(v/totalVal*100) }))
    .sort((a,b) => b.pct - a.pct);
  const topSector = sectorList[0];
  const isConcentrated = topSector && topSector.pct >= 50;

  // 트렌드 점수
  const avgPnl   = items.reduce((s,i) => s+i.pnlPct, 0) / items.length;
  const avgSenti = items.reduce((s,i) => s+i.sentiment, 0) / items.length;
  const avgFlow  = items.filter(i=>i.sup).reduce((s,i)=>s+(i.sup.foreign+i.sup.inst),0) / (items.filter(i=>i.sup).length||1);
  let trendScore = 0;
  trendScore += avgPnl > 5 ? 3 : avgPnl > 0 ? 1 : avgPnl > -5 ? -1 : -3;
  trendScore += avgSenti > 1 ? 2 : avgSenti > 0 ? 1 : avgSenti < -1 ? -2 : -1;
  trendScore += avgFlow > 0 ? 2 : avgFlow < 0 ? -2 : 0;
  const trend      = trendScore >= 3 ? '상승 우세' : trendScore >= 1 ? '중립 우세' : trendScore >= -1 ? '혼조세' : '하락 우세';
  const trendColor = trendScore >= 3 ? '#E53935' : trendScore >= 1 ? '#2E7D32' : trendScore >= -1 ? '#E65100' : '#1565C0';
  const trendIcon  = trendScore >= 3 ? '📈' : trendScore >= 1 ? '↗️' : trendScore >= -1 ? '↔️' : '📉';

  // 리스크
  const maxDrawdown = Math.min(...items.map(i => i.pnlPct));
  const volatility  = items.reduce((s,i) => s+Math.abs(i.pnlPct), 0) / items.length;
  const riskScore   = (isConcentrated?30:0) + (volatility>15?30:volatility>7?15:0) + (maxDrawdown<-15?30:maxDrawdown<-7?15:0);
  const risk        = riskScore >= 50 ? '높음' : riskScore >= 25 ? '보통' : '낮음';
  const riskColor   = riskScore >= 50 ? '#E53935' : riskScore >= 25 ? '#E65100' : '#2E7D32';

  // 추천 액션
  const actions = [];
  if (isConcentrated) actions.push(`${topSector.sector} 섹터 집중도 ${topSector.pct}% — 분산 투자 권장`);
  if (maxDrawdown < -10) actions.push(`최대 손실 ${maxDrawdown.toFixed(1)}% — 손절 기준 재검토`);
  if (avgFlow < -50) actions.push('외국인·기관 전반 매도세 — 비중 축소 고려');
  if (avgFlow > 50 && trendScore >= 2) actions.push('수급 양호 & 상승세 — 현 포지션 유지');
  if (items.length < 3) actions.push('종목 수 부족 — 3~7종목 분산 보유 권장');
  if (!actions.length) actions.push('현재 포트폴리오 균형 양호 — 현 포지션 유지');

  const summary = `보유 ${items.length}종목 포트폴리오는 ${trend} 흐름${isConcentrated?`, ${topSector.sector} 집중(${topSector.pct}%)`:''}${risk==='높음'?'이며 리스크가 높습니다.':risk==='보통'?'이며 리스크는 보통 수준입니다.':'이며 안정적입니다.'}`;

  return { items, totalVal, sectorList, topSector, isConcentrated, trend, trendColor, trendIcon, trendScore, risk, riskColor, actions, summary, avgFlow };
}

function rPortfolio() {
  const total = S.portfolio.reduce((sum, p) => {
    const pr = PRICE_BASE[p.code];
    if(!pr || pr.price === null || pr.price === undefined) return sum;
    return sum + pr.price * p.qty;
  }, 0);
  // 가격 미입력 종목 수
  const noPriceCount = S.portfolio.filter(p => {
    const pr = PRICE_BASE[p.code];
    return !pr || pr.price === null || pr.price === undefined;
  }).length;
  const totalCost = S.portfolio.reduce((sum, p) => sum + p.buyPrice * p.qty, 0);
  const totalPnl = total - totalCost;
  const totalPnlPct = totalCost > 0 ? ((totalPnl / totalCost) * 100).toFixed(2) : 0;

  return `<div class="port-tab">
    <!-- 종목 추가 -->
    <div class="port-add-card">
      <div class="port-add-title">📂 보유 종목 추가</div>
      <div class="port-inp-row">
        <select class="port-inp" id="port-code" onchange="S.portInp.code=this.value">
          <option value="">종목 선택</option>
          ${STOCKS.map(s=>`<option value="${s.code}" ${S.portInp.code===s.code?'selected':''}>${s.name}</option>`).join('')}
        </select>
      </div>
      <div class="port-inp-row">
        <input class="port-inp" id="port-price" type="number" placeholder="매수 평균가 (원)" value="${S.portInp.buyPrice}" oninput="S.portInp.buyPrice=this.value">
        <input class="port-inp" id="port-qty" type="number" placeholder="보유 수량" value="${S.portInp.qty}" oninput="S.portInp.qty=this.value" style="flex:0.6">
        <button class="port-btn" onclick="addPortfolio()">추가</button>
      </div>
    </div>

    ${S.portfolio.length > 0 ? `
    <!-- 포트폴리오 요약 -->
    <div class="port-summary">
      <div class="port-sum-title">💼 포트폴리오 현황</div>
      ${noPriceCount > 0 ? `<div style="font-size:12px;color:var(--amber);padding:8px 12px;background:rgba(232,146,30,0.1);border-radius:10px;margin-bottom:8px">
        ⚠️ ${noPriceCount}종목 현재가 미입력 — 자동 업데이트 대기 중 (평일 16:35 갱신)
      </div>` : ''}
      <div class="port-sum-row"><span class="port-sum-label">평가금액</span><span class="port-sum-val">${total.toLocaleString('ko-KR')}원</span></div>
      <div class="port-sum-row"><span class="port-sum-label">매입금액</span><span class="port-sum-val">${totalCost.toLocaleString('ko-KR')}원</span></div>
      <div class="port-sum-row">
        <span class="port-sum-label">수익률</span>
        <span class="port-sum-val" style="color:${totalPnl>=0?'var(--teal)':'var(--rose)'}">${totalPnl>=0?'+':''}${totalPnlPct}% (${(totalPnl>=0?'+':'')+Math.round(totalPnl).toLocaleString('ko-KR')}원)</span>
      </div>
    </div>

    <!-- 포트폴리오 종합 분석 -->
    ${portIntelHTML(calcPortfolioIntelligence())}

    <!-- 종목별 상세 -->
    ${S.portfolio.map(p=>{
      const stock = gs(p.code);
      const pr = PRICE_BASE[p.code];
      if(!stock || !pr) return '';
      // 현재가 없으면 매수가 기준 표시
      const hasPrice = pr.price !== null && pr.price !== undefined;
      const curPrice = hasPrice ? pr.price : p.buyPrice;
      const pnl    = hasPrice ? (pr.price - p.buyPrice) * p.qty : 0;
      const pnlPct = hasPrice ? ((pr.price - p.buyPrice) / p.buyPrice * 100).toFixed(2) : '0.00';
      const isPos = pnl >= 0;
      const relNews = NEWS.filter(n=>n.code===p.code).slice(0,3);
      const riskLevel = Math.abs(Number(pnlPct)) > 10 ? 'high' : Math.abs(Number(pnlPct)) > 5 ? 'mid' : 'low';
      const riskLabel = {high:'⚠️ 높은 변동성 감지', mid:'⚡ 중간 수준 변동', low:'✅ 안정적 보유'}[riskLevel];
      return `<div class="port-card" data-port-code="${p.code}">
        <div class="port-card-top">
          <div>
            <div class="port-name">${stock.name}</div>
            <div class="port-sector">${stock.sector} · ${p.qty.toLocaleString()}주</div>
          </div>
          <div>
            <div class="port-pnl ${isPos?'pos':'neg'}">${isPos?'+':''}${pnlPct}%</div>
            <div style="font-size:11px;color:var(--ink3);text-align:right;margin-top:2px">${isPos?'+':''}${Math.round(pnl).toLocaleString()}원</div>
          </div>
        </div>
        <div class="port-stats">
          <div class="port-stat"><div class="port-sv">${p.buyPrice.toLocaleString()}</div><div class="port-sl">매수가</div></div>
          <div class="port-stat"><div class="port-sv" style="color:${hasPrice?(isPos?'var(--teal)':'var(--rose)'):'var(--ink3)'}">${hasPrice?curPrice.toLocaleString():'업데이트 필요'}</div><div class="port-sl">현재가</div></div>
          <div class="port-stat"><div class="port-sv">${hasPrice?(curPrice * p.qty).toLocaleString():'—'}</div><div class="port-sl">평가액</div></div>
        </div>
        <div class="port-risk ${riskLevel}">${riskLabel}</div>

        <!-- 수급 미니 뷰 -->
        ${SUPPLY_BASE[p.code] ? `<div style="display:flex;gap:7px;margin-bottom:9px">
          ${[{l:"외국인",v:SUPPLY_BASE[p.code].foreign,c:"#5A9EE0"},{l:"기관",v:SUPPLY_BASE[p.code].inst,c:"#D4AF5A"},{l:"개인",v:SUPPLY_BASE[p.code].retail,c:"#8A7D68"}].map(r=>`
          <div style="flex:1;background:var(--bg3);border-radius:9px;padding:7px;text-align:center">
            <div style="font-size:10px;color:var(--ink3);margin-bottom:2px">${r.l}</div>
            <div style="font-family:var(--mono);font-size:11px;font-weight:700;color:${r.v>=0?'var(--rose)':'var(--teal)'}">${r.v>=0?'+':''}${(Math.abs(r.v)/100).toFixed(0)}억</div>
          </div>`).join('')}
        </div>` : ''}

        <!-- 뉴스 감성 히스토리 미니차트 -->
        ${sentimentMiniChart(p.code)}

        <!-- AI 개인 투자 분석 -->
        ${S.portAnalysis[p.code] ? portAnalysisHTML(S.portAnalysis[p.code], p) :
          `<button class="ai-invest-btn${S.portAnaF?.[p.code]?' ':''}" onclick="runPortAnalysis('${p.code}')" ${S.portAnaF?.[p.code]?'disabled':''}>
            ${S.portAnaF?.[p.code] ? `<span class="spin">◌</span> AI 분석 중...` : `🤖 AI 개인 투자분석 · 전망 · 확률`}
          </button>`}

        ${relNews.length > 0 ? `<div style="font-size:12px;color:var(--ink3);margin-bottom:6px;font-weight:700">📰 관련 이슈</div>
        <div class="port-news-list">
          ${relNews.map(n=>`<div class="port-news-item" onclick="goCard(${n.id})">
            <span>${SRC[n.type]?.icon}</span>
            <span style="flex:1">${n.title}</span>
            <span class="grade-badge grade-${getGrade(n)}" style="font-size:9px;padding:1px 5px">${GRADE_META[getGrade(n)].sublabel}</span>
            <span style="color:${n.sent==='긍정'?'var(--teal)':'var(--rose)'}">
              ${n.sent==='긍정'?'▲':'▼'}
            </span>
          </div>`).join('')}
        </div>` : ''}
        <div style="display:flex;justify-content:flex-end;margin-top:10px">
          <button onclick="removePortfolio('${p.code}')" style="background:none;border:1px solid var(--bdr);border-radius:8px;padding:5px 12px;font-size:12px;color:var(--ink3);cursor:pointer">삭제</button>
        </div>
      </div>`;
    }).join('')}` : `<div class="empty"><div class="empty-i">💼</div><div class="empty-t">보유 종목을 추가해보세요</div></div>`}
  </div>`;
}

  const port = safeLS('assetPortfolio', []);

  // 서브탭
  const sub = S.assetSub || 'etf';

  return `<div style="padding:12px 14px 120px">

/* ── ETF 탭 ── */
function rETFTab(port) {
  const myETF = port.filter(p => p.assetType === 'etf');
  const etfGroups = {
    '지수': ETF_LIST.filter(e=>e.category==='지수'),
    '테마': ETF_LIST.filter(e=>e.category==='테마'),
    '채권': ETF_LIST.filter(e=>e.category==='채권'),
    '금·원자재': ETF_LIST.filter(e=>['금','원자재'].includes(e.category)),
    '레버리지·인버스': ETF_LIST.filter(e=>['레버리지','인버스'].includes(e.category)),
  };

  return `
  <!-- 내 ETF 보유현황 -->
  ${myETF.length > 0 ? `
  <div style="background:#FFFFFF;border:1px solid #E2E8F4;border-radius:16px;padding:14px;margin-bottom:12px;box-shadow:0 2px 10px rgba(21,101,192,0.06)">
    <div style="font-size:13px;font-weight:800;color:#0F1D3A;margin-bottom:10px">💹 내 ETF 현황</div>
    ${myETF.map(p => {
      const etf = ETF_LIST.find(e=>e.code===p.id);
      const pr = PRICE_BASE[p.id];
      const cur = pr?.price || p.buyPrice;
      const pnl = (cur - p.buyPrice) * p.qty;
      const pnlPct = ((cur - p.buyPrice)/p.buyPrice*100).toFixed(2);
      const isPos = pnl >= 0;
      return `<div style="display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #F4F6FA">
        <div>
          <div style="font-size:13px;font-weight:700;color:#0F1D3A">${p.name}</div>
          <div style="font-size:11px;color:#94A3B8">${etf?.region||''} · ${etf?.category||''} · ${p.qty}좌</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:14px;font-weight:800;color:${isPos?'#E53935':'#1565C0'}">${isPos?'+':''}${pnlPct}%</div>
          <div style="font-size:11px;color:#94A3B8">${isPos?'+':''}${Math.round(pnl).toLocaleString()}원</div>
        </div>
      </div>`;
    }).join('')}
    ${rRebalanceAdvice(myETF)}
  </div>` : ''}

  <!-- ETF 추가 -->
  <div style="background:#FFFFFF;border:1px solid #E2E8F4;border-radius:16px;padding:14px;margin-bottom:12px;box-shadow:0 2px 10px rgba(21,101,192,0.06)">
    <div style="font-size:13px;font-weight:800;color:#0F1D3A;margin-bottom:10px">📂 ETF 추가</div>
    <div style="display:flex;flex-direction:column;gap:7px">
      <select id="etf-sel" style="background:#F4F6FA;border:1px solid #E2E8F4;border-radius:10px;padding:10px 12px;font-size:13px;color:#0F1D3A;outline:none">
        <option value="">ETF 선택</option>
        ${Object.entries(etfGroups).map(([grp,list])=>`
          <optgroup label="── ${grp} ──">
            ${list.map(e=>`<option value="${e.code}">${e.name} (보수${e.expense}%)</option>`).join('')}
          </optgroup>`).join('')}
      </select>
      <div style="display:flex;gap:6px">
        <input id="etf-price" type="number" placeholder="매수가 (원)" style="flex:1;background:#F4F6FA;border:1px solid #E2E8F4;border-radius:10px;padding:10px;font-size:13px;outline:none">
        <input id="etf-qty" type="number" placeholder="수량" style="flex:0.5;background:#F4F6FA;border:1px solid #E2E8F4;border-radius:10px;padding:10px;font-size:13px;outline:none">
        <button onclick="addAsset('etf')" style="background:#1565C0;border:none;border-radius:10px;padding:10px 14px;color:#fff;font-size:13px;font-weight:800">추가</button>
      </div>
    </div>
  </div>

  <!-- ETF 목록 -->
  ${Object.entries(etfGroups).map(([grp,list])=>`
  <div style="margin-bottom:12px">
    <div style="font-size:11px;font-weight:800;color:#94A3B8;margin-bottom:6px;letter-spacing:1px">${grp}</div>
    ${list.map(e=>`
    <div style="background:#FFFFFF;border:1px solid #E2E8F4;border-radius:14px;padding:12px 14px;margin-bottom:6px;box-shadow:0 1px 6px rgba(21,101,192,0.05)">

  const total = acc.items.reduce((s,i) => s + i.value, 0);
  return `
  <div style="background:#FFFFFF;border:1px solid #E2E8F4;border-radius:16px;padding:14px;margin-bottom:10px;box-shadow:0 2px 10px rgba(21,101,192,0.06)">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <div style="font-size:13px;font-weight:800;color:#0F1D3A">${acc.name}</div>
      <div style="font-size:13px;font-weight:700;color:#1565C0">${total.toLocaleString()}원</div>
    </div>
    ${acc.items.map(item=>{
      const ratio = total > 0 ? Math.round(item.value/total*100) : 0;
      return `<div style="margin-bottom:7px">
        <div style="display:flex;justify-content:space-between;margin-bottom:3px">
          <span style="font-size:12px;color:#0F1D3A;font-weight:600">${item.name}</span>

        <div style="height:6px;background:#EEF1F8;border-radius:3px;overflow:hidden">
          <div style="height:100%;width:${ratio}%;background:${item.type==='주식'?'#E53935':item.type==='채권'?'#1565C0':item.type==='금'?'#E65100':'#2E7D32'};border-radius:3px"></div>

}

/* ── 리밸런싱 조언 ── */
function rRebalanceAdvice(myETF) {
  if (myETF.length < 2) return '';
  const total = myETF.reduce((s,p) => s + (PRICE_BASE[p.id]?.price||p.buyPrice)*p.qty, 0);
  const domestic = myETF.filter(p=>ETF_LIST.find(e=>e.code===p.id)?.region==='국내')
    .reduce((s,p)=>s+(PRICE_BASE[p.id]?.price||p.buyPrice)*p.qty,0);
  const domPct = total > 0 ? Math.round(domestic/total*100) : 0;
  const needRebal = domPct > 60 || domPct < 20;
  if (!needRebal) return '';
  return `<div style="margin-top:10px;padding:9px 12px;background:rgba(230,81,0,0.07);border:1px solid rgba(230,81,0,0.25);border-radius:10px;font-size:12px;color:#E65100;font-weight:700">
    🔄 리밸런싱 권장: 국내 비중 ${domPct}% ${domPct>60?'— 해외 ETF 추가 고려':'— 국내 ETF 추가 고려'}
  </div>`;
}

/* ── 자산 추가 함수 ── */
function addAsset(type) {
  let id, name, buyPrice, qty;
  if (type === 'etf') {
    id = document.getElementById('etf-sel')?.value;
    buyPrice = Number(document.getElementById('etf-price')?.value);
    qty = Number(document.getElementById('etf-qty')?.value);
    const etf = ETF_LIST.find(e=>e.code===id);
    name = etf?.name || id;
  } else if (type === 'overseas') {
    id = document.getElementById('ov-sel')?.value;
    buyPrice = Number(document.getElementById('ov-price')?.value);
    qty = Number(document.getElementById('ov-qty')?.value);
    const ov = OVERSEAS_LIST.find(o=>o.ticker===id);
    name = ov?.name || id;
  }
  if (!id || !buyPrice || !qty) { notify('⚠️ 모든 항목을 입력해주세요','info'); return; }
  const port = safeLS('assetPortfolio', []);
  const existing = port.findIndex(p=>p.id===id&&p.assetType===type);
  if (existing >= 0) port[existing] = {assetType:type, id, name, buyPrice, qty};
  else port.push({assetType:type, id, name, buyPrice, qty, addedAt:Date.now()});
  safeSetLS('assetPortfolio', port);
  notify(`✅ ${name} 추가됨`, 'ok');
  render();
}

async function testCfWorker() {
  const url = (() => { try { return localStorage.getItem('cf_worker_url') || ''; } catch(e) { return ''; } })();
  if (!url) { notify('⚠️ CF Worker URL을 먼저 입력해주세요', 'warn'); return; }
  notify('🧪 연결 테스트 중...', 'info');
  try {
    const res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'claude-haiku-4-5-20251001', max_tokens: 10, messages: [{ role: 'user', content: 'ping' }] }),
    });
    if (res.ok) {
      notify('✅ CF Worker 연결 성공! AI 기능 활성화됨', 'ok');
    } else {
      const err = await res.text();
      notify(`❌ 연결 실패 (${res.status}): ${err.slice(0, 40)}`, 'warn');
    }
  } catch(e) {
    notify(`❌ 연결 오류: ${e.message.slice(0, 50)}`, 'warn');
  }
}

  const relNews = NEWS.filter(n=>n.code===code);
  if(!S.portAnaF) S.portAnaF = {};
  S.portAnaF[code] = true; render();

  const pnlPct = ((pr.price - portItem.buyPrice) / portItem.buyPrice * 100).toFixed(2);
  const newsCtx = relNews.slice(0,3).map(n=>`[${n.type}] ${n.title} (${n.sent})`).join('\n');

수급(외국인·기관·개인): ${supCtx||'정보없음'}

${_mem.historyCount > 0 ? _mem.summary : ''}

{"verdict":"강력보유|매수|분할매수|관망|일부매도|손절검토","confidence":0-100,"summary":"버핏 관점 핵심 판단 2~3문장 — 해자·내재가치·장기전망 반드시 언급","buffett_moat":"경제적 해자 평가: 강함/보통/약함/없음 + 한국시장 맥락에서 근거","buffett_quote":"버핏 어록 스타일의 촌철살인 한마디 (한국어, 이 종목 맞춤)","upProb":0-100,"flatProb":0-100,"dnProb":0-100,"stopLoss":"X원(-X%) 트레일링이면 현재가기준","target":"X원(+X%) 장기 내재가치 기준","d1":{"signal":"매수|관망|매도","up":0-100,"dn":0-100},"w1":{"signal":"매수|관망|매도","up":0-100,"dn":0-100},"m1":{"signal":"매수|관망|매도","up":0-100,"dn":0-100},"y1":{"signal":"매수|관망|매도","up":0-100,"dn":0-100},"detail":"버핏식 투자 액션 플랜: 단기 노이즈 vs 장기가치 구분 서술. 트레일링이면 반드시 언급","_trailing":${_isTrailing}}`;

  try {
    const res = await aiApiFetch({model:"claude-sonnet-4-20250514",max_tokens:1000,system:"JSON만.",messages:[{role:"user",content:prompt}]});
    const data = await res.json();
    const txt = data.content?.map(c=>c.text||"").join("").replace(/`{3}json/g,"").replace(/`{3}/g,"").trim();
    const ana = JSON.parse(txt||"{}");
    if(!S.portAnalysis) S.portAnalysis = {};
    S.portAnalysis[code] = ana;
    notify(`🤖 ${stock?.name} AI 분석 완료`,'ok');
  } catch(e) {
    // 폴백
    const isPos = Number(pnlPct) >= 0;

    /* ── 트레일링 로직 ──
       현재가 > 매수가×1.15(목표가) → 트레일링 구간
       현재가 ≤ 목표가             → 매수가 기준       */
    const curPrice     = pr?.price ?? portItem.buyPrice;
    const basedTarget  = portItem.buyPrice * 1.15;
    const isTrailing   = curPrice > basedTarget;

    let stopLossStr, targetStr, trailingNote;
    if (isTrailing) {
      // 트레일링 수익 구간: 현재가 기준
      stopLossStr  = `${Math.round(curPrice * 0.93).toLocaleString()}원 (현재가 -7%)`;
      targetStr    = `${Math.round(curPrice * 1.15).toLocaleString()}원 (현재가 +15%)`;

    } else {
      // 일반 구간: 매수가 기준
      stopLossStr  = `${Math.round(portItem.buyPrice * 0.93).toLocaleString()}원 (-7%)`;
      targetStr    = `${Math.round(portItem.buyPrice * 1.15).toLocaleString()}원 (+15%)`;
      trailingNote = '';
    }

    if(!S.portAnalysis) S.portAnalysis = {};
    S.portAnalysis[code] = {
      verdict: isPos ? "강력보유" : "관망",
      confidence: 65,
      summary: `${stock?.name} ${isPos?'수익':'손실'} 중. 수급 ${sup&&(sup.foreign+sup.inst)>0?'외국인·기관 매수세':'혼조세'}. 관련 이슈 ${relNews.length}건 모니터링 필요.`,
      buffett_moat: `${stock?.sector} 섹터 내 ${stock?.name}의 경제적 해자는 AI 연결 후 정밀 분석 가능합니다.`,
      buffett_quote: `훌륭한 기업을 적정한 가격에 사는 것이, 적정한 기업을 훌륭한 가격에 사는 것보다 낫다.`,
      upProb: isPos?62:38, flatProb:22, dnProb: isPos?16:40,
      stopLoss: stopLossStr,
      target:   targetStr,
      d1:{signal:"관망",up:52,dn:48}, w1:{signal:isPos?"매수":"관망",up:58,dn:42},
      m1:{signal:isPos?"매수":"관망",up:62,dn:38}, y1:{signal:"매수",up:68,dn:32},
      detail: trailingNote
        ? `${trailingNote}. ${stock?.sector} 섹터 이슈와 수급 흐름을 종합적으로 모니터링하세요.`
        : `현재 ${isPos?'수익':'손실'} 구간. ${stock?.sector} 섹터 이슈와 수급 흐름을 종합적으로 모니터링하세요.`,
      _trailing: isTrailing,
    };
    notify(`📊 ${stock?.name} 분석 완료 (시뮬)`,'info');
  }
  S.portAnaF[code] = false; render();
}

/* DART */
async function runDart(id){
  if(S.dartF[id])return;
  const item=NEWS.find(n=>n.id===id); if(!item)return;
  const stock=gs(item.code); S.dartF[id]=true; reCards();
  notify(`📋 ${stock?.name} 공시 조회중...`,'info');
  const result=await fetchDart(item.code,stock.dart,item.title.slice(0,20));
  const i=NEWS.findIndex(n=>n.id===id); if(i>=0)NEWS[i].dartResult=result||[];
  S.dartF[id]=false;
  notify(result?.some(r=>r.relevance==='high'||r.relevance==='mid')?`📋 ${stock?.name} 관련 공시 발견!`:`📋 공시 조회 완료`,'ok');
  reCards();
}

/* AI 팩트체크 */
async function rfc(id){
  if(S.ana[id])return;
  const item=NEWS.find(n=>n.id===id); if(!item)return;
  const stock=gs(item.code); S.ana[id]=true; reCards();
  const dartCtx=item.dartResult?.length>0?`\nDART: ${item.dartResult.map(d=>`${d.title}(${d.relevance})`).join(', ')}`:'';
  const prompt=`한국 주식시장 팩트체커. JSON만 응답.\n종목:${stock?.name}(${item.code}) 섹터:${stock?.sector}\n제목:${item.title}\n내용:${item.body}\n유형:${SRC[item.type]?.label} 출처:${item.sources}개 확산:${item.speed}${dartCtx}\n{"reliability_score":0-100,"verdict":"confirmed|partial|unverified|false","key_points":["분석1","분석2","분석3"],"risk_level":"높음|중간|낮음","official_check":"한줄","action_note":"한줄"}`;
  try {
    const res=await aiApiFetch({model:"claude-sonnet-4-20250514",max_tokens:1000,system:"JSON만.",messages:[{role:"user",content:prompt}]});
    const data=await res.json();
    const p=JSON.parse(data.content?.map(c=>c.text||"").join("").replace(/`{3}json/g,"").replace(/`{3}/g,"").trim()||"{}");
    const i=NEWS.findIndex(n=>n.id===id);
    if(i>=0){NEWS[i].score=p.reliability_score;NEWS[i].verdict=p.verdict;NEWS[i].detail={key_points:p.key_points,risk_level:p.risk_level,official_check:p.official_check,action_note:p.action_note};
      cacheAnalysis(id,{score:NEWS[i].score,verdict:NEWS[i].verdict,detail:NEWS[i].detail});
    }
    notify(`✅ ${stock?.name} 팩트체크 완료`,"ok");
  } catch(e) {
    const base=item.type==="official"?95:item.type==="news"?84:item.sources>5?60:38;
    const i=NEWS.findIndex(n=>n.id===id);
    if(i>=0){NEWS[i].score=base;NEWS[i].verdict=item.type==="official"?"confirmed":item.type==="news"?"confirmed":item.sources>5?"partial":"unverified";NEWS[i].detail={key_points:["DART 공시 교차 확인 권장","다중 소스 검증 필요","시장 민감도 주의"],risk_level:item.sent==="부정"?"높음":"중간",official_check:"공시 별도 확인 필요",action_note:"공식 자료 참조 필수"};}
    notify(`📊 ${stock?.name} 분석 완료`,"info");
  }
  S.ana[id]=false; reCards();
}

/* AI 투자판단 */
async function runJudge(id){
  if(S.judging[id])return;
  const item=NEWS.find(n=>n.id===id); if(!item)return;
  const stock=gs(item.code); S.judging[id]=true; reCards();
  notify(`📈 ${stock?.name} 투자판단 분석중...`,'info');
  const dartCtx=item.dartResult?.length>0?`\nDART 공시: ${item.dartResult.map(d=>`${d.title}(관련도:${d.relevance})`).join(', ')}`:'';
  const factCtx=item.detail?`\n팩트체크: 신뢰도${item.score}점, 판정:${item.verdict}, 리스크:${item.detail.risk_level}`:'';
  const prompt=`당신은 한국 주식시장 전문 투자 애널리스트입니다. 아래 이슈를 바탕으로 투자 판단을 내려주세요.

[이슈]
종목: ${stock?.name}(${item.code}) / 섹터: ${stock?.sector} / 테마: ${(item.themes||[]).join(',')}
제목: ${item.title}
내용: ${item.body}
유형: ${SRC[item.type]?.label} / 출처수: ${item.sources}개 / 확산속도: ${item.speed}
시장 감성: ${item.sent} / 긴급도: ${item.urgency===1?'긴급':item.urgency===2?'주의':'일반'} / Impact: ${item.impactScore}점${dartCtx}${factCtx}

JSON만 응답:
{"verdict":"강력매수|매수|단기매수|관망|주의/관망|매도 고려|회피/매도","confidence":0-100,"summary":"2~3문장 종합 투자 의견","short":{"signal":"매수|관망|매도","reason":"단기 1~4주 이유"},"mid":{"signal":"매수|관망|매도","reason":"중기 1~6개월 이유"},"long":{"signal":"매수|관망|매도","reason":"장기 6개월+ 이유"},"factors":[{"icon":"📊","text":"근거1"},{"icon":"⚡","text":"근거2"},{"icon":"🎯","text":"근거3"}],"stopLoss":"-5~8%","targetReturn":"+10~20%"}`;
  try {
    const res=await aiApiFetch({model:"claude-sonnet-4-20250514",max_tokens:1000,system:"JSON만 출력.",messages:[{role:"user",content:prompt}]});
    const data=await res.json();
    const j=JSON.parse(data.content?.map(c=>c.text||"").join("").replace(/`{3}json/g,"").replace(/`{3}/g,"").trim()||"{}");
    const i=NEWS.findIndex(n=>n.id===id); if(i>=0){NEWS[i].judgment=j;
      cacheAnalysis(id,{judgment:j});
    }
    notify(`📈 ${stock?.name} 투자판단 완료!`,"ok");
  } catch(e) {
    const isBull=item.sent==="긍정"&&item.sources>3, isBear=item.sent==="부정", isRumor=item.type==="rumor";
    const isHighImpact = (item.impactScore||50) >= 80;
    const j={
      verdict:isBear?"주의/관망":isBull&&item.score>=80&&isHighImpact?"매수":isBull?"단기매수":"관망",
      confidence:isRumor?45:item.score>=80?72:58,
      summary:`${stock?.name}의 ${SRC[item.type]?.label} 이슈 분석 결과 ${isBull?'긍정적 모멘텀이 감지됩니다':'불확실성이 존재합니다'}. ${isRumor?'루머 특성상 공식 확인 전 신중한 접근을 권합니다.':'추가 검증이 필요합니다.'}`,
      short:{signal:isBear?"관망":isBull?"매수":"관망",reason:`${item.speed==="매우 빠름"?"빠른 확산으로 단기 모멘텀 가능":"확산 속도 보통, 단기 영향 제한적"}.`},
      mid:{signal:isBull&&!isRumor?"매수":"관망",reason:`${stock?.sector} 섹터 흐름 연동 필요.`},
      long:{signal:"관망",reason:"장기 펀더멘털 변화 여부 추가 확인 필요."},
      factors:[{icon:"📊",text:`출처 ${item.sources}개, Impact Score ${item.impactScore}점`},{icon:"⚡",text:`시장 감성 ${item.sent} · 확산 ${item.speed}`},{icon:"🎯",text:`테마: ${(item.themes||[]).join(', ')}`}],
      stopLoss:"-5% 이내", targetReturn:isBull?"+10~15%":"+5~8%",
    };
    const i=NEWS.findIndex(n=>n.id===id); if(i>=0){NEWS[i].judgment=j;
      cacheAnalysis(id,{judgment:j});
    }
    notify(`📈 ${stock?.name} 투자판단 완료`,"info");
  }
  S.judging[id]=false; reCards();
}

/* 일괄 분석 */
async function runAll(){
  const u=NEWS.filter(n=>!n.verdict).sort((a,b)=>a.urgency-b.urgency);
  notify(`🤖 ${u.length}건 순차 분석 시작...`,"info");
  for(const item of u){
    if(!item.dartResult) await runDart(item.id);
    await rfc(item.id);
    await runJudge(item.id);
    await new Promise(r=>setTimeout(r,500));
  }
  notify(`✅ 전체 분석 완료!`, 'ok');
}

/* ══ 시작 ══ */
function _init() {
  // 구버전 캐시 자동 삭제 (undefined 방지)
  try {
    const pa = JSON.parse(localStorage.getItem('portAnalysis') || '{}');
    const needsClear = Object.values(pa).some(a => !a.verdict || a.verdict === 'undefined');
    if (needsClear) {
      localStorage.removeItem('portAnalysis');
      console.log('[Cache] 구버전 분석 캐시 삭제');
    }
  } catch(e) { localStorage.removeItem('portAnalysis'); }
  try { render(); } catch(e) {
    console.error('[KOSPI] render 초기 오류:', e);
    var app = document.getElementById('app');
    if(app) app.innerHTML = '<div style="color:#F2EBD9;padding:60px 20px;text-align:center"><div style="font-size:48px;margin-bottom:16px">⚠️</div><div style="font-size:16px;font-weight:700;margin-bottom:8px">초기화 오류</div><div style="font-size:12px;color:#8A7D68;margin-bottom:24px;font-family:monospace">' + e.message + '</div><button onclick="location.reload()" style="background:#E8921E;border:none;border-radius:12px;padding:12px 24px;color:#fff;font-size:14px;font-weight:700;cursor:pointer">새로고침</button></div>';
  }
  try { startAutoRefresh(); } catch(e) { console.error('[KOSPI] autoRefresh 오류:', e); }
}
if(document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', _init);
} else {
  _init();
}

// PWA Service Worker + 자동 업데이트 감지
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js')
    .then(reg => {
      console.log('[PWA] SW 등록 완료');
      // 새 SW 발견 시
      reg.addEventListener('updatefound', () => {
        const newSW = reg.installing;
        newSW.addEventListener('statechange', () => {
          if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
            showUpdateToast();
          }
        });
      });
      // 주기적 업데이트 체크 (앱 포커스 시)
      document.addEventListener('visibilitychange', () => {
        if (!document.hidden) reg.update();
      });
    })
    .catch(e => console.warn('[PWA] SW 실패:', e));

  // 새 버전 활성화 메시지 수신
  navigator.serviceWorker.addEventListener('message', e => {
    if (e.data?.type === 'NEW_VERSION') showUpdateToast();
  });
}

function showUpdateToast() {
  // 이미 떠있으면 스킵
  if (document.getElementById('update-toast')) return;
  const toast = document.createElement('div');
  toast.id = 'update-toast';
  toast.innerHTML = `
    <div style="
      position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
      background:#1565C0;color:#fff;border-radius:16px;
      padding:13px 18px;display:flex;align-items:center;gap:12px;
      box-shadow:0 4px 20px rgba(21,101,192,0.4);
      z-index:9999;font-size:13px;font-weight:700;
      animation:slideUp 0.3s ease;white-space:nowrap
    ">
      <span>🆕 새 버전이 있어요!</span>
      <button onclick="location.reload(true)" style="
        background:#fff;color:#1565C0;border:none;border-radius:10px;
        padding:6px 12px;font-size:12px;font-weight:800;cursor:pointer
      ">업데이트</button>
      <button onclick="document.getElementById('update-toast').remove()" style="
        background:rgba(255,255,255,0.2);color:#fff;border:none;border-radius:8px;
        padding:6px 8px;font-size:12px;cursor:pointer
      ">✕</button>
    </div>`;
  document.body.appendChild(toast);
  // 10초 후 자동 사라짐
  setTimeout(() => toast?.remove(), 10000);
}</script>

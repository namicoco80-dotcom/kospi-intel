<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>KOSPI INTEL V15 · AI 투자 플랫폼</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ===== RESET & VARIABLES ===== */
:root {
  --bg: #F4F7FC;
  --bg2: #FFFFFF;
  --bg3: #EEF2F8;
  --card: #FFFFFF;
  --card2: #F8FAFF;
  --bdr: #E2E8F0;
  --bdr2: #CBD5E1;
  --ink: #0F172A;
  --ink2: #334155;
  --ink3: #64748B;
  --primary: #2563EB;
  --primary-dark: #1D4ED8;
  --primary-light: #DBEAFE;
  --success: #10B981;
  --warning: #F59E0B;
  --danger: #EF4444;
  --purple: #8B5CF6;
  --teal: #14B8A6;
  --rose: #F43F5E;
  --grade-a: #EF4444;
  --grade-b: #3B82F6;
  --grade-c: #64748B;
  --radius: 16px;
  --radius-sm: 10px;
  --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
  --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
  --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
  overflow-x: hidden;
}
#app { max-width: 480px; margin: 0 auto; min-height: 100vh; background: var(--bg); }

/* ===== UTILITY ===== */
.hide { display: none !important; }
.flex { display: flex; }
.flex-col { flex-direction: column; }
.items-center { align-items: center; }
.justify-between { justify-content: space-between; }
.gap-2 { gap: 8px; }
.gap-4 { gap: 16px; }
.mt-2 { margin-top: 8px; }
.mb-2 { margin-bottom: 8px; }
.p-4 { padding: 16px; }
.text-sm { font-size: 12px; }
.text-base { font-size: 14px; }
.text-lg { font-size: 16px; }
.font-bold { font-weight: 700; }
.font-black { font-weight: 900; }
.text-primary { color: var(--primary); }
.text-success { color: var(--success); }
.text-danger { color: var(--danger); }
.text-warning { color: var(--warning); }
.text-ink3 { color: var(--ink3); }

/* ===== ANIMATIONS ===== */
@keyframes spin { to { transform: rotate(360deg); } }
.spin { animation: spin 0.8s linear infinite; display: inline-block; }
@keyframes slideUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
.pulse { animation: pulse 2s ease-in-out infinite; }

/* ===== HEADER ===== */
.hdr {
  background: var(--bg2);
  border-bottom: 1px solid var(--bdr);
  padding: 10px 16px 8px;
  position: sticky;
  top: 0;
  z-index: 50;
  box-shadow: var(--shadow);
}
.mkt-status {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  font-family: 'JetBrains Mono', monospace;
  margin-bottom: 6px;
}
.mkt-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
}
.mkt-dot.open { background: var(--success); box-shadow: 0 0 8px var(--success); }
.mkt-dot.pre { background: var(--warning); }
.mkt-dot.closed { background: var(--ink3); }
.hdr-row1 {
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.brand-tag {
  font-size: 10px;
  font-weight: 700;
  color: var(--primary);
  letter-spacing: 1px;
}
.brand-name {
  font-size: 18px;
  font-weight: 900;
  color: var(--ink);
  line-height: 1.2;
}
.hdr-btns {
  display: flex;
  gap: 6px;
}
.hdr-btn {
  background: var(--bg3);
  border: 1px solid var(--bdr2);
  border-radius: 20px;
  padding: 6px 10px;
  font-size: 11px;
  font-weight: 700;
  color: var(--ink2);
  cursor: pointer;
  transition: var(--transition);
  white-space: nowrap;
}
.hdr-btn:hover { background: var(--primary-light); border-color: var(--primary); color: var(--primary); }
.hdr-btn.primary { background: var(--primary); color: white; border-color: var(--primary-dark); }
.auto-badge {
  font-size: 10px;
  padding: 4px 8px;
  border-radius: 16px;
  background: var(--bg3);
  color: var(--ink3);
}
.auto-badge.on { background: rgba(16, 185, 129, 0.1); color: var(--success); }
.stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
  margin-top: 8px;
}
.stat {
  background: var(--bg2);
  border: 1px solid var(--bdr);
  border-radius: var(--radius-sm);
  padding: 6px 4px;
  text-align: center;
}
.stat-n { font-size: 16px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
.stat-l { font-size: 10px; color: var(--ink3); }

/* ===== TABS ===== */
.tabs {
  display: flex;
  overflow-x: auto;
  background: var(--bg2);
  border-bottom: 1px solid var(--bdr);
  position: sticky;
  top: 0;
  z-index: 40;
  scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  flex-shrink: 0;
  padding: 12px 16px;
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  font-size: 13px;
  font-weight: 700;
  color: var(--ink3);
  cursor: pointer;
  transition: var(--transition);
  white-space: nowrap;
}
.tab.on { color: var(--primary); border-bottom-color: var(--primary); }

/* ===== FILTERS ===== */
.filters { padding: 16px; display: flex; flex-direction: column; gap: 12px; }
.search {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--bg2);
  border: 1px solid var(--bdr);
  border-radius: 30px;
  padding: 0 16px;
}
.search input {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  padding: 12px 0;
  font-size: 14px;
  color: var(--ink);
}
.search input::placeholder { color: var(--ink3); }
.chips {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding-bottom: 2px;
}
.chip {
  padding: 6px 14px;
  border-radius: 30px;
  border: 1px solid var(--bdr);
  background: var(--bg2);
  font-size: 12px;
  font-weight: 600;
  color: var(--ink2);
  cursor: pointer;
  transition: var(--transition);
  white-space: nowrap;
}
.chip.ca { background: var(--primary-light); border-color: var(--primary); color: var(--primary); }
.chip.cs { background: rgba(16, 185, 129, 0.1); border-color: var(--success); color: var(--success); }
.grade-filter-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
}
.grade-filter-btn {
  padding: 8px 4px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--bdr);
  background: var(--bg2);
  font-size: 11px;
  font-weight: 700;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  cursor: pointer;
}
.gf-n { font-size: 16px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
.grade-filter-btn.on-all { background: rgba(245, 158, 11, 0.1); border-color: var(--warning); color: var(--warning); }
.grade-filter-btn.on-A { background: rgba(239, 68, 68, 0.1); border-color: var(--grade-a); color: var(--grade-a); }
.grade-filter-btn.on-B { background: rgba(59, 130, 246, 0.1); border-color: var(--grade-b); color: var(--grade-b); }
.grade-filter-btn.on-C { background: rgba(100, 116, 139, 0.1); border-color: var(--grade-c); color: var(--grade-c); }

/* ===== CARDS ===== */
.cards { padding: 0 16px 100px; }
.card {
  background: var(--bg2);
  border: 1px solid var(--bdr);
  border-radius: var(--radius);
  margin-bottom: 12px;
  overflow: hidden;
  transition: var(--transition);
  cursor: pointer;
}
.card:hover { box-shadow: var(--shadow-lg); transform: translateY(-2px); }
.card.lv1 { border-left: 4px solid var(--danger); }
.card.lv2 { border-left: 4px solid var(--warning); }
.ch { padding: 16px; }
.cmeta {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 6px;
  margin-bottom: 8px;
}
.bdg {
  font-size: 11px;
  font-weight: 700;
  padding: 4px 10px;
  border-radius: 6px;
  border: 1px solid transparent;
}
.upill {
  font-size: 11px;
  font-weight: 700;
  padding: 4px 10px;
  border-radius: 16px;
}
.upill.lv1 { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.3); }
.upill.lv2 { background: rgba(245, 158, 11, 0.1); color: var(--warning); border: 1px solid rgba(245, 158, 11, 0.3); }
.upill.lv3 { background: rgba(16, 185, 129, 0.1); color: var(--success); border: 1px solid rgba(16, 185, 129, 0.3); }
.ctime { font-size: 11px; color: var(--ink3); font-family: 'JetBrains Mono', monospace; }
.ctitle { font-size: 16px; font-weight: 800; line-height: 1.5; margin-bottom: 8px; }
.cverdict {
  display: inline-block;
  padding: 4px 12px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 700;
}
.cfooter {
  display: flex;
  gap: 12px;
  margin-top: 8px;
  font-size: 12px;
  color: var(--ink2);
}
.impact-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin: 8px 0;
}
.impact-bar-w {
  flex: 1;
  height: 6px;
  background: var(--bg3);
  border-radius: 3px;
  overflow: hidden;
}
.impact-bar { height: 100%; border-radius: 3px; transition: width 0.4s; }
.impact-score { font-size: 12px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }

/* ===== RING ===== */
.ring {
  position: relative;
  width: 58px;
  height: 58px;
  flex-shrink: 0;
}
.ring-v {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 14px;
  font-weight: 700;
  font-family: 'JetBrains Mono', monospace;
}

/* ===== AI SUMMARY ===== */
.ai-summary-preview {
  margin: 8px 0;
  padding: 10px 12px;
  background: var(--primary-light);
  border-radius: var(--radius-sm);
}
.ai-lbl { font-size: 10px; font-weight: 700; color: var(--primary); letter-spacing: 1px; }
.ai-txt { font-size: 12px; line-height: 1.6; color: var(--ink); }
.ai-keywords { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px; }
.ai-kw { font-size: 10px; padding: 2px 8px; background: rgba(37, 99, 235, 0.1); border-radius: 12px; color: var(--primary); }

/* ===== SUPPLY ===== */
.supply-box {
  background: var(--card2);
  border-radius: var(--radius-sm);
  padding: 12px;
  margin: 8px 0;
}
.supply-title { font-size: 11px; font-weight: 700; color: var(--ink2); margin-bottom: 8px; }
.supply-row {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 6px;
}
.supply-who { width: 50px; font-size: 12px; font-weight: 600; }
.supply-bar-w { flex: 1; height: 16px; background: var(--bg3); border-radius: 4px; overflow: hidden; }
.supply-bar {
  height: 100%;
  display: flex;
  align-items: center;
  padding-left: 6px;
  font-size: 10px;
  font-weight: 700;
  color: white;
}
.supply-5d-row {
  display: flex;
  gap: 4px;
  margin: 6px 0;
}
.supply-5d-dot {
  flex: 1;
  height: 18px;
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 700;
  color: white;
}

/* ===== PRICE ===== */
.price-row {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--bg3);
  border-radius: var(--radius-sm);
  padding: 8px 12px;
  margin: 8px 0;
}
.price-source-tag {
  font-size: 9px;
  padding: 2px 6px;
  border-radius: 4px;
  border: 1px solid;
}
.price-source-tag.live { background: rgba(16, 185, 129, 0.1); color: var(--success); border-color: rgba(16, 185, 129, 0.3); }
.price-val { font-size: 16px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
.price-chg { font-size: 12px; font-weight: 700; }
.price-chg.up { color: var(--danger); }
.price-chg.dn { color: var(--primary); }
.price-detail { display: flex; gap: 8px; font-size: 10px; color: var(--ink3); }

/* ===== STOCK CARD ===== */
.skcard {
  background: var(--bg2);
  border: 1px solid var(--bdr);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: var(--transition);
}
.skcard:hover { box-shadow: var(--shadow-lg); }
.skcard.sel { border-color: var(--primary); box-shadow: 0 0 0 2px var(--primary-light); }
.skhdr { display: flex; justify-content: space-between; margin-bottom: 10px; }
.skname { font-size: 16px; font-weight: 800; }
.skbdgs { display: flex; gap: 6px; flex-wrap: wrap; margin: 8px 0; }
.sknums {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
  margin: 10px 0;
}
.sknv { font-size: 16px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
.sknl { font-size: 10px; color: var(--ink3); }

/* ===== PORTFOLIO ===== */
.port-tab { padding: 16px 16px 100px; }
.port-add-card {
  background: var(--bg2);
  border: 1px solid var(--bdr);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 16px;
}
.port-inp {
  background: var(--bg3);
  border: 1px solid var(--bdr2);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  font-size: 13px;
  width: 100%;
  outline: none;
}
.port-btn {
  background: var(--primary);
  border: none;
  border-radius: var(--radius-sm);
  padding: 10px 16px;
  color: white;
  font-weight: 700;
  cursor: pointer;
}
.port-summary {
  background: linear-gradient(135deg, #1E293B, #0F172A);
  border-radius: var(--radius);
  padding: 16px;
  color: white;
  margin-bottom: 16px;
}
.port-sum-row { display: flex; justify-content: space-between; margin: 6px 0; }
.port-card {
  background: var(--bg2);
  border: 1px solid var(--bdr);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
}
.port-card-top { display: flex; justify-content: space-between; margin-bottom: 10px; }
.port-name { font-size: 16px; font-weight: 800; }
.port-sector { font-size: 11px; color: var(--ink3); }
.port-pnl { font-size: 18px; font-weight: 700; }
.port-pnl.pos { color: var(--danger); }
.port-pnl.neg { color: var(--primary); }
.port-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin: 10px 0;
}
.port-stat {
  background: var(--bg3);
  border-radius: var(--radius-sm);
  padding: 8px;
  text-align: center;
}
.port-sv { font-size: 14px; font-weight: 700; }
.port-sl { font-size: 10px; color: var(--ink3); }
.port-risk {
  padding: 8px;
  border-radius: var(--radius-sm);
  font-size: 12px;
  font-weight: 700;
  margin: 8px 0;
}
.port-risk.high { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.2); }
.port-risk.mid { background: rgba(245, 158, 11, 0.1); color: var(--warning); border: 1px solid rgba(245, 158, 11, 0.2); }
.port-risk.low { background: rgba(16, 185, 129, 0.1); color: var(--success); border: 1px solid rgba(16, 185, 129, 0.2); }

/* ===== AI PORTFOLIO ANALYSIS ===== */
.ai-invest-btn {
  width: 100%;
  padding: 14px;
  border-radius: var(--radius-sm);
  border: none;
  background: linear-gradient(135deg, #312E81, #4F46E5);
  color: white;
  font-weight: 800;
  cursor: pointer;
  transition: var(--transition);
  margin: 8px 0;
}
.ai-port-result {
  background: linear-gradient(135deg, #1E1B4B, #312E81);
  border-radius: var(--radius);
  overflow: hidden;
  margin: 12px 0;
}
.ai-port-top { padding: 16px; }
.ai-port-verdict { font-size: 20px; font-weight: 900; color: #F5F3FF; }
.ai-port-summary { font-size: 13px; color: #E0E7FF; line-height: 1.6; margin: 8px 0; }
.ai-port-bot { background: white; padding: 16px; }
.prob-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin: 10px 0;
}
.prob-cell {
  padding: 8px;
  border-radius: var(--radius-sm);
  text-align: center;
}
.prob-cell.up { background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); }
.prob-cell.flat { background: var(--bg3); }
.prob-cell.dn { background: rgba(59, 130, 246, 0.1); border: 1px solid rgba(59, 130, 246, 0.2); }
.prob-label { font-size: 10px; color: var(--ink3); }
.prob-val { font-size: 16px; font-weight: 700; }

/* ===== MODAL ===== */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.5);
  z-index: 1000;
  display: none;
  align-items: flex-end;
  justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: white;
  border-radius: 24px 24px 0 0;
  width: 100%;
  max-width: 480px;
  max-height: 88vh;
  overflow-y: auto;
  animation: slideUp 0.3s ease;
}
.modal-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--bdr);
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  background: white;
  z-index: 10;
}
.modal-title { font-size: 18px; font-weight: 800; }
.modal-close {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: var(--bg3);
  border: none;
  font-size: 18px;
  cursor: pointer;
}
.modal-body { padding: 20px; }

/* ===== JUDGMENT ===== */
.jbox { border-radius: var(--radius); overflow: hidden; margin: 12px 0; }
.jtop { padding: 20px; }
.jrow1 { display: flex; justify-content: space-between; margin-bottom: 12px; }
.jverdict { font-size: 24px; font-weight: 900; }
.jconf-n { font-size: 24px; font-weight: 700; }
.jsum { font-size: 13px; line-height: 1.7; margin: 12px 0; }
.jhs {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}
.jh {
  background: rgba(255, 255, 255, 0.1);
  border-radius: 12px;
  padding: 10px;
}
.jhlbl { font-size: 10px; font-weight: 700; margin-bottom: 4px; }
.jhval { font-size: 14px; font-weight: 800; }
.jhdesc { font-size: 10px; opacity: 0.8; }
.jpos {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-top: 12px;
}
.jpositem {
  border-radius: 12px;
  padding: 10px;
  text-align: center;
}

/* ===== TOAST ===== */
.toast {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--ink);
  color: white;
  padding: 10px 20px;
  border-radius: 30px;
  font-size: 13px;
  font-weight: 500;
  z-index: 9999;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
  white-space: nowrap;
}
.toast.show { opacity: 1; }

/* ===== HELP BUTTON ===== */
.help-btn {
  position: fixed;
  bottom: 80px;
  right: 16px;
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: var(--primary);
  color: white;
  border: none;
  font-size: 20px;
  cursor: pointer;
  box-shadow: var(--shadow-lg);
  z-index: 90;
}
.help-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.5);
  z-index: 1000;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}
.help-overlay.on { opacity: 1; pointer-events: all; }
.help-sheet {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: white;
  border-radius: 24px 24px 0 0;
  z-index: 1001;
  max-height: 80vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  transform: translateY(100%);
  transition: transform 0.3s ease;
}
.help-sheet.on { transform: translateY(0); }

/* ===== LOADING ===== */
.loading {
  display: inline-block;
  width: 20px;
  height: 20px;

    S.nt = setTimeout(() => {
      S.notif = null;
      render();
    }, 3000);
  };

  /* ===== RING ===== */
  const ring = (score, size = 58) => {
    const r = size / 2 - 6;
    const circ = 2 * Math.PI * r;
    const dash = score != null ? (score / 100) * circ : 0;
    const col = sc(score);
    return `<div class="ring" style="width:${size}px;height:${size}px">
      <svg width="${size}" height="${size}" style="transform:rotate(-90deg)">
        <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="var(--bg3)" stroke-width="5"/>
        <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${col}" stroke-width="5" stroke-dasharray="${dash} ${circ}" stroke-linecap="round"/>
      </svg>
      <div class="ring-v" style="color:${col}">${score != null ? score : '?'}</div>
    </div>`;
  };

  /* ===== AI API ===== */
  const getWorkerUrl = () => {
    try { return localStorage.getItem('cf_worker_url') || ''; } catch { return ''; }
  };

  const aiApiFetch = (body) => {
    const url = getWorkerUrl();
    if (!url) return Promise.reject(new Error('CF_WORKER_NOT_SET'));
    return fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    }).then(res => {
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return res.json();
    });
  };

  /* ===== FILTER ===== */
  const filteredNews = () => {
    return NEWS.filter(n => {
      const s = gs(n.code);
      if (S.sector !== "전체" && s?.sector !== S.sector) return false;
      if (S.tf !== "전체" && n.type !== S.tf) return false;
      if (S.sk && n.code !== S.sk) return false;
      if (S.themeFilter && !(n.themes || []).includes(S.themeFilter)) return false;
      if (S.gradeFilter !== "all" && getGrade(n) !== S.gradeFilter) return false;
      if (S.q && !n.title.includes(S.q) && !s?.name.includes(S.q) && !(n.aiKeywords || []).join('').includes(S.q)) return false;
      return true;
    }).sort((a, b) => a.urgency - b.urgency);
  };

  /* ===== PRICE ENGINE ===== */
  const lsSavePrices = () => {
    try {
      const data = {};
      Object.keys(PRICE_BASE).forEach(code => {
        const p = PRICE_BASE[code];
        if (p.price !== null && p.price !== undefined) {
          data[code] = {
            price: p.price,
            chg: p.chg ?? 0,
            basePrice: p.basePrice ?? p.price,
            high: p.high ?? '—',
            low: p.low ?? '—',
            open: p.open ?? '—',
            vol: p.vol ?? '—',
            dataSource: p.dataSource ?? 'manual',
            savedAt: Date.now(),
          };
        }
      });
      localStorage.setItem('kospi_prices_v2', JSON.stringify(data));
    } catch (e) { console.warn('Price save fail', e); }
  };

  const lsLoadPrices = () => {
    try {
      const raw = localStorage.getItem('kospi_prices_v2');
      return raw ? JSON.parse(raw) : {};
    } catch { return {}; }
  };

  const applyLsPrices = (lsData) => {
    let count = 0;
    Object.keys(lsData).forEach(code => {
      if (!PRICE_BASE[code]) return;
      const d = lsData[code];
      if (!d.price) return;
      const age = Date.now() - (d.savedAt || 0);
      const src = age > 24 * 60 * 60 * 1000 ? 'cached_old' : 'cached';
      if (PRICE_BASE[code].price === null || PRICE_BASE[code].price === undefined ||
          PRICE_BASE[code].dataSource === 'cached' || PRICE_BASE[code].dataSource === 'cached_old') {
        Object.assign(PRICE_BASE[code], {
          price: d.price,
          chg: d.chg ?? 0,
          basePrice: d.basePrice ?? d.price,
          high: d.high ?? '—',
          low: d.low ?? '—',
          open: d.open ?? '—',
          vol: d.vol ?? '—',
          dataSource: src,
        });
        count++;
      }
    });
    return count;
  };

  const setPriceBase = (code, data) => {
    if (!PRICE_BASE[code]) PRICE_BASE[code] = { price: null, chg: null, vol: '—', high: '—', low: '—', open: '—', dataSource: 'manual' };
    Object.assign(PRICE_BASE[code], data);
    if (setPriceBase._timer) clearTimeout(setPriceBase._timer);
    setPriceBase._timer = setTimeout(lsSavePrices, 100);
  };

  const manualPriceInput = (code, priceStr) => {
    const price = Number(String(priceStr).replace(/[,\s]/g, ''));
    if (!price || price <= 0) { notify('⚠️ 올바른 가격을 입력해주세요', 'warn'); return false; }
    const prev = PRICE_BASE[code]?.basePrice ?? price;
    const chg = prev ? Math.round((price - prev) / prev * 10000) / 100 : 0;
    setPriceBase(code, { price, chg, basePrice: prev, high: '—', low: '—', open: '—', vol: '—', dataSource: 'manual' });
    const name = gs(code)?.name ?? code;
    notify(`✅ ${name} ${price.toLocaleString()}원 입력됨`, 'ok');
    refreshPriceDom();
    refreshPortfolioDom();
    return true;
  };

  const refreshPriceDom = () => {
    document.querySelectorAll('[data-price-code]').forEach(el => {
      const code = el.dataset.priceCode;
      const p = PRICE_BASE[code];
      if (!p || p.price === null || p.price === undefined) return;
      const vEl = el.querySelector('.price-val');
      const cEl = el.querySelector('.price-chg');
      const sEl = el.querySelector('.price-source-tag');
      if (vEl) vEl.textContent = p.price.toLocaleString('ko-KR') + '원';
      if (cEl) {
        const chgVal = p.chg ?? 0;
        cEl.textContent = (chgVal >= 0 ? '+' : '') + chgVal + '%';
        cEl.className = 'price-chg ' + (chgVal > 0 ? 'up' : chgVal < 0 ? 'dn' : '');
      }
      if (sEl) {
        const labels = { live: 'LIVE', json: 'JSON', cached: '저장', cached_old: '구저장', manual: '수동' };
        sEl.textContent = labels[p.dataSource] ?? 'SIM';
        sEl.className = 'price-source-tag ' + (['live', 'json'].includes(p.dataSource) ? 'live' : '');
      }
    });
  };

  const refreshPortfolioDom = () => {
    if (S.tab !== 'port' || !S.portfolio.length) return;
    let totalVal = 0, totalCost = 0;
    S.portfolio.forEach(p => {
      const pr = PRICE_BASE[p.code];
      if (!pr || pr.price === null || pr.price === undefined) return;
      totalVal += pr.price * p.qty;
      totalCost += p.buyPrice * p.qty;
    });
    const totalPnl = totalVal - totalCost;
    const totalPnlPct = totalCost > 0 ? ((totalPnl / totalCost) * 100).toFixed(2) : '0.00';
    const isGain = totalPnl >= 0;
    const sign = isGain ? '+' : '';
    const pnlColor = isGain ? 'var(--danger)' : 'var(--primary)';

    const rows = document.querySelectorAll('.port-sum-row');
    if (rows.length >= 3) {
      const valEl = rows[0]?.querySelector('.port-sum-val');
      const costEl = rows[1]?.querySelector('.port-sum-val');
      const pnlEl = rows[2]?.querySelector('.port-sum-val');
      if (valEl) valEl.textContent = totalVal.toLocaleString('ko-KR') + '원';
      if (costEl) costEl.textContent = totalCost.toLocaleString('ko-KR') + '원';
      if (pnlEl) {
        pnlEl.textContent = sign + totalPnlPct + '% (' + sign + Math.round(totalPnl).toLocaleString('ko-KR') + '원)';
        pnlEl.style.color = pnlColor;
      }
    }
  };

  /* ===== FETCH DATA ===== */
  const fetchAllPrices = async () => {
    const lsData = lsLoadPrices();
    const lsCount = applyLsPrices(lsData);
    if (lsCount > 0) { refreshPriceDom(); refreshPortfolioDom(); }
    return lsCount;
  };

  const fetchSupplyJson = async () => {
    try {
      const res = await fetch('./supply.json?' + Date.now(), { cache: 'no-store' });
      if (!res.ok) return 0;
      const json = await res.json();
      Object.assign(SUPPLY_BASE, json);
      S._supplyLoaded = true;
      return Object.keys(json).length;
    } catch { return 0; }
  };

  const fetchFundamentalData = async () => {
    try {
      const [fRes, s5Res] = await Promise.all([
        fetch('./fundamental.json?' + Date.now(), { cache: 'no-store' }),
        fetch('./supply5.json?' + Date.now(), { cache: 'no-store' })
      ]);
      if (fRes.ok) FUND_DATA = await fRes.json();
      if (s5Res.ok) SUPPLY5_DATA = await s5Res.json();
    } catch (e) { console.warn('Fund data fetch fail', e); }
  };

  const fetchQuantData = async () => {
    try {
      const res = await fetch('./quant.json?' + Date.now(), { cache: 'no-store' });
      if (!res.ok) return;
      QUANT_DATA = await res.json();
    } catch { console.warn('Quant data fetch fail'); }
  };

  const fetchNewsJson = async () => {
    try {
      const res = await fetch('./news.json?' + Date.now(), { cache: 'no-store' });
      if (!res.ok) return 0;
      const arr = await res.json();
      if (!Array.isArray(arr) || !arr.length) return 0;
      const existIds = new Set(NEWS.map(n => n.id));
      let added = 0;
      arr.forEach(item => {
        if (!existIds.has(item.id)) { NEWS.push(item); added++; }
      });
      NEWS.sort((a, b) => (b.urgency || 5) - (a.urgency || 5));
      if (NEWS.length > 200) NEWS.splice(200);
      S._newsLoaded = true;
      return added;
    } catch { return 0; }
  };

  const fetchAllData = async () => {
    const [priceN, supplyN, newsN] = await Promise.all([
      fetchAllPrices(),
      fetchSupplyJson(),
      fetchNewsJson(),
    ]);
    console.log(`[Data] price:${priceN} supply:${supplyN} news:${newsN}`);
    return { priceN, supplyN, newsN };
  };

  /* ===== SIGNAL CALC ===== */
  const calcSignal = (code) => {
    const qd = QUANT_DATA[code];
    const pr = PRICE_BASE[code];
    const sup = SUPPLY_BASE[code];

    if (qd && qd.total != null) {
      const { total, grade, scores, details, autoBuy } = qd;
      const gradeColor = { A: '#EF4444', B: '#3B82F6', C: '#64748B', D: '#94A3B8' }[grade];
      const gradeBg = { A: '#FEE2E2', B: '#DBEAFE', C: '#F1F5F9', D: '#F8FAFC' }[grade];
      const gradeLabel = { A: '강한보유', B: '보유', C: '관찰', D: '비중축소' }[grade];

      const signals = [
        { label: '모멘텀', val: details.momentum?.val || '—', good: scores.momentum >= 18, bad: scores.momentum < 8, score: scores.momentum },
        { label: '52주', val: details.high52?.label || '—', good: scores.high52 >= 14, bad: scores.high52 <= 5, score: scores.high52 },
        { label: '수급', val: details.supply?.label || '—', good: scores.supply >= 15, bad: scores.supply <= 5, score: scores.supply },
        { label: '기술', val: details.technical?.label || '—', good: scores.technical >= 12, bad: scores.technical <= 5, score: scores.technical },
      ];

      const action = {
        label: autoBuy ? '매수신호' : gradeLabel,
        color: autoBuy ? '#EF4444' : gradeColor,
        bg: autoBuy ? '#FEE2E2' : gradeBg,
        emoji: autoBuy ? '🚀' : { A: '💎', B: '✅', C: '👀', D: '⚠️' }[grade],
      };
      return { score: total, grade, signals, action, autoBuy, dataSource: 'quant.json' };
    }

    // Fallback
    const chg = pr?.chg || 0;
    const scores = {
      momentum: chg > 3 ? 18 : chg > 1 ? 14 : chg > 0 ? 11 : chg > -1 ? 8 : 5,
      high52: 10,
      supply: sup ? ((sup.foreign > 0 ? 10 : 0) + (sup.inst > 0 ? 10 : 0)) : 10,
      value: 10,
      technical: 10,
    };
    const total = scores.momentum + scores.high52 + scores.supply + scores.value + scores.technical;
    const grade = total >= 80 ? 'A' : total >= 60 ? 'B' : total >= 40 ? 'C' : 'D';
    const signals = [
      { label: '모멘텀', val: `${chg >= 0 ? '+' : ''}${chg}%`, good: scores.momentum >= 14, bad: scores.momentum < 8, score: scores.momentum },
      { label: '52주', val: '데이터부족', good: false, bad: false, score: scores.high52 },
      { label: '수급', val: sup ? '매수세' : '보통', good: scores.supply >= 15, bad: scores.supply <= 5, score: scores.supply },
      { label: '기술', val: '중립', good: false, bad: false, score: scores.technical },
    ];
    const action = {
      label: { A: '강한보유', B: '보유', C: '관찰', D: '비중축소' }[grade],
      color: { A: '#EF4444', B: '#3B82F6', C: '#64748B', D: '#94A3B8' }[grade],
      bg: { A: '#FEE2E2', B: '#DBEAFE', C: '#F1F5F9', D: '#F8FAFC' }[grade],
      emoji: { A: '💎', B: '✅', C: '👀', D: '⚠️' }[grade],
    };
    return { score: total, grade, signals, action, autoBuy: false, dataSource: 'fallback' };
  };

  /* ===== PORTFOLIO INTELLIGENCE ===== */
  const calcPortfolioIntelligence = () => {
    const port = S.portfolio;
    if (!port.length) return null;
    const items = port.map(p => {
      const pr = PRICE_BASE[p.code];
      const st = gs(p.code);
      const hasP = pr && pr.price !== null && pr.price !== undefined;
      const cur = hasP ? pr.price : p.buyPrice;
      const val = cur * p.qty;
      const cost = p.buyPrice * p.qty;
      const pnlPct = hasP ? (pr.price - p.buyPrice) / p.buyPrice * 100 : 0;
      return { code: p.code, name: st?.name, sector: st?.sector, val, cost, pnlPct, hasP };
    }).filter(it => it.val > 0);
    if (!items.length) return null;
    const totalVal = items.reduce((s, i) => s + i.val, 0);
    const sectorMap = {};
    items.forEach(it => { sectorMap[it.sector] = (sectorMap[it.sector] || 0) + it.val; });
    const sectorList = Object.entries(sectorMap).map(([s, v]) => ({ sector: s, pct: Math.round(v / totalVal * 100) })).sort((a, b) => b.pct - a.pct);
    const topSector = sectorList[0];
    const isConcentrated = topSector && topSector.pct >= 50;
    const avgPnl = items.reduce((s, i) => s + i.pnlPct, 0) / items.length;
    const trend = avgPnl > 5 ? '상승 우세' : avgPnl > 0 ? '중립 우세' : '혼조세';
    const maxDrawdown = Math.min(...items.map(i => i.pnlPct));
    const riskScore = (isConcentrated ? 30 : 0) + (maxDrawdown < -15 ? 30 : maxDrawdown < -7 ? 15 : 0);
    const risk = riskScore >= 50 ? '높음' : riskScore >= 25 ? '보통' : '낮음';
    const actions = [];
    if (isConcentrated) actions.push(`${topSector.sector} 섹터 집중도 ${topSector.pct}% — 분산 투자 권장`);
    if (maxDrawdown < -10) actions.push(`최대 손실 ${maxDrawdown.toFixed(1)}% — 손절 기준 재검토`);
    if (items.length < 3) actions.push('종목 수 부족 — 3~7종목 분산 보유 권장');
    if (!actions.length) actions.push('현재 포트폴리오 균형 양호 — 현 포지션 유지');
    const summary = `보유 ${items.length}종목 포트폴리오는 ${trend} 흐름${isConcentrated ? `, ${topSector.sector} 집중(${topSector.pct}%)` : ''}이며 리스크는 ${risk} 수준입니다.`;
    return { sectorList, topSector, isConcentrated, trend, risk, actions, summary };
  };

  /* ===== RENDER FUNCTIONS ===== */
  const render = () => {
    const app = document.getElementById('app');
    if (!app) return;
    
    const st = {
      total: NEWS.length,
      urgent: NEWS.filter(n => n.urgency === 1).length,
      judged: NEWS.filter(n => n.judgment).length,
      rumor: NEWS.filter(n => n.type === "rumor").length
    };
    const mktStatus = getMarketStatus();

    app.innerHTML = `
      ${S.notif ? `<div class="toast show">${S.notif.msg}</div>` : ''}
      ${S.refreshToast ? '<div class="toast show">🔄 새 이슈가 추가됐습니다</div>' : ''}
      <div class="hdr">
        <div class="mkt-status">
          <div class="mkt-dot ${mktStatus}"></div>
          <span>${mktStatus === 'open' ? '장중' : mktStatus === 'pre' ? '장전' : '장외'}</span>
          <span id="hdr-clock"></span>
          ${S._priceUpdatedAt ? `<span>· 데이터 ${S._priceUpdatedAt}</span>` : ''}
          <span class="auto-badge ${S.autoRefresh ? 'on' : ''}">${S.autoRefresh ? '● AUTO' : '○ AUTO'}</span>
        </div>
        <div class="hdr-row1">
          <div class="brand">
            <div class="brand-tag">KOSPI INTEL V15</div>
            <div class="brand-name">AI 투자 분석</div>
          </div>
          <div class="hdr-btns">
            <button class="hdr-btn" onclick="toggleAutoRefresh()">${S.autoRefresh ? '⏸ 중지' : '▶ 자동'}</button>
            <button class="hdr-btn primary" onclick="crawl()" ${S.crawling ? 'disabled' : ''}>
              ${S.crawling ? '<span class="spin">⟳</span>' : '🔍'} 크롤
            </button>
            <button class="hdr-btn" onclick="showHealthPanel()">🏥</button>
          </div>
        </div>
        <div class="stats">
          <div class="stat"><div class="stat-n" style="color:var(--ink)">${st.total}</div><div class="stat-l">전체</div></div>
          <div class="stat"><div class="stat-n" style="color:var(--danger)">${st.urgent}</div><div class="stat-l">긴급</div></div>
          <div class="stat"><div class="stat-n" style="color:var(--warning)">${st.rumor}</div><div class="stat-l">찌라시</div></div>
          <div class="stat"><div class="stat-n" style="color:var(--success)">${st.judged}</div><div class="stat-l">판단</div></div>
        </div>
      </div>

      <button class="help-btn" onclick="openHelp()">❓</button>

      <div class="tabs">
        <button class="tab ${S.tab === 'my' ? 'on' : ''}" onclick="setTab('my')">🎯 내종목</button>
        <button class="tab ${S.tab === 'trade' ? 'on' : ''}" onclick="setTab('trade')">📒 매매</button>
        <button class="tab ${S.tab === 'feed' ? 'on' : ''}" onclick="setTab('feed')">📡 뉴스</button>
        <button class="tab ${S.tab === 'asset' ? 'on' : ''}" onclick="setTab('asset')">💹 자산</button>
        <button class="tab ${S.tab === 'port' ? 'on' : ''}" onclick="setTab('port')">💼 포트</button>
        <button class="tab ${S.tab === 'hm' ? 'on' : ''}" onclick="setTab('hm')">🌡 테마</button>
        <button class="tab ${S.tab === 'sk' ? 'on' : ''}" onclick="setTab('sk')">🗺 종목</button>
        <button class="tab ${S.tab === 'alert' ? 'on' : ''}" onclick="setTab('alert')">🔔 알림</button>
        <button class="tab ${S.tab === 'board' ? 'on' : ''}" onclick="setTab('board')">💬 게시판</button>
      </div>

      ${S.tab === 'feed' ? renderFeed() : ''}
      ${S.tab === 'sk' ? renderStocks() : ''}
      ${S.tab === 'port' ? renderPortfolio() : ''}
      ${S.tab === 'my' ? renderMyStocks() : ''}
      ${S.tab === 'trade' ? renderTradelog() : ''}
      ${S.tab === 'hm' ? renderHeatmap() : ''}
      ${S.tab === 'alert' ? renderAlert() : ''}
      ${S.tab === 'asset' ? renderAsset() : ''}
      ${S.tab === 'board' ? renderBoard() : ''}
    `;

    bindEvents();
    updateClock();
  };

  const renderFeed = () => {
    const items = filteredNews();
    const uc = NEWS.filter(n => !n.verdict).length;
    const mktStatus = getMarketStatus();
    const cntA = NEWS.filter(n => getGrade(n) === 'A').length;
    const cntB = NEWS.filter(n => getGrade(n) === 'B').length;
    const cntC = NEWS.filter(n => getGrade(n) === 'C').length;

    return `
      <div class="filters">
        <div class="search">
          <span>🔍</span>
          <input id="si" placeholder="종목명, 키워드, 테마 검색..." value="${S.q}">
        </div>
        <div class="grade-filter-row">
          <button class="grade-filter-btn ${S.gradeFilter === 'all' ? 'on-all' : ''}" onclick="setGrade('all')">
            <span class="gf-n" style="color:var(--warning)">${NEWS.length}</span><span>전체</span>
          </button>
          <button class="grade-filter-btn ${S.gradeFilter === 'A' ? 'on-A' : ''}" onclick="setGrade('A')">
            <span class="gf-n" style="color:var(--danger)">${cntA}</span><span>확정</span>
          </button>
          <button class="grade-filter-btn ${S.gradeFilter === 'B' ? 'on-B' : ''}" onclick="setGrade('B')">
            <span class="gf-n" style="color:var(--primary)">${cntB}</span><span>검증</span>
          </button>
          <button class="grade-filter-btn ${S.gradeFilter === 'C' ? 'on-C' : ''}" onclick="setGrade('C')">
            <span class="gf-n" style="color:var(--ink3)">${cntC}</span><span>루머</span>
          </button>
        </div>
        <div class="chips">
          ${['전체', 'rumor', 'news', 'official', 'analyst'].map(t => {
            const s = SRC[t];
            return `<button class="chip ${S.tf === t ? 'ca' : ''}" onclick="setTF('${t}')">${s ? s.icon + ' ' + s.label : '🗂 전체'}</button>`;
          }).join('')}
        </div>
        <div class="chips">
          ${SECTORS.map(sec => `<button class="chip ${S.sector === sec ? 'cs' : ''}" onclick="setSec('${sec}')">${sec}</button>`).join('')}
        </div>
        <div class="chips">
          ${THEMES.map(th => `<button class="chip ${S.themeFilter === th.name ? 'ct' : ''}" onclick="setTheme('${th.name}')">${th.icon} ${th.name}</button>`).join('')}
        </div>
        ${uc > 0 ? `<button class="chip" style="background:var(--primary);color:white" onclick="runAll()">🤖 AI 일괄분석 (${uc}건)</button>` : ''}
      </div>
      <div class="cards" id="cc">
        ${items.length === 0 ? '<div class="empty"><div class="empty-i">🔭</div><div class="empty-t">해당 조건의 이슈가 없습니다</div></div>' : ''}
        ${items.map(renderCard).join('')}
      </div>
    `;
  };

  const renderCard = (item) => {
    const stock = gs(item.code);
    const src = SRC[item.type] || { icon: '📰', color: '#64748B' };
    const v = vdStyle(item.verdict);
    const iColor = impactColor(item.impactScore || 50);
    const grade = getGrade(item);
    const gm = GRADE_META[grade];

    return `
      <div class="card${item.urgency === 1 ? ' lv1' : item.urgency === 2 ? ' lv2' : ''}${item._new ? ' new-item' : ''}" onclick="showCardModal(${item.id})">
        <div class="ch">
          <div style="display:flex;justify-content:space-between">
            <div style="flex:1">
              <div class="cmeta">
                <span class="bdg" style="background:${src.color}20;color:${src.color}">${src.icon} ${src.label}</span>
                <span class="bdg" style="background:var(--bg3);color:var(--ink2)">${stock?.name || ''}</span>
                <span class="grade-badge" style="background:${gm.color}20;color:${gm.color}">${gm.sublabel}</span>
                ${item.urgency === 1 ? '<span class="upill lv1">🚨 긴급</span>' : item.urgency === 2 ? '<span class="upill lv2">⚠️ 주의</span>' : '<span class="upill lv3">✅ 일반</span>'}
                <span class="ctime">${item.time || ''}</span>
              </div>
              <div class="ctitle">${item.title}</div>
              ${item.verdict ? `<div class="cverdict" style="background:${v.bg};color:${v.col}">${v.lbl}</div>` : ''}
            </div>
            ${ring(item.score, 58)}
          </div>
          <div class="impact-row">
            <span class="impact-lbl">IMPACT</span>
            <div class="impact-bar-w"><div class="impact-bar" style="width:${item.impactScore || 50}%;background:${iColor}"></div></div>
            <span class="impact-score" style="color:${iColor}">${item.impactScore || '?'}</span>
          </div>
          ${item.aiSummary ? `
            <div class="ai-summary-preview">
              <div class="ai-lbl">AI SUMMARY</div>
              <div class="ai-txt">${item.aiSummary}</div>
              ${item.aiKeywords ? `<div class="ai-keywords">${item.aiKeywords.map(k => `<span class="ai-kw">#${k}</span>`).join('')}</div>` : ''}
            </div>
          ` : ''}
          <div class="cfooter">
            <span>📡 ${item.sources || 1}곳</span>
            <span>⚡ ${item.speed || '보통'}</span>
            ${item.sent === "긍정" ? '<span style="color:var(--danger)">▲ 긍정</span>' : item.sent === "부정" ? '<span style="color:var(--primary)">▼ 부정</span>' : ''}
          </div>
        </div>
      </div>
    `;
  };

  const renderStocks = () => {
    const smap = STOCKS.map(s => {
      const it = NEWS.filter(n => n.code === s.code);
      const avg = it.filter(n => n.score != null).length ? Math.round(it.reduce((a, n) => a + n.score, 0) / it.filter(n => n.score != null).length) : null;
      return { ...s, total: it.length, rumor: it.filter(n => n.type === "rumor").length, avg, judged: it.filter(n => n.judgment).length };
    }).filter(s => s.total > 0 && (S.sector === "전체" || s.sector === S.sector)).sort((a, b) => b.total - a.total);

    return `
      <div class="cards" style="padding-top:16px">
        <div class="chips" style="margin-bottom:12px">
          ${SECTORS.map(sec => `<button class="chip ${S.sector === sec ? 'cs' : ''}" onclick="setSec('${sec}')">${sec}</button>`).join('')}
        </div>
        ${smap.length === 0 ? '<div class="empty"><div class="empty-i">📭</div><div class="empty-t">이슈 없음</div></div>' : ''}
        ${smap.map(s => {
          const p = PRICE_BASE[s.code];
          const isWL = S.watchlist.includes(s.code);
          return `
            <div class="skcard${S.sk === s.code ? ' sel' : ''}" onclick="togSK('${s.code}')">
              <div class="skhdr">
                <div style="flex:1">
                  <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
                    <div class="skname">${s.name}</div>
                    ${s.judged > 0 ? `<span style="font-size:12px;color:var(--success)">📈${s.judged}</span>` : ''}
                    <button onclick="event.stopPropagation();toggleWL('${s.code}')" style="background:none;border:none;font-size:18px;margin-left:auto;cursor:pointer">${isWL ? '⭐' : '☆'}</button>
                  </div>
                  <div class="skbdgs">
                    <span class="bdg" style="background:rgba(16,185,129,0.1);color:var(--success)">${s.sector}</span>
                  </div>
                </div>
                ${ring(s.avg, 58)}
              </div>
              ${p && p.price ? `
                <div class="price-row" data-price-code="${s.code}">
                  <span class="price-source-tag ${['live', 'json'].includes(p.dataSource) ? 'live' : ''}">${p.dataSource === 'live' ? 'LIVE' : p.dataSource === 'json' ? 'JSON' : '저장'}</span>
                  <div style="flex:1">
                    <div style="display:flex;align-items:center;gap:8px;margin-bottom:2px">
                      <span class="price-val">${p.price.toLocaleString()}원</span>
                      <span class="price-chg ${p.chg > 0 ? 'up' : p.chg < 0 ? 'dn' : ''}">${p.chg >= 0 ? '+' : ''}${p.chg}%</span>
                    </div>
                  </div>
                </div>
              ` : ''}
              <div class="sknums">
                <div><div class="sknv" style="color:var(--warning)">${s.total}</div><div class="sknl">전체</div></div>
                <div><div class="sknv" style="color:var(--danger)">${s.rumor}</div><div class="sknl">찌라시</div></div>
                <div><div class="sknv" style="color:var(--success)">${s.judged}</div><div class="sknl">판단</div></div>
              </div>
            </div>
          `;
        }).join('')}
      </div>
    `;
  };

  const renderPortfolio = () => {
    const total = S.portfolio.reduce((sum, p) => {
      const pr = PRICE_BASE[p.code];
      if (!pr || pr.price === null || pr.price === undefined) return sum;
      return sum + pr.price * p.qty;
    }, 0);
    const totalCost = S.portfolio.reduce((sum, p) => sum + p.buyPrice * p.qty, 0);
    const totalPnl = total - totalCost;
    const totalPnlPct = totalCost > 0 ? ((totalPnl / totalCost) * 100).toFixed(2) : 0;
    const isGain = totalPnl >= 0;
    const noPriceCount = S.portfolio.filter(p => !PRICE_BASE[p.code]?.price).length;
    const intel = calcPortfolioIntelligence();

    return `
      <div class="port-tab">
        <div class="port-add-card">
          <div style="font-size:14px;font-weight:800;margin-bottom:12px">📂 보유 종목 추가</div>
          <select class="port-inp" id="port-code" onchange="S.portInp.code=this.value" style="margin-bottom:8px">
            <option value="">종목 선택</option>
            ${STOCKS.map(s => `<option value="${s.code}" ${S.portInp.code === s.code ? 'selected' : ''}>${s.name}</option>`).join('')}
          </select>
          <div style="display:flex;gap:8px;margin-bottom:8px">
            <input class="port-inp" id="port-price" type="number" placeholder="매수가 (원)" value="${S.portInp.buyPrice}" oninput="S.portInp.buyPrice=this.value">
            <input class="port-inp" id="port-qty" type="number" placeholder="수량" value="${S.portInp.qty}" oninput="S.portInp.qty=this.value" style="width:100px">
            <button class="port-btn" onclick="addPortfolio()">추가</button>
          </div>
        </div>

        ${S.portfolio.length > 0 ? `
          <div class="port-summary">
            <div style="font-size:12px;opacity:0.8;margin-bottom:4px">포트폴리오 현황</div>
            ${noPriceCount > 0 ? `<div style="font-size:12px;background:rgba(245,158,11,0.2);padding:8px;border-radius:8px;margin-bottom:8px">⚠️ ${noPriceCount}종목 현재가 미입력</div>` : ''}
            <div class="port-sum-row"><span>평가금액</span><span class="font-bold">${Math.round(total).toLocaleString()}원</span></div>
            <div class="port-sum-row"><span>매입금액</span><span>${Math.round(totalCost).toLocaleString()}원</span></div>
            <div class="port-sum-row"><span>수익률</span><span style="color:${isGain ? 'var(--danger)' : 'var(--primary)'}">${isGain ? '+' : ''}${totalPnlPct}% (${isGain ? '+' : ''}${Math.round(totalPnl).toLocaleString()}원)</span></div>
          </div>
          ${intel ? renderPortIntel(intel) : ''}
          ${S.portfolio.map(p => renderPortfolioItem(p)).join('')}
        ` : '<div class="empty"><div class="empty-i">💼</div><div class="empty-t">보유 종목을 추가해보세요</div></div>'}
      </div>
    `;
  };

  const renderPortIntel = (intel) => {
    const { sectorList, trend, risk, actions } = intel;
    return `
      <div style="background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--radius);padding:16px;margin-bottom:16px">
        <div style="font-size:14px;font-weight:800;margin-bottom:12px">🧠 포트폴리오 분석</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">
          <div style="background:var(--bg3);border-radius:12px;padding:10px;text-align:center">
            <div style="font-size:12px;color:var(--ink2)">트렌드</div>
            <div style="font-size:16px;font-weight:700;color:${trend === '상승 우세' ? 'var(--danger)' : 'var(--ink)'}">${trend}</div>
          </div>
          <div style="background:var(--bg3);border-radius:12px;padding:10px;text-align:center">
            <div style="font-size:12px;color:var(--ink2)">리스크</div>
            <div style="font-size:16px;font-weight:700;color:${risk === '높음' ? 'var(--danger)' : risk === '보통' ? 'var(--warning)' : 'var(--success)'}">${risk}</div>
          </div>
        </div>
        <div style="margin-bottom:8px">
          ${sectorList.slice(0, 3).map(s => `
            <div style="margin-bottom:6px">
              <div style="display:flex;justify-content:space-between;font-size:12px">
                <span>${s.sector}</span><span>${s.pct}%</span>
              </div>
              <div style="height:4px;background:var(--bg3);border-radius:2px"><div style="height:4px;width:${s.pct}%;background:var(--primary);border-radius:2px"></div></div>
            </div>
          `).join('')}
        </div>
        <div style="font-size:12px;color:var(--ink2);line-height:1.6">${actions.slice(0, 2).map(a => `• ${a}`).join('<br>')}</div>
      </div>
    `;
  };

  const renderPortfolioItem = (p) => {
    const stock = gs(p.code);
    const pr = PRICE_BASE[p.code];
    if (!stock || !pr) return '';
    const hasPrice = pr.price !== null && pr.price !== undefined;
    const curPrice = hasPrice ? pr.price : p.buyPrice;
    const pnl = hasPrice ? (pr.price - p.buyPrice) * p.qty : 0;
    const pnlPct = hasPrice ? ((pr.price - p.buyPrice) / p.buyPrice * 100).toFixed(2) : '0.00';
    const isPos = pnl >= 0;
    const riskLevel = Math.abs(Number(pnlPct)) > 10 ? 'high' : Math.abs(Number(pnlPct)) > 5 ? 'mid' : 'low';

    return `
      <div class="port-card" data-port-code="${p.code}">
        <div class="port-card-top">
          <div>
            <div class="port-name">${stock.name}</div>
            <div class="port-sector">${stock.sector} · ${p.qty.toLocaleString()}주</div>
          </div>
          <div>
            <div class="port-pnl ${isPos ? 'pos' : 'neg'}">${isPos ? '+' : ''}${pnlPct}%</div>
            <div style="font-size:11px;color:var(--ink3);text-align:right">${isPos ? '+' : ''}${Math.round(pnl).toLocaleString()}원</div>
          </div>
        </div>
        <div class="port-stats">
          <div class="port-stat"><div class="port-sv">${p.buyPrice.toLocaleString()}</div><div class="port-sl">매수가</div></div>
          <div class="port-stat"><div class="port-sv" style="color:${hasPrice ? (isPos ? 'var(--danger)' : 'var(--primary)') : 'var(--ink3)'}">${hasPrice ? curPrice.toLocaleString() : '—'}</div><div class="port-sl">현재가</div></div>
          <div class="port-stat"><div class="port-sv">${hasPrice ? (curPrice * p.qty).toLocaleString() : '—'}</div><div class="port-sl">평가액</div></div>
        </div>
        <div class="port-risk ${riskLevel}">${riskLevel === 'high' ? '⚠️ 높은 변동성' : riskLevel === 'mid' ? '⚡ 중간 변동' : '✅ 안정적'}</div>
        ${S.portAnalysis[p.code] ? renderPortAnalysis(S.portAnalysis[p.code], p) : 
          `<button class="ai-invest-btn" onclick="runPortAnalysis('${p.code}')" ${S.portAnaF[p.code] ? 'disabled' : ''}>
            ${S.portAnaF[p.code] ? '<span class="spin">◌</span> 분석 중...' : '🤖 AI 개인 분석'}
          </button>`}
        <div style="display:flex;justify-content:flex-end;margin-top:10px">
          <button class="port-btn" style="background:var(--bg3);color:var(--ink2)" onclick="removePortfolio('${p.code}')">삭제</button>
        </div>
      </div>
    `;
  };

  const renderPortAnalysis = (ana, p) => {
    if (!ana || !ana.verdict) return '';
    const verdictColor = {
      '강력보유': '#10B981', '매수': '#3B82F6', '분할매수': '#8B5CF6',
      '관망': '#F59E0B', '일부매도': '#EF4444', '손절검토': '#EF4444'
    }[ana.verdict] || '#64748B';
    return `
      <div style="background:linear-gradient(135deg,#F0F9FF,#E6F0FF);border-radius:12px;padding:12px;margin:8px 0">
        <div style="display:flex;justify-content:space-between;margin-bottom:6px">
          <span style="font-weight:800;color:${verdictColor}">${ana.verdict}</span>
          <span style="font-size:11px;color:var(--ink3)">신뢰도 ${ana.confidence || 65}%</span>
        </div>
        <div style="font-size:12px;color:var(--ink2);margin-bottom:6px">${ana.summary || ''}</div>
        ${ana.buffett_quote ? `<div style="font-size:11px;color:var(--primary);font-style:italic">"${ana.buffett_quote}"</div>` : ''}
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px">
          <div style="background:rgba(239,68,68,0.1);border-radius:8px;padding:6px;text-align:center">
            <div style="font-size:10px;color:var(--danger)">손절</div>
            <div style="font-size:11px;font-weight:700">${ana.stopLoss || '-'}</div>
          </div>
          <div style="background:rgba(16,185,129,0.1);border-radius:8px;padding:6px;text-align:center">
            <div style="font-size:10px;color:var(--success)">목표</div>
            <div style="font-size:11px;font-weight:700">${ana.target || '-'}</div>
          </div>
        </div>
      </div>
    `;
  };

  const renderMyStocks = () => {
    const myCodes = [...new Set([...S.portfolio.map(p => p.code), ...S.watchlist])];
    const signalItems = myCodes.map(code => {
      const stock = gs(code);
      const name = stock?.name || code;
      const pr = PRICE_BASE[code];
      const sig = calcSignal(code);
      return { code, name, pr, sig };
    }).sort((a, b) => Math.abs(b.sig.score) - Math.abs(a.sig.score));

    return `
      <div style="padding:16px 16px 100px">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px">
          <button class="hdr-btn primary" onclick="runPortfolioAI()" style="height:50px">📊 포트폴리오 분석</button>
          <button class="hdr-btn primary" onclick="showMyTimingPicker()" style="height:50px">⏱ 매수 타이밍</button>
        </div>
        <div style="font-size:12px;font-weight:700;color:var(--ink2);margin-bottom:8px">📋 내 종목 (${myCodes.length})</div>
        ${myCodes.length === 0 ? '<div class="empty"><div class="empty-i">📭</div><div class="empty-t">포트폴리오에 종목을 추가하세요</div></div>' : ''}
        ${signalItems.map(item => renderMyStockItem(item)).join('')}
      </div>
    `;
  };

  const renderMyStockItem = (item) => {
    const portP = S.portfolio.find(p => p.code === item.code);
    const pnl = portP && item.pr?.price ? (item.pr.price - portP.buyPrice) * portP.qty : null;
    const pnlPct = portP && item.pr?.price ? ((item.pr.price - portP.buyPrice) / portP.buyPrice * 100).toFixed(2) : null;

    return `
      <div class="skcard" onclick="showMyStockDetail('${item.code}')">
        <div style="display:flex;justify-content:space-between;margin-bottom:10px">
          <div>
            <div class="skname">${item.name}</div>
            <div style="font-size:11px;color:var(--ink3)">${item.code}</div>
          </div>
          <div style="background:${item.sig.action.bg};border-radius:20px;padding:5px 12px;text-align:center">
            <div style="font-size:12px;font-weight:900;color:${item.sig.action.color}">${item.sig.action.emoji} ${item.sig.action.label}</div>
            <div style="font-size:10px;color:var(--ink3)">${item.sig.score}점</div>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-bottom:8px">
          ${item.sig.signals.slice(0, 4).map(s => `
            <div style="background:${s.good ? '#FEE2E2' : s.bad ? '#DBEAFE' : '#F8FAFC'};border-radius:8px;padding:5px 2px;text-align:center">
              <div style="font-size:9px;font-weight:700;color:${s.good ? '#EF4444' : s.bad ? '#3B82F6' : '#64748B'}">${s.label}</div>
              <div style="font-size:10px;font-weight:700;color:var(--ink)">${s.val}</div>
            </div>
          `).join('')}
        </div>
        ${pnl !== null ? `
          <div style="display:flex;justify-content:space-between;font-size:12px;border-top:1px solid var(--bdr);padding-top:8px">
            <span>${portP.qty}주 · 평균 ${portP.buyPrice.toLocaleString()}원</span>
            <span style="color:${pnl >= 0 ? 'var(--danger)' : 'var(--primary)'}">${pnl >= 0 ? '+' : ''}${Math.round(pnl).toLocaleString()}원 (${pnlPct}%)</span>
          </div>
        ` : ''}
      </div>
    `;
  };

  const renderTradelog = () => {
    const trades = storage.get('tradeHistory', []);
    return `
      <div style="padding:16px 16px 100px">
        <div class="empty"><div class="empty-i">📒</div><div class="empty-t">매매기록 기능 준비 중</div></div>
      </div>
    `;
  };

  const renderHeatmap = () => {
    return `
      <div style="padding:16px 16px 100px">
        <div class="empty"><div class="empty-i">🌡</div><div class="empty-t">테마 분석 기능 준비 중</div></div>
      </div>
    `;
  };

  const renderAlert = () => {
    return `
      <div style="padding:16px 16px 100px">
        <div class="port-add-card">
          <div style="font-size:14px;font-weight:800;margin-bottom:12px">🔔 알림 설정</div>
          ${['newIssueAlert', 'keywordAlert', 'watchlistAlert'].map(key => `
            <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--bdr)">
              <span>${key === 'newIssueAlert' ? '신규 이슈' : key === 'keywordAlert' ? '키워드' : '관심종목'}</span>
              <label class="toggle-wrap">
                <input type="checkbox" ${S.alertSettings[key] ? 'checked' : ''} onchange="toggleAlert('${key}', this.checked)">
                <span class="toggle-slider"></span>
              </label>
            </div>
          `).join('')}
        </div>
        <div class="port-add-card">
          <div style="font-size:14px;font-weight:800;margin-bottom:12px">🔑 키워드 알림</div>
          <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px">
            ${S.keywords.map(kw => `<span class="bdg" style="background:var(--primary-light)">${kw} <span style="cursor:pointer;margin-left:4px" onclick="removeKw('${kw}')">✕</span></span>`).join('')}
          </div>
          <div style="display:flex;gap:8px">
            <input class="port-inp" id="kw-inp" placeholder="키워드 입력" value="${S.newKw}" oninput="S.newKw=this.value" onkeypress="if(event.key==='Enter') addKw()">
            <button class="port-btn" onclick="addKw()">추가</button>
          </div>
        </div>
        <div class="port-add-card">
          <div style="font-size:14px;font-weight:800;margin-bottom:12px">⭐ 관심 종목</div>
          <div style="margin-bottom:8px">
            ${S.watchlist.map(code => {
              const s = gs(code);
              return s ? `<div style="display:flex;justify-content:space-between;padding:6px 0"><span>${s.name} (${code})</span><span onclick="removeWL('${code}')" style="color:var(--danger);cursor:pointer">✕</span></div>` : '';
            }).join('')}
          </div>
          <div style="display:flex;gap:8px">
            <select class="port-inp" id="wl-sel" onchange="S.newWl=this.value">
              <option value="">종목 추가</option>
              ${STOCKS.filter(s => !S.watchlist.includes(s.code)).map(s => `<option value="${s.code}">${s.name}</option>`).join('')}
            </select>
            <button class="port-btn" onclick="addWL()">추가</button>
          </div>
        </div>
      </div>
    `;
  };

  const renderAsset = () => {
    return `
      <div style="padding:16px 16px 100px">
        <div class="empty"><div class="empty-i">💹</div><div class="empty-t">자산 관리 기능 준비 중</div></div>
      </div>
    `;
  };

  const renderBoard = () => {
    return `
      <div style="padding:16px 16px 100px">
        <div class="empty"><div class="empty-i">💬</div><div class="empty-t">게시판 기능 준비 중</div></div>
      </div>
    `;
  };

  /* ===== EVENT HANDLERS ===== */
  const bindEvents = () => {
    const si = document.getElementById('si');
    if (si) {
      si.removeEventListener('input', handleSearch);
      si.addEventListener('input', handleSearch);
    }
  };

  const handleSearch = (e) => {
    S.q = e.target.value;
    reCards();
  };

  const reCards = () => {
    const el = document.getElementById('cc');
    if (!el) { render(); return; }
    const items = filteredNews();
    el.innerHTML = items.length === 0
      ? '<div class="empty"><div class="empty-i">🔭</div><div class="empty-t">해당 조건의 이슈가 없습니다</div></div>'
      : items.map(renderCard).join('');
  };

  const updateClock = () => {
    const el = document.getElementById('hdr-clock');
    if (el) {
      const d = new Date();
      el.textContent = `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
    }
  };

  /* ===== ACTIONS ===== */
  window.setTab = (tab) => {
    S.tab = tab;
    S.themeFilter = null;
    render();
    storage.setStr('lastTab', tab);
    if (tab === 'port') {
      fetchAllPrices().then(() => refreshPortfolioDom());
    }
  };

  window.setSec = (s) => { S.sector = s; render(); };
  window.setTF = (t) => { S.tf = t; render(); };
  window.setTheme = (t) => { S.themeFilter = S.themeFilter === t ? null : t; S.tab = 'feed'; render(); };
  window.setGrade = (g) => { S.gradeFilter = g; reCards(); };
  window.togSK = (c) => { S.sk = S.sk === c ? null : c; S.tab = 'feed'; render(); };
  window.goCard = (id) => { S.tab = 'feed'; S.exp = id; render(); };

  window.toggleWL = (code) => {
    if (S.watchlist.includes(code)) {
      S.watchlist = S.watchlist.filter(c => c !== code);
      notify('☆ 관심 종목 해제', 'info');
    } else {
      S.watchlist.push(code);
      notify('⭐ 관심 종목 추가', 'ok');
    }
    storage.set('watchlist', S.watchlist);
    reCards();
  };

  window.addPortfolio = () => {
    const code = S.portInp.code || document.getElementById('port-code')?.value;
    const buyPrice = Number(S.portInp.buyPrice || document.getElementById('port-price')?.value);
    const qty = Number(S.portInp.qty || document.getElementById('port-qty')?.value);
    if (!code || !buyPrice || !qty) { notify('⚠️ 모든 항목을 입력해주세요', 'warn'); return; }
    const existing = S.portfolio.findIndex(p => p.code === code);
    if (existing >= 0) {
      S.portfolio[existing] = { code, buyPrice, qty };
    } else {
      S.portfolio.push({ code, buyPrice, qty });
    }
    S.portInp = { code: '', buyPrice: '', qty: '' };
    storage.set('portfolio', S.portfolio);
    const s = gs(code);
    notify(`💼 ${s?.name} 추가됨`, 'ok');
    render();
  };

  window.removePortfolio = (code) => {
    S.portfolio = S.portfolio.filter(p => p.code !== code);
    delete S.portAnalysis[code];
    storage.set('portfolio', S.portfolio);
    notify('🗑 종목 삭제', 'info');
    render();
  };

  window.toggleAlert = (key, val) => {
    S.alertSettings[key] = val;
    storage.set('alertSettings', S.alertSettings);
    notify(`${val ? '✅' : '⏸'} 알림 ${val ? '활성화' : '비활성화'}`, 'info');
  };

  window.addKw = () => {
    const v = (S.newKw || document.getElementById('kw-inp')?.value || '').trim();
    if (!v || S.keywords.includes(v)) return;
    S.keywords.push(v);
    S.newKw = '';
    storage.set('alertKeywords', S.keywords);
    notify(`🔑 키워드 [${v}] 추가`, 'ok');
    render();
  };

  window.removeKw = (kw) => {
    S.keywords = S.keywords.filter(k => k !== kw);
    storage.set('alertKeywords', S.keywords);
    render();
  };

  window.addWL = () => {
    const v = S.newWl || document.getElementById('wl-sel')?.value;
    if (!v || S.watchlist.includes(v)) return;
    S.watchlist.push(v);
    S.newWl = '';
    storage.set('watchlist', S.watchlist);
    const s = gs(v);
    notify(`⭐ ${s?.name} 관심 종목 추가`, 'ok');
    render();
  };

  window.removeWL = (code) => {
    S.watchlist = S.watchlist.filter(c => c !== code);
    storage.set('watchlist', S.watchlist);
    render();
  };

  window.toggleAutoRefresh = () => {
    S.autoRefresh = !S.autoRefresh;
    notify(S.autoRefresh ? '✅ 자동 갱신 ON' : '⏸ 자동 갱신 OFF', 'info');
    render();
  };

  window.crawl = () => {
    if (S.crawling) return;
    S.crawling = true;
    render();
    setTimeout(() => {
      fetchNewsJson().then(() => {
        S.crawling = false;
        render();
        notify('🔄 뉴스 갱신 완료', 'ok');
      });
    }, 1800);
  };

  window.showCardModal = (id) => {
    const item = NEWS.find(n => n.id === id);
    if (!item) return;
    const stock = gs(item.code);
    const src = SRC[item.type] || { icon: '📰', color: '#64748B' };
    
    // Create modal
    const modal = document.createElement('div');
    modal.className = 'modal-overlay open';
    modal.innerHTML = `
      <div class="modal">
        <div class="modal-header">
          <div class="modal-title">뉴스 상세</div>
          <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">✕</button>
        </div>
        <div class="modal-body">
          <div style="margin-bottom:12px">
            <span class="bdg" style="background:${src.color}20;color:${src.color}">${src.icon} ${src.label}</span>
            <span class="bdg" style="background:var(--bg3)">${stock?.name || ''}</span>
            <span class="ctime" style="margin-left:8px">${item.time || ''}</span>
          </div>
          <div style="font-size:16px;font-weight:800;margin-bottom:12px">${item.title}</div>
          ${item.body ? `<p style="font-size:14px;color:var(--ink2);line-height:1.7;margin-bottom:16px">${item.body}</p>` : ''}
          <div style="display:flex;align-items:center;gap:10px;background:var(--bg3);border-radius:12px;padding:12px;margin-bottom:16px">
            <div style="flex:1">
              <div style="font-size:10px;font-weight:700;color:var(--ink3);margin-bottom:4px">IMPACT</div>
              <div style="height:6px;background:var(--bdr);border-radius:3px">
                <div style="height:6px;background:${impactColor(item.impactScore || 50)};border-radius:3px;width:${item.impactScore || 50}%"></div>
              </div>
            </div>
            <div style="font-size:18px;font-weight:900;color:${impactColor(item.impactScore || 50)}">${item.impactScore || 50}</div>
          </div>
          ${item.link ? `<a href="${item.link}" target="_blank" style="display:block;text-align:center;font-size:12px;color:var(--primary)">🔗 원문 보기</a>` : ''}
        </div>
      </div>
    `;
    document.body.appendChild(modal);
  };

  window.runPortAnalysis = async (code) => {
    if (S.portAnaF[code]) return;
    const portItem = S.portfolio.find(p => p.code === code);
    if (!portItem) return;
    const stock = gs(code);
    if (!stock) return;

    S.portAnaF[code] = true;
    render();

    setTimeout(() => {
      const ana = {
        verdict: '관망',
        confidence: 65,
        summary: `${stock.name} 분석 완료.`,
        stopLoss: `${Math.round(portItem.buyPrice * 0.93).toLocaleString()}원 (-7%)`,
        target: `${Math.round(portItem.buyPrice * 1.15).toLocaleString()}원 (+15%)`,
      };
      if (!S.portAnalysis) S.portAnalysis = {};
      S.portAnalysis[code] = ana;
      storage.set('portAnalysis', S.portAnalysis);
      S.portAnaF[code] = false;
      render();
      notify(`🤖 ${stock.name} 분석 완료`, 'ok');
    }, 2000);
  };

  window.runPortfolioAI = () => {
    if (!S.portfolio.length) { notify('⚠️ 포트폴리오가 비어있습니다', 'warn'); return; }
    S._portAILoading = true;
    render();
    setTimeout(() => {
      S._portAILoading = false;
      render();
      notify('📊 포트폴리오 분석 완료', 'ok');
    }, 2500);
  };

  window.runAll = () => {
    notify('🤖 일괄 분석 시작...', 'info');
    setTimeout(() => {
      notify('✅ 분석 완료!', 'ok');
      reCards();
    }, 3000);
  };

  window.showMyStockDetail = (code) => {
    const stock = gs(code);
    if (!stock) return;
    const sig = calcSignal(code);
    const ana = S.portAnalysis[code];
    const modal = document.createElement('div');
    modal.className = 'modal-overlay open';
    modal.innerHTML = `
      <div class="modal">
        <div class="modal-header">
          <div class="modal-title">${stock.name}</div>
          <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">✕</button>
        </div>
        <div class="modal-body">
          <div style="text-align:center;margin-bottom:16px">
            <div style="font-size:24px;font-weight:900">${sig.score}점</div>
            <div style="font-size:12px;color:var(--ink3)">${sig.grade}등급 · ${sig.action.label}</div>
          </div>
          <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:16px">
            ${sig.signals.slice(0, 4).map(s => `
              <div style="background:${s.good ? '#FEE2E2' : s.bad ? '#DBEAFE' : '#F8FAFC'};border-radius:12px;padding:10px">
                <div style="font-size:10px;color:var(--ink3)">${s.label}</div>
                <div style="font-size:13px;font-weight:700">${s.val}</div>
              </div>
            `).join('')}
          </div>
          ${ana ? `
            <div style="background:var(--primary-light);border-radius:12px;padding:12px;margin-bottom:16px">
              <div style="font-size:12px;font-weight:700;margin-bottom:4px">🤖 AI 분석</div>
              <div style="font-size:12px;line-height:1.6">${ana.summary || ''}</div>
            </div>
          ` : ''}
        </div>
      </div>
    `;
    document.body.appendChild(modal);
  };

  window.showMyTimingPicker = () => {
    const myCodes = [...new Set([...S.portfolio.map(p => p.code), ...S.watchlist])];
    if (!myCodes.length) { notify('⚠️ 내종목이 없습니다', 'warn'); return; }
    const modal = document.createElement('div');
    modal.className = 'modal-overlay open';
    modal.innerHTML = `
      <div class="modal">
        <div class="modal-header">
          <div class="modal-title">⏱ 타이밍 분석</div>
          <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">✕</button>
        </div>
        <div class="modal-body">
          ${myCodes.map(code => {
            const stock = gs(code);
            return stock ? `<div class="skcard" onclick="runBuyTiming('${code}');this.closest('.modal-overlay').remove()">
              <div class="skname">${stock.name}</div>
              <div style="font-size:11px;color:var(--ink3)">${code}</div>
            </div>` : '';
          }).join('')}
        </div>
      </div>
    `;
    document.body.appendChild(modal);
  };

  window.runBuyTiming = (code) => {
    notify(`⏱ ${gs(code)?.name} 타이밍 분석 중...`, 'info');
    setTimeout(() => {
      notify('✅ 분석 완료', 'ok');
    }, 2000);
  };

  window.showHealthPanel = () => {
    const modal = document.createElement('div');
    modal.className = 'modal-overlay open';
    modal.innerHTML = `
      <div class="modal">
        <div class="modal-header">
          <div class="modal-title">🏥 상태 진단</div>
          <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">✕</button>
        </div>
        <div class="modal-body">
          <div style="margin-bottom:16px">
            <div>📊 뉴스: ${NEWS.length}건</div>
            <div>📈 주가: ${Object.values(PRICE_BASE).filter(p => p.price).length}종목</div>
            <div>💾 저장소: ${storage.get('portfolio', []).length}개 포트폴리오</div>
          </div>
          <button class="port-btn" style="width:100%;background:var(--danger)" onclick="localStorage.clear();location.reload()">초기화</button>
        </div>
      </div>
    `;
    document.body.appendChild(modal);
  };

  window.openHelp = () => {
    const overlay = document.createElement('div');
    overlay.className = 'help-overlay on';
    const sheet = document.createElement('div');
    sheet.className = 'help-sheet on';
    sheet.innerHTML = `
      <div style="padding:20px">
        <div style="display:flex;justify-content:space-between;margin-bottom:16px">
          <span style="font-size:18px;font-weight:800">📖 도움말</span>
          <button onclick="this.closest('.help-overlay').remove()">✕</button>
        </div>
        <div>KOSPI INTEL V15 - AI 투자 분석 플랫폼</div>
      </div>
    `;
    overlay.appendChild(sheet);
    document.body.appendChild(overlay);
    overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
  };

  /* ===== INIT ===== */
  const init = async () => {
    console.log('KOSPI INTEL V15 시작');
    await fetchAllData();
    await fetchFundamentalData();
    await fetchQuantData();
    render();
    setInterval(updateClock, 1000);
    setInterval(() => {
      if (S.autoRefresh) {
        fetchNewsJson().then(() => render());
      }
    }, 5 * 60 * 1000);
  };

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }

})();
</script>
</body>
</html>

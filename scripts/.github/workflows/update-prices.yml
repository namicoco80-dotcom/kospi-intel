name: 주가·수급·뉴스 자동 업데이트

on:
  # 평일(월~금) 16:35 KST = 07:35 UTC  ← 장마감 후 5분
  schedule:
    - cron: "35 7 * * 1-5"
  # 장중 실시간 보완: 09:05 / 11:00 / 13:00 KST
  # schedule:
  #   - cron: "5 0 * * 1-5"   # 09:05 KST
  #   - cron: "0 2 * * 1-5"   # 11:00 KST
  #   - cron: "0 4 * * 1-5"   # 13:00 KST
  # 수동 실행 버튼
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # JSON 파일 커밋 권한

    steps:
      # ── 1. 체크아웃 ──
      - uses: actions/checkout@v4

      # ── 2. Python 설정 ──
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 3. 주가 + 수급 수집 ──
      - name: 주가·수급 수집 (prices.json + supply.json)
        run: python scripts/update_prices.py
        continue-on-error: true   # 실패해도 기존 파일 유지

      # ── 4. 뉴스 수집 ──
      - name: 뉴스 수집 (news.json)
        run: python scripts/fetch_news.py
        continue-on-error: true   # 실패해도 기존 파일 유지

      # ── 5. 변경된 JSON 커밋 & 푸시 ──
      - name: JSON 파일 커밋 & 푸시
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prices.json supply.json news.json
          git diff --staged --quiet || \
            git commit -m "🤖 데이터 자동업데이트 $(date '+%Y-%m-%d %H:%M KST')"
          git push

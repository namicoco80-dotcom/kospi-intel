name: Update KOSPI Data

on:
  schedule:
    - cron: '*/5 0,1,2,3,4,5,6 * * 1-5'
    - cron: '0 7 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Check market hours
        id: market_check
        run: |
          python3 -c "
          import os
          from datetime import datetime, timezone, timedelta
          KST = timezone(timedelta(hours=9))
          now = datetime.now(KST)
          total_min = now.hour * 60 + now.minute
          is_open = (now.weekday() < 5) and (9*60 <= total_min <= 15*60+35)
          is_quant = (now.weekday() < 5) and (now.hour == 16 and now.minute < 10)
          print(f'KST: {now.strftime(\"%Y-%m-%d %H:%M\")} open={is_open} quant={is_quant}')
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'is_open={str(is_open).lower()}\n')
              f.write(f'is_quant={str(is_quant).lower()}\n')
          "

      - name: Update prices & supply
        if: steps.market_check.outputs.is_open == 'true' || github.event_name == 'workflow_dispatch'
        run: python3 scripts/update_prices.py

      - name: Update news & AI analysis
        if: steps.market_check.outputs.is_open == 'true' || github.event_name == 'workflow_dispatch'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python3 scripts/fetch_news.py

      - name: Update quant indicators
        if: steps.market_check.outputs.is_quant == 'true' || github.event_name == 'workflow_dispatch'
        run: python3 scripts/update_prices.py --quant

      - name: Update fundamentals & 5day supply
        if: steps.market_check.outputs.is_quant == 'true' || github.event_name == 'workflow_dispatch'
        run: python3 scripts/fetch_fundamental.py

      - name: Commit and push
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prices.json news.json supply.json analysis.json quant.json fundamental.json supply5.json || true
          git diff --staged --quiet || git commit -m "Auto update $(TZ='Asia/Seoul' date '+%Y-%m-%d %H:%M KST')"
          git push

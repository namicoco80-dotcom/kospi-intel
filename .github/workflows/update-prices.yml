name: Update KOSPI Data

on:
  schedule:
    # 평일 장중 30분마다 (KST 09:00~15:30 = UTC 00:00~06:30)
    - cron: '0,30 0,1,2,3,4,5,6 * * 1-5'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Check market hours (KST 09:00~15:35)
        id: market_check
        run: |
          python3 - << 'PYEOF'
          import os
          from datetime import datetime, timezone, timedelta
          KST = timezone(timedelta(hours=9))
          now = datetime.now(KST)
          total_min = now.hour * 60 + now.minute
          is_open = (now.weekday() < 5) and (9*60 <= total_min <= 15*60+35)
          print(f"KST: {now.strftime('%Y-%m-%d %H:%M')} 장중: {is_open}")
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"is_open={'true' if is_open else 'false'}\n")
          PYEOF

      - name: Update prices
        if: steps.market_check.outputs.is_open == 'true'
        run: python3 scripts/update_prices.py

      - name: Update news
        if: steps.market_check.outputs.is_open == 'true'
        run: python3 scripts/fetch_news.py

      - name: Commit and push
        if: steps.market_check.outputs.is_open == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prices.json news.json supply.json
          git diff --staged --quiet || git commit -m "📊 Auto update $(TZ='Asia/Seoul' date '+%Y-%m-%d %H:%M KST')"
          git push

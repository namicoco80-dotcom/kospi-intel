name: Auto Update Data

on:
  schedule:
    - cron: "35 7 * * 1-5"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch prices and supply
        run: python scripts/update_prices.py
        continue-on-error: true

      - name: Fetch news
        run: python scripts/fetch_news.py
        continue-on-error: true

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prices.json supply.json news.json
          git diff --staged --quiet || git commit -m "auto update"
          git push

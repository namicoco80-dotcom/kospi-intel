name: 주가·수급·뉴스 자동 업데이트

on:
  # 평일(월~금) 16:35 KST = 07:35 UTC  ← 장마감 후 5분
  schedule:
    - cron: "35 7 * * 1-5"
  # 수동 실행 버튼
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # JSON 파일 커밋 권한

    steps:
      # ── 1. 체크아웃 (항상 최신 상태) ──
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 전체 히스토리

      # ── 2. Python 설정 ──
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 3. 주가 + 수급 수집 ──
      - name: 주가·수급 수집 (prices.json + supply.json)
        run: python scripts/update_prices.py
        continue-on-error: true

      # ── 4. 뉴스 수집 ──
      - name: 뉴스 수집 (news.json)
        run: python scripts/fetch_news.py
        continue-on-error: true

      # ── 5. 변경된 JSON 커밋 & 푸시 ──
      - name: JSON 파일 커밋 & 푸시
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 원격 최신 상태 가져오기 (충돌 방지)
          git fetch origin
          git reset --hard origin/main

          # 스크립트 재실행 (reset으로 파일이 초기화됐으므로)
          python scripts/update_prices.py || true
          python scripts/fetch_news.py || true

          git add prices.json supply.json news.json supply5.json fundamental.json quant.json analysis.json 2>/dev/null || true
          git diff --staged --quiet || \
            git commit -m "🤖 데이터 자동업데이트 $(date '+%Y-%m-%d %H:%M KST')"
          git push origin main

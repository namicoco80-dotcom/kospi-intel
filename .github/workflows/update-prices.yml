me: Update KOSPI Data

on:
  schedule:
    - cron: '*/5 0,1,2,3,4,5,6 * * 1-5'
    - cron: '0 7 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Update prices & supply
        run: python3 scripts/update_prices.py

      - name: Update news & AI analysis
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python3 scripts/fetch_news.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add prices.json news.json supply.json analysis.json quant.json fundamental.json supply5.json || true
          git diff --staged --quiet || git commit -m "Auto update $(TZ='Asia/Seoul' date '+%Y-%m-%d %H:%M KST')"
          git push

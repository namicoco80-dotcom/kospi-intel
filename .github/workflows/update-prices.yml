name: Update KOSPI Data

on:
  schedule:
    - cron: '*/5 0,1,2,3,4,5,6 * * 1-5'
    - cron: '0 7 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Check market hours (KST 09:00~15:35)
        id: market_check
        env:
          EVENT_NAME: ${{ github.event_name }}
        run: |
          python3 - << 'PYEOF'
          import os
          from datetime import datetime, timezone, timedelta
          KST = timezone(timedelta(hours=9))
          now = datetime.now(KST)
          total_min = now.hour * 60 + now.minute
          is_open = (now.weekday() < 5) and (9*60 <= total_min <= 15*60+35)
          is_quant = (now.weekday() < 5) and (now.hour == 16 and now.minute < 10)
          is_manual = os.environ.get('EVENT_NAME') == 'workflow_dispatch'
          print(f"KST: {now.strftime('%Y-%m-%d %H:%M')} ìž¥ì¤‘: {is_open} í€€íŠ¸: {is_quant} ìˆ˜ë™: {is_manual}")
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"is_open={'true' if (is_open or is_manual) else 'false'}\n")
              f.write(f"is_quant={'true' if (is_quant or is_manual) else 'false'}\n")
          PYEOF

      - name: Update prices & supply
        if: steps.market_check.outputs.is_open == 'true'
        run: python3 scripts/update_prices.py

      - name: Update news & AI analysis
        if: steps.market_check.outputs.is_open == 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python3 scripts/fetch_news.py

      - name: Update quant indicators (ìž¥ ë§ˆê° í›„ 1íšŒ)
        if: steps.market_check.outputs.is_quant == 'true'
        run: python3 scripts/update_prices.py --quant

      - name: Update fundamentals & 5day supply (ìž¥ ë§ˆê° í›„ 1íšŒ)
        if: steps.market_check.outputs.is_quant == 'true'
        run: python3 scripts/fetch_fundamental.py

      - name: Commit and push
        if: steps.market_check.outputs.is_open == 'true' || steps.market_check.outputs.is_quant == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prices.json news.json supply.json analysis.json quant.json fundamental.json supply5.json || true
          git diff --staged --quiet || git commit -m "ðŸ“Š Auto update $(TZ='Asia/Seoul' date '+%Y-%m-%d %H:%M KST')"
          git push

name: 주가·수급·뉴스 자동 업데이트

on:
  schedule:
    - cron: "35 7 * * 1-5"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 주가·수급 수집
        run: python scripts/update_prices.py
        continue-on-error: true

      - name: 뉴스 수집
        run: python scripts/fetch_news.py
        continue-on-error: true

      - name: JSON 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prices.json supply.json news.json
          git diff --staged --quiet || \
            git commit -m "🤖 데이터 자동업데이트 $(date '+%Y-%m-%d %H:%M KST')"
          git push

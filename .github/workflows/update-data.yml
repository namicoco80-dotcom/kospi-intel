name: KOSPI INTEL 데이터 업데이트

on:
  schedule:
    # 평일 16:35 KST (07:35 UTC)
    - cron: '35 7 * * 1-5'
  workflow_dispatch:  # 수동 실행 가능

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: |
          pip install requests beautifulsoup4 feedparser google-generativeai

      - name: 주가·수급 데이터 수집
        run: python scripts/update_prices.py
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}

      - name: 뉴스·공시 수집 + AI 분석
        run: python scripts/fetch_news.py
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: 변경사항 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/news.json data/prices.json data/supply.json data/analysis.json
          git diff --staged --quiet || git commit -m "📊 데이터 자동 업데이트 $(TZ='Asia/Seoul' date '+%Y-%m-%d %H:%M KST')"
          git pull --no-rebase -X ours
          git push
